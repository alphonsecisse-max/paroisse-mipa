// Annonces Admin avec API
function ManageAnnoncesAPI({ db, setDb, currentUser, api }) {
  const [show, setShow] = useState(false);
  const [editAnn, setEditAnn] = useState(null);
  const [form, setForm] = useState({titre:'',contenu:'',categorie:'événement',pinned:false,media:null,mediaType:null,mediaName:null});
  const [mediaLoading, setMediaLoading] = useState(false);
  const [saving, setSaving] = useState(false);

  const EMPTY = {titre:'',contenu:'',categorie:'événement',pinned:false,media:null,mediaType:null,mediaName:null};
  const catIcons = {événement:'🎪',collecte:'🙏',liturgie:'⛪',formation:'📖'};

  const openNew = () => { setEditAnn(null); setForm(EMPTY); setShow(true); };
  const openEdit = a => { setEditAnn(a); setForm({titre:a.titre,contenu:a.contenu,categorie:a.categorie||'événement',pinned:a.pinned,media:a.media||null,mediaType:a.media_type||null,mediaName:a.media_name||null}); setShow(true); };

  const handleFile = (e) => {
    const file = e.target.files[0]; if(!file) return;
    if(file.size>5*1024*1024){alert('Fichier trop volumineux (max 5 Mo)');return;}
    setMediaLoading(true);
    const reader = new FileReader();
    reader.onload = ev => {
      let type='document';
      if(file.type.startsWith('image/'))type='image';
      else if(file.type.startsWith('video/'))type='video';
      else if(file.type==='application/pdf')type='pdf';
      setForm(f=>({...f,media:ev.target.result,mediaType:type,mediaName:file.name}));
      setMediaLoading(false);
    };
    reader.readAsDataURL(file);
  };

  const save = async () => {
    if(!form.titre||!form.contenu) return;
    setSaving(true);
    try {
      const payload = {titre:form.titre,contenu:form.contenu,categorie:form.categorie,pinned:form.pinned,media:form.media,media_type:form.mediaType,media_name:form.mediaName,date_annonce:new Date().toLocaleDateString('fr-FR')};
      if(editAnn) {
        await api.updateAnnonce(editAnn.id, payload);
        setDb(prev=>({...prev,annonces:prev.annonces.map(a=>a.id===editAnn.id?{...a,...payload}:a)}));
      } else {
        const newA = await api.createAnnonce(payload);
        setDb(prev=>({...prev,annonces:[newA,...prev.annonces]}));
      }
      setShow(false);
    } catch(e) { alert(e.message); }
    setSaving(false);
  };

  const deleteAnn = async (id) => {
    if(!confirm('Supprimer cette annonce ?')) return;
    try { await api.deleteAnnonce(id); setDb(prev=>({...prev,annonces:prev.annonces.filter(a=>a.id!==id)})); }
    catch(e) { alert(e.message); }
  };

  const togglePin = async (ann) => {
    try {
      await api.updateAnnonce(ann.id, {pinned:!ann.pinned});
      setDb(prev=>({...prev,annonces:prev.annonces.map(a=>a.id===ann.id?{...a,pinned:!a.pinned}:a)}));
    } catch(e) { alert(e.message); }
  };

  return (
    <div className="page">
      <div className="page-header" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><div className="page-title">📝 Gérer les annonces</div><div className="page-sub">Créez des annonces avec texte, images, vidéos ou PDF</div></div>
        <button className="btn btn-primary" onClick={openNew}>➕ Nouvelle annonce</button>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {db.annonces.map(ann=>(
          <div key={ann.id} className="card" style={{display:'flex',gap:16,alignItems:'flex-start'}}>
            <div style={{width:72,height:72,borderRadius:10,flexShrink:0,overflow:'hidden',background:'#f1f5f9',display:'flex',alignItems:'center',justifyContent:'center'}}>
              {ann.media&&(ann.media_type||ann.mediaType)==='image'?<img src={ann.media} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<span style={{fontSize:28}}>{catIcons[ann.categorie]||'📌'}</span>}
            </div>
            <div style={{flex:1}}>
              <div style={{display:'flex',gap:6,marginBottom:6}}>
                {ann.pinned&&<span className="badge badge-blue">📌</span>}
                <span className="badge badge-gray">{ann.date_annonce||ann.date}</span>
              </div>
              <div style={{fontWeight:700,fontSize:14,color:'#0f2850',marginBottom:3}}>{ann.titre}</div>
              <div style={{fontSize:12,color:'#64748b'}}>{ann.contenu.substring(0,120)}…</div>
            </div>
            <div style={{display:'flex',gap:5,flexShrink:0,flexDirection:'column'}}>
              <button className="btn btn-secondary btn-xs" onClick={()=>togglePin(ann)}>{ann.pinned?'Désépingler':'📌 Épingler'}</button>
              <button className="btn btn-secondary btn-xs" onClick={()=>openEdit(ann)}>✏️ Modifier</button>
              <button className="btn btn-danger btn-xs" onClick={()=>deleteAnn(ann.id)}>🗑️ Supprimer</button>
            </div>
          </div>
        ))}
      </div>
      <Modal open={show} onClose={()=>setShow(false)} title={editAnn?'✏️ Modifier':'➕ Nouvelle annonce'} wide
        footer={<><button className="btn btn-secondary" onClick={()=>setShow(false)}>Annuler</button><button className="btn btn-primary" onClick={save} disabled={!form.titre||!form.contenu||saving}>{saving?'Sauvegarde…':'💾 Sauvegarder'}</button></>}>
        <div className="form-group"><label>Titre *</label><input value={form.titre} onChange={e=>setForm({...form,titre:e.target.value})}/></div>
        <div className="form-group"><label>Contenu *</label><textarea rows={4} value={form.contenu} onChange={e=>setForm({...form,contenu:e.target.value})} style={{resize:'vertical'}}/></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div className="form-group"><label>Catégorie</label>
            <select value={form.categorie} onChange={e=>setForm({...form,categorie:e.target.value})}>
              {['événement','collecte','liturgie','formation'].map(c=><option key={c} value={c}>{catIcons[c]} {c}</option>)}
            </select>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10,paddingTop:22}}>
            <input type="checkbox" id="pin2" checked={form.pinned} onChange={e=>setForm({...form,pinned:e.target.checked})} style={{width:'auto'}}/>
            <label htmlFor="pin2" style={{marginBottom:0,textTransform:'none',fontSize:13}}>📌 Épingler</label>
          </div>
        </div>
        <div style={{marginTop:4}}>
          <label>Média joint (image, vidéo ou PDF — max 5 Mo)</label>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,margin:'8px 0 12px'}}>
            {[{t:'image',icon:'🖼️',label:'Image',accept:'image/*'},{t:'video',icon:'🎬',label:'Vidéo',accept:'video/*'},{t:'pdf',icon:'📄',label:'PDF',accept:'application/pdf'}].map(opt=>(
              <label key={opt.t} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'10px 8px',borderRadius:10,border:`2px solid ${form.mediaType===opt.t?'#2563eb':'#e2e8f0'}`,background:form.mediaType===opt.t?'#eff6ff':'#f8fafc',cursor:'pointer',fontSize:12,fontWeight:600,color:form.mediaType===opt.t?'#1e40af':'#64748b'}}>
                <span style={{fontSize:24}}>{opt.icon}</span>{opt.label}
                <input type="file" accept={opt.accept} onChange={handleFile} style={{display:'none'}}/>
              </label>
            ))}
          </div>
          {form.media && <div style={{border:'1px solid #e2e8f0',borderRadius:10,overflow:'hidden'}}>
            {form.mediaType==='image'&&<img src={form.media} alt="preview" style={{width:'100%',maxHeight:200,objectFit:'cover',display:'block'}}/>}
            <div style={{padding:'8px 12px',background:'#f8fafc',display:'flex',justifyContent:'space-between'}}>
              <span style={{fontSize:12,color:'#64748b'}}>{form.mediaName}</span>
              <button className="btn btn-danger btn-xs" onClick={()=>setForm(f=>({...f,media:null,mediaType:null,mediaName:null}))}>✕</button>
            </div>
          </div>}
        </div>
      </Modal>
    </div>
  );
}

// Tableau de bord avec API
function TableauDeBordAPI({ db, setDb, currentUser, api }) {
  const isSA = currentUser?.role === 'superadmin';
  const [showObj, setShowObj] = useState(false);
  const [editObj, setEditObj] = useState(null);
  const [objForm, setObjForm] = useState({label:'',montant:'',dateDebut:'',dateFin:''});
  const [objMsg, setObjMsg] = useState({type:'',text:''});

  const allPmts = db.pendingPayments || [];
  const objectifs = db.objectifs || [];
  const membres = db.users;
  const valides = allPmts.filter(p=>p.status==='validé');
  const pending = allPmts.filter(p=>p.status==='en_attente');
  const rejetes = allPmts.filter(p=>p.status==='rejeté');
  const totalValide = valides.reduce((s,p)=>s+p.montant,0);
  const complets = membres.filter(u=>Object.values(u.cotisations||{}).filter(s=>s==='validé').length===10);
  const avecFormule = membres.filter(u=>u.formule);

  const byMois = MOIS.map((m,i)=>({
    label:m.substring(0,3),
    valide:allPmts.filter(p=>p.status==='validé'&&p.moisIdx===i).reduce((s,p)=>s+p.montant,0),
    pending:allPmts.filter(p=>p.status==='en_attente'&&p.moisIdx===i).reduce((s,p)=>s+p.montant,0),
  }));
  const barMax = Math.max(...byMois.map(b=>b.valide+b.pending),1);

  const byMethod = ['Wave','Orange Money','Virement Bancaire'].map(m=>({
    label:m, icon:m==='Wave'?'🌊':m==='Orange Money'?'🟠':'🏦',
    montant:valides.filter(p=>p.methode===m).reduce((s,p)=>s+p.montant,0),
    count:valides.filter(p=>p.methode===m).length,
  }));

  const parseDate = (s)=>{if(!s)return null;const[d,m,y]=s.split('/');return new Date(`${y}-${m}-${d}`);};
  const progressObj = (obj)=>{
    const debut=parseDate(obj.dateDebut||obj.date_debut);
    const fin=parseDate(obj.dateFin||obj.date_fin);
    const encaisse=allPmts.filter(p=>p.status==='validé').filter(p=>{const d=parseDate(p.date);return d&&d>=debut&&d<=fin;}).reduce((s,p)=>s+p.montant,0);
    return{encaisse,pct:Math.min(100,Math.round((encaisse/(obj.montant||1))*100))};
  };

  const exportCSV = () => {
    const rows=[['Membre','Type','Mois','Montant (FCFA)','Méthode','Date','Statut','Réf.'],
      ...allPmts.map(p=>[p.userName,(p.type||'cotisation')==='supplement'?'Supplément':'Cotisation',p.mois,p.montant,p.methode,p.date,p.status,p.transaction_id||''])];
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download='paiements_MIPA.csv';a.click();URL.revokeObjectURL(url);
  };

  const openNewObj = () => { setEditObj(null); setObjForm({label:'',montant:'',dateDebut:'',dateFin:''}); setObjMsg({type:'',text:''}); setShowObj(true); };
  const openEditObj = o => { setEditObj(o); setObjForm({label:o.label,montant:String(o.montant),dateDebut:o.date_debut||o.dateDebut,dateFin:o.date_fin||o.dateFin}); setObjMsg({type:'',text:''}); setShowObj(true); };

  const saveObj = async () => {
    if(!objForm.label||!objForm.montant||!objForm.dateDebut||!objForm.dateFin) return setObjMsg({type:'error',text:'Tous les champs requis.'});
    const montant=parseInt(objForm.montant); if(!montant||montant<=0) return setObjMsg({type:'error',text:'Montant invalide.'});
    try {
      if(editObj) {
        await api.updateObjectif(editObj.id, {label:objForm.label,montant,date_debut:objForm.dateDebut,date_fin:objForm.dateFin});
      } else {
        await api.createObjectif({label:objForm.label,montant,date_debut:objForm.dateDebut,date_fin:objForm.dateFin});
      }
      setObjMsg({type:'success',text:'Objectif enregistré.'});
      setTimeout(()=>{setObjMsg({type:'',text:''});setShowObj(false);setDb(prev=>prev);},1500);
    } catch(e) { setObjMsg({type:'error',text:e.message}); }
  };

  const deleteObj = async (id) => {
    try { await api.deleteObjectif(id); setDb(prev=>({...prev,objectifs:prev.objectifs.filter(o=>o.id!==id)})); }
    catch(e) { alert(e.message); }
  };

  const gaugeColor=(p)=>p>=100?'#16a34a':p>=60?'#2563eb':p>=30?'#d97706':'#dc2626';

  return (
    <div className="page">
      <div className="page-header" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:10}}>
        <div><div className="page-title">📊 Tableau de bord financier</div><div className="page-sub">Vue globale des paiements et objectifs</div></div>
        <div style={{display:'flex',gap:8}}>
          {isSA&&<button className="btn btn-gold" onClick={openNewObj}>🎯 Nouvel objectif</button>}
          <button className="btn btn-primary" onClick={exportCSV}>📥 Exporter CSV</button>
        </div>
      </div>

      {objectifs.length>0&&(
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'1px',marginBottom:12}}>🎯 Objectifs</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:14}}>
            {objectifs.map(obj=>{
              const{encaisse,pct}=progressObj(obj);const col=gaugeColor(pct);
              return(
                <div key={obj.id} className="card" style={{borderLeft:`4px solid ${col}`}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
                    <div><div style={{fontWeight:700,fontSize:14}}>{obj.label}</div><div style={{fontSize:11,color:'#94a3b8'}}>📅 {obj.date_debut||obj.dateDebut} → {obj.date_fin||obj.dateFin}</div></div>
                    {isSA&&<div style={{display:'flex',gap:4}}>
                      <button className="btn btn-secondary btn-xs" onClick={()=>openEditObj(obj)}>✏️</button>
                      <button className="btn btn-danger btn-xs" onClick={()=>deleteObj(obj.id)}>🗑️</button>
                    </div>}
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:14}}>
                    <div style={{position:'relative',width:72,height:72,flexShrink:0}}>
                      <svg viewBox="0 0 36 36" style={{transform:'rotate(-90deg)',width:72,height:72}}>
                        <circle cx="18" cy="18" r="15.9" fill="none" stroke="#e2e8f0" strokeWidth="3"/>
                        <circle cx="18" cy="18" r="15.9" fill="none" stroke={col} strokeWidth="3" strokeDasharray={`${pct} ${100-pct}`} strokeLinecap="round"/>
                      </svg>
                      <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',fontWeight:800,fontSize:14,color:col,textAlign:'center'}}>{pct}%</div>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}><span style={{color:'#64748b'}}>Encaissé</span><span style={{fontWeight:700,color:col}}>{fmt(encaisse)}</span></div>
                      <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:8}}><span style={{color:'#64748b'}}>Objectif</span><span style={{fontWeight:700}}>{fmt(obj.montant)}</span></div>
                      <div style={{background:'#e2e8f0',borderRadius:99,height:8,overflow:'hidden'}}><div style={{height:'100%',width:`${pct}%`,background:col,borderRadius:99}}/></div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
        {[{ico:'✅',bg:'#dcfce7',bd:'#86efac',val:fmt(totalValide),lbl:`${valides.length} validés`,sub:'Encaissé'},
          {ico:'⏳',bg:'#fef9c3',bd:'#fde047',val:fmt(pending.reduce((s,p)=>s+p.montant,0)),lbl:`${pending.length} en attente`,sub:'À valider'},
          {ico:'❌',bg:'#fee2e2',bd:'#fca5a5',val:fmt(rejetes.reduce((s,p)=>s+p.montant,0)),lbl:`${rejetes.length} rejetés`,sub:'Non encaissé'},
          {ico:'👥',bg:'#eff6ff',bd:'#bfdbfe',val:complets.length,lbl:`${avecFormule.length} avec formule`,sub:'Membres complets'},
        ].map((s,i)=>(
          <div key={i} className="stat" style={{borderLeftColor:s.bd}}>
            <div className="stat-ico" style={{background:s.bg}}>{s.ico}</div>
            <div><div style={{fontSize:11,color:'#94a3b8',textTransform:'uppercase',marginBottom:2}}>{s.sub}</div><div className="stat-val" style={{fontSize:18}}>{s.val}</div><div className="stat-lbl">{s.lbl}</div></div>
          </div>
        ))}
      </div>

      <div className="g2" style={{marginBottom:20}}>
        <div className="card">
          <div className="card-title"><span>📈</span> Encaissements par mois</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:6,height:140,marginTop:12}}>
            {byMois.map((b,i)=>(
              <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                <div style={{width:'100%',display:'flex',flexDirection:'column',justifyContent:'flex-end',height:110,gap:1}}>
                  {b.pending>0&&<div style={{width:'100%',borderRadius:'3px 3px 0 0',height:`${Math.round((b.pending/barMax)*100)}%`,background:'#fde047',minHeight:2}}/>}
                  <div style={{width:'100%',borderRadius:'3px 3px 0 0',height:`${Math.round((b.valide/barMax)*100)}%`,background:'#2563eb',minHeight:b.valide?2:0}}/>
                </div>
                <div style={{fontSize:9,color:'#94a3b8'}}>{b.label}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <div className="card-title"><span>💳</span> Par méthode de paiement</div>
          <div style={{display:'flex',flexDirection:'column',gap:14,marginTop:12}}>
            {byMethod.map((m,i)=>{
              const pct=totalValide>0?Math.round((m.montant/totalValide)*100):0;
              return(<div key={i}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                  <span style={{fontSize:13,fontWeight:600}}>{m.icon} {m.label}</span>
                  <span style={{fontSize:13,fontWeight:700,color:'#1e40af'}}>{fmt(m.montant)} <span style={{color:'#94a3b8'}}>({m.count})</span></span>
                </div>
                <div style={{background:'#e2e8f0',borderRadius:99,height:10,overflow:'hidden'}}><div style={{height:'100%',width:`${pct}%`,background:i===0?'#2563eb':i===1?'#ea580c':'#0f2850',borderRadius:99}}/></div>
                <div style={{fontSize:11,color:'#94a3b8',marginTop:3}}>{pct}% du total</div>
              </div>);
            })}
          </div>
        </div>
      </div>

      <Modal open={showObj} onClose={()=>setShowObj(false)} title={editObj?'✏️ Modifier':'🎯 Nouvel objectif'}
        footer={<><button className="btn btn-secondary" onClick={()=>setShowObj(false)}>Annuler</button><button className="btn btn-gold" onClick={saveObj}>💾 Enregistrer</button></>}>
        <Alert type={objMsg.type} msg={objMsg.text}/>
        <div className="form-group"><label>Libellé *</label><input value={objForm.label} onChange={e=>setObjForm({...objForm,label:e.target.value})} placeholder="Ex : Objectif T2 2025"/></div>
        <div className="form-group"><label>Montant cible (FCFA) *</label><input type="number" value={objForm.montant} onChange={e=>setObjForm({...objForm,montant:e.target.value})} min="1000"/></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div className="form-group"><label>Date de début *</label><input type="date" value={objForm.dateDebut} onChange={e=>setObjForm({...objForm,dateDebut:e.target.value})}/></div>
          <div className="form-group"><label>Date de fin *</label><input type="date" value={objForm.dateFin} onChange={e=>setObjForm({...objForm,dateFin:e.target.value})}/></div>
        </div>
      </Modal>
    </div>
  );
}

// Demandes Formule avec API
function DemandesFormuleAPI({ db, setDb, currentUser, api }) {
  const [tab, setTab] = useState('pending');
  const all = db.demandesFormule || [];
  const pending = all.filter(d=>d.status==='en_attente');
  const traitees = all.filter(d=>d.status!=='en_attente');
  const showList = tab==='pending'?pending:traitees;

  const traiter = async (d, action) => {
    try {
      await api.traiteDemande(d.id, {action, traite_par:`${currentUser.prenom} ${currentUser.nom}`});
      const status = action==='approuver'?'approuvé':'refusé';
      setDb(prev => {
        const updatedDemandes = prev.demandesFormule.map(x=>x.id===d.id?{...x,status}:x);
        let users = prev.users;
        if(action==='approuver') users = prev.users.map(u=>u.id===d.userId?{...u,formule:d.formuleDemandee}:u);
        return {...prev, demandesFormule:updatedDemandes, users};
      });
    } catch(e) { alert(e.message); }
  };

  const FormuleBadge = ({fid}) => {
    const f=FORMULES.find(x=>x.id===fid);
    if(!f) return <span className="badge badge-gray">Aucune</span>;
    return <span className="badge" style={{background:f.color+'20',color:f.color}}>{f.badge}</span>;
  };

  return (
    <div className="page">
      <div className="page-header"><div className="page-title">🔄 Demandes de formule</div><div className="page-sub">Approuvez ou refusez les demandes de changement de plan</div></div>
      <div className="g3" style={{marginBottom:18}}>
        {[{ico:'⏳',bg:'#fef9c3',bd:'#fde047',val:pending.length,lbl:'En attente'},
          {ico:'✅',bg:'#dcfce7',bd:'#86efac',val:all.filter(d=>d.status==='approuvé').length,lbl:'Approuvées'},
          {ico:'❌',bg:'#fee2e2',bd:'#fca5a5',val:all.filter(d=>d.status==='refusé').length,lbl:'Refusées'}].map((s,i)=>(
          <div key={i} className="stat" style={{borderLeftColor:s.bd}}>
            <div className="stat-ico" style={{background:s.bg}}>{s.ico}</div>
            <div><div className="stat-val">{s.val}</div><div className="stat-lbl">{s.lbl}</div></div>
          </div>
        ))}
      </div>
      <div className="tabs">
        <div className={`tab ${tab==='pending'?'active':''}`} onClick={()=>setTab('pending')}>⏳ En attente ({pending.length})</div>
        <div className={`tab ${tab==='traitees'?'active':''}`} onClick={()=>setTab('traitees')}>📋 Traitées ({traitees.length})</div>
      </div>
      <div className="card">
        {showList.length===0?<div style={{textAlign:'center',padding:48,color:'#94a3b8'}}>Aucune demande.</div>:(
          <table>
            <thead><tr><th>Membre</th><th>Actuelle</th><th>Demandée</th><th>Date</th><th>Statut</th>{tab==='pending'&&<th>Actions</th>}</tr></thead>
            <tbody>
              {showList.map(d=>(
                <tr key={d.id}>
                  <td style={{fontWeight:700}}>{d.userName||d.user_name}</td>
                  <td><FormuleBadge fid={d.formuleActuelle||d.formule_actuelle}/></td>
                  <td><div style={{display:'flex',alignItems:'center',gap:6}}><span style={{color:'#94a3b8',fontSize:12}}>→</span><FormuleBadge fid={d.formuleDemandee||d.formule_demandee}/></div></td>
                  <td style={{fontSize:12,color:'#94a3b8'}}>{d.date||d.created_at?.split('T')[0]}</td>
                  <td>{d.status==='en_attente'?<span className="badge badge-yellow">⏳</span>:d.status==='approuvé'?<span className="badge badge-green">✅</span>:<span className="badge badge-red">❌</span>}</td>
                  {tab==='pending'&&<td><div style={{display:'flex',gap:6}}>
                    <button className="btn btn-primary btn-xs" onClick={()=>traiter(d,'approuver')}>✅ Approuver</button>
                    <button className="btn btn-danger btn-xs" onClick={()=>traiter(d,'refuser')}>❌ Refuser</button>
                  </div></td>}
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

// Cotisations directes avec API
function AdminCotisationsAPI({ db, setDb, api }) {
  const [search, setSearch] = useState('');
  const [sel, setSel] = useState('');
  const [months, setMonths] = useState([]);
  const [formule, setFormule] = useState('');
  const [msg, setMsg] = useState({type:'',text:''});
  const [saving, setSaving] = useState(false);

  const allUsers = db.users;
  const filteredUsers = allUsers.filter(u =>
    (u.prenom+' '+u.nom+' '+u.telephone+' '+u.groupe).toLowerCase().includes(search.toLowerCase())
  );
  const u = allUsers.find(x=>x.id===sel);

  const cotisationsU = {};
  (db.pendingPayments||[]).filter(p=>p.userId===sel&&(p.type==='cotisation'||!p.type)).forEach(p=>{
    if(p.moisIdx!==null&&p.moisIdx!==undefined) cotisationsU[p.moisIdx]=p.status;
  });

  const apply = async () => {
    if(!u||months.length===0) return;
    setSaving(true);
    try {
      await api.postDirect({ user_id: u.id, mois_indices: months, formule: formule||undefined });
      setMsg({type:'success',text:`✅ ${months.length} mois validés pour ${u.prenom} ${u.nom}.`});
      setMonths([]);
      setTimeout(()=>setMsg({type:'',text:''}),5000);
      setDb(prev=>prev); // trigger reload
    } catch(e) { setMsg({type:'error',text:e.message}); }
    setSaving(false);
  };

  return (
    <div className="page">
      <div className="page-header"><div className="page-title">👑 Cotisations directes</div><div className="page-sub">Validez les paiements directement sans passerelle</div></div>
      <Alert type={msg.type} msg={msg.text}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1.5fr',gap:18,alignItems:'start'}}>
        <div>
          <div className="card" style={{marginBottom:12}}>
            <div className="form-group"><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher un membre…"/></div>
          </div>
          <div className="card" style={{padding:0,overflow:'hidden'}}>
            <div style={{maxHeight:360,overflowY:'auto'}}>
              {filteredUsers.map(usr=>{
                const paid=Object.values(usr.cotisations||{}).filter(s=>s==='validé').length;
                const isSelected=sel===usr.id;
                return(<div key={usr.id} onClick={()=>{setSel(usr.id);setMonths([]);setFormule('');}}
                  style={{display:'flex',alignItems:'center',gap:10,padding:'10px 16px',cursor:'pointer',borderBottom:'1px solid #f1f5f9',background:isSelected?'#eff6ff':'white',borderLeft:isSelected?'3px solid #2563eb':'3px solid transparent'}}>
                  <div style={{width:34,height:34,borderRadius:'50%',background:isSelected?'linear-gradient(135deg,#2563eb,#1e40af)':'linear-gradient(135deg,#94a3b8,#64748b)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:700,fontSize:12}}>{usr.prenom[0]}{usr.nom[0]}</div>
                  <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{usr.prenom} {usr.nom}</div><div style={{fontSize:11,color:'#94a3b8'}}>{usr.groupe||usr.telephone}</div></div>
                  <div style={{fontSize:11,fontWeight:700,color:paid===10?'#16a34a':paid>0?'#2563eb':'#94a3b8'}}>{paid}/10 ✅</div>
                </div>);
              })}
            </div>
          </div>
        </div>
        <div>
          {!u?<div className="card" style={{textAlign:'center',padding:'48px 24px',color:'#94a3b8'}}><div style={{fontSize:40}}>👈</div><div style={{fontWeight:600,fontSize:14,marginTop:12}}>Sélectionnez un membre</div></div>:(
            <div className="card">
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:18,padding:'14px 16px',background:'#f8fafc',borderRadius:10}}>
                <div style={{width:44,height:44,borderRadius:'50%',background:'linear-gradient(135deg,#2563eb,#1e40af)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:700,fontSize:16}}>{u.prenom[0]}{u.nom[0]}</div>
                <div style={{flex:1}}><div style={{fontWeight:700,fontSize:15}}>{u.prenom} {u.nom}</div><div style={{fontSize:12,color:'#64748b'}}>{u.groupe||'—'} · {u.telephone}</div></div>
                <RoleBadge role={u.role}/>
              </div>
              <div className="form-group"><label>Formule</label>
                <select value={formule} onChange={e=>setFormule(e.target.value)}>
                  <option value="">— Actuelle : {FORMULES.find(f=>f.id===u.formule)?.label||'Aucune'} —</option>
                  {FORMULES.map(f=><option key={f.id} value={f.id}>{f.label}</option>)}
                </select>
              </div>
              <label style={{display:'block',marginBottom:8}}>Mois à valider</label>
              <div className="month-grid" style={{marginBottom:16}}>
                {MOIS.map((m,i)=>{
                  const st=cotisationsU[i];const sel2=months.includes(i);
                  let cls='mc-unpaid';
                  if(st==='validé')cls='mc-paid';else if(st==='en_attente')cls='mc-pending';else if(sel2)cls='mc-selected';
                  return(<div key={i} className={`month-cell ${cls}`} onClick={()=>st!=='validé'&&setMonths(prev=>prev.includes(i)?prev.filter(x=>x!==i):[...prev,i])}>
                    <div className="mc-name">{st==='validé'?'✅':st==='en_attente'?'⏳':sel2?'●':'○'} {m}</div>
                  </div>);
                })}
              </div>
              <button className="btn btn-gold" style={{width:'100%',padding:12}} onClick={apply} disabled={months.length===0||saving}>
                {saving?'Enregistrement…':`👑 Valider ${months.length>0?`${months.length} mois`:'les mois sélectionnés'}`}
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// Passwords avec API
function AdminPasswordsAPI({ db, api }) {
  const [search, setSearch] = useState('');
  const [sel, setSel] = useState('');
  const [pw, setPw] = useState('');
  const [pw2, setPw2] = useState('');
  const [msg, setMsg] = useState({type:'',text:''});
  const [saving, setSaving] = useState(false);

  const allUsers = db.users;
  const filteredUsers = allUsers.filter(u=>(u.prenom+' '+u.nom+' '+u.telephone).toLowerCase().includes(search.toLowerCase()));
  const selectedUser = allUsers.find(u=>u.id===sel);

  const save = async () => {
    if(!sel||!pw) return setMsg({type:'error',text:'Sélectionnez un utilisateur et entrez un mot de passe.'});
    if(pw.length<6) return setMsg({type:'error',text:'Minimum 6 caractères.'});
    if(pw!==pw2) return setMsg({type:'error',text:'Les deux mots de passe ne correspondent pas.'});
    setSaving(true);
    try {
      await api.changePassword(sel, {newPassword:pw});
      setMsg({type:'success',text:`✅ Mot de passe de ${selectedUser.prenom} ${selectedUser.nom} mis à jour.`});
      setPw(''); setPw2('');
      setTimeout(()=>setMsg({type:'',text:''}),5000);
    } catch(e) { setMsg({type:'error',text:e.message}); }
    setSaving(false);
  };

  return (
    <div className="page">
      <div className="page-header"><div className="page-title">🔒 Gestion des mots de passe</div><div className="page-sub">Réinitialisez le mot de passe d'un membre</div></div>
      <Alert type={msg.type} msg={msg.text}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1.4fr',gap:18,alignItems:'start'}}>
        <div>
          <div className="card" style={{marginBottom:12}}>
            <div className="form-group"><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Nom, téléphone…"/></div>
          </div>
          <div className="card" style={{padding:0,overflow:'hidden'}}>
            <div style={{maxHeight:340,overflowY:'auto'}}>
              {filteredUsers.map(usr=>{const isSelected=sel===usr.id;return(
                <div key={usr.id} onClick={()=>{setSel(usr.id);setPw('');setPw2('');setMsg({type:'',text:''}); }}
                  style={{display:'flex',alignItems:'center',gap:10,padding:'10px 16px',cursor:'pointer',borderBottom:'1px solid #f1f5f9',background:isSelected?'#eff6ff':'white',borderLeft:isSelected?'3px solid #2563eb':'3px solid transparent'}}>
                  <div style={{width:34,height:34,borderRadius:'50%',background:isSelected?'linear-gradient(135deg,#2563eb,#1e40af)':'linear-gradient(135deg,#94a3b8,#64748b)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:700,fontSize:12}}>{usr.prenom[0]}{usr.nom[0]}</div>
                  <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{usr.prenom} {usr.nom}</div><RoleBadge role={usr.role}/></div>
                </div>
              );})}
            </div>
          </div>
        </div>
        <div>
          {!selectedUser?<div className="card" style={{textAlign:'center',padding:'48px 24px',color:'#94a3b8'}}><div style={{fontSize:40}}>🔒</div><div style={{fontWeight:600,fontSize:14,marginTop:12}}>Sélectionnez un utilisateur</div></div>:(
            <div className="card">
              <div style={{display:'flex',alignItems:'center',gap:12,padding:'14px 16px',background:'#f8fafc',borderRadius:10,marginBottom:20}}>
                <div style={{width:44,height:44,borderRadius:'50%',background:'linear-gradient(135deg,#2563eb,#1e40af)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:700,fontSize:16}}>{selectedUser.prenom[0]}{selectedUser.nom[0]}</div>
                <div><div style={{fontWeight:700,fontSize:15}}>{selectedUser.prenom} {selectedUser.nom}</div><RoleBadge role={selectedUser.role}/></div>
              </div>
              <div className="form-group"><label>Nouveau mot de passe *</label><EyeInput value={pw} onChange={e=>setPw(e.target.value)} placeholder="Minimum 6 caractères"/></div>
              <div className="form-group"><label>Confirmer *</label><EyeInput value={pw2} onChange={e=>setPw2(e.target.value)} placeholder="Répéter"/></div>
              {pw&&pw.length<6&&<div style={{fontSize:12,color:'#dc2626',marginBottom:10}}>⚠️ Minimum 6 caractères.</div>}
              {pw&&pw2&&pw!==pw2&&<div style={{fontSize:12,color:'#dc2626',marginBottom:10}}>⚠️ Les mots de passe ne correspondent pas.</div>}
              <button className="btn btn-primary" style={{width:'100%',padding:12}} onClick={save} disabled={!pw||pw.length<6||pw!==pw2||saving}>
                {saving?'Mise à jour…':'🔒 Mettre à jour le mot de passe'}
              </button>
              <div className="alert alert-warn" style={{marginTop:14}}>⚠️ Communiquez le nouveau mot de passe en privé à <b>{selectedUser.prenom}</b>.</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// Gestion profils avec API
function GestionProfilsAPI({ db, setDb, api }) {
  const [search, setSearch] = useState('');
  const [editU, setEditU] = useState(null);
  const [form, setForm] = useState({});
  const [msg, setMsg] = useState({type:'',text:''});
  const [tab, setTab] = useState('info');
  const [showAdd, setShowAdd] = useState(false);
  const [addForm, setAddForm] = useState({prenom:'',nom:'',email:'',telephone:'',adresse:'',groupe:'',password:'',role:'user'});
  const [addMsg, setAddMsg] = useState({type:'',text:''});
  const [saving, setSaving] = useState(false);

  const users = db.users.filter(u=>(u.prenom+' '+u.nom+' '+u.email+' '+u.telephone).toLowerCase().includes(search.toLowerCase()));

  const open = (u) => { setEditU(u); setForm({prenom:u.prenom,nom:u.nom,email:u.email||'',telephone:u.telephone,adresse:u.adresse||'',groupe:u.groupe||'',role:u.role,actif:u.actif!==false,formule:u.formule||''}); setMsg({type:'',text:''}); setTab('info'); };

  const save = async () => {
    if(!form.prenom||!form.nom||!form.telephone) return setMsg({type:'error',text:'Prénom, nom et téléphone requis.'});
    setSaving(true);
    try {
      await api.updateUser(editU.id, form);
      setDb(prev=>({...prev,users:prev.users.map(u=>u.id===editU.id?{...u,...form}:u)}));
      setMsg({type:'success',text:`Profil de ${form.prenom} ${form.nom} mis à jour.`});
      setTimeout(()=>{setMsg({type:'',text:''});setEditU(null);},2000);
    } catch(e) { setMsg({type:'error',text:e.message}); }
    setSaving(false);
  };

  const ajouterUser = async () => {
    setAddMsg({type:'',text:''});
    if(!addForm.prenom||!addForm.nom||!addForm.telephone||!addForm.password) return setAddMsg({type:'error',text:'Champs obligatoires manquants.'});
    if(addForm.password.length<6) return setAddMsg({type:'error',text:'Mot de passe : 6 caractères minimum.'});
    try {
      const newU = await api.createUser(addForm);
      setDb(prev=>({...prev,users:[...prev.users,{...newU,cotisations:{}}]}));
      setAddMsg({type:'success',text:`${addForm.prenom} ${addForm.nom} ajouté avec succès.`});
      setTimeout(()=>{setAddMsg({type:'',text:''});setShowAdd(false);setAddForm({prenom:'',nom:'',email:'',telephone:'',adresse:'',groupe:'',password:'',role:'user'});},2000);
    } catch(e) { setAddMsg({type:'error',text:e.message}); }
  };

  return (
    <div className="page">
      <div className="page-header" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div><div className="page-title">✏️ Gestion des profils</div><div className="page-sub">Modifiez les profils, rôles — Rôle Super Admin inclus</div></div>
        <button className="btn btn-primary" onClick={()=>setShowAdd(true)}>➕ Ajouter un utilisateur</button>
      </div>
      <div className="card" style={{marginBottom:16}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher par nom, email, téléphone…"/>
      </div>
      <div className="card">
        <table>
          <thead><tr><th>Membre</th><th>Tél.</th><th>Groupe</th><th>Rôle</th><th>Actions</th></tr></thead>
          <tbody>
            {users.map(u=>(
              <tr key={u.id}>
                <td><div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:34,height:34,borderRadius:'50%',flexShrink:0,background:'linear-gradient(135deg,#2563eb,#0f2850)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:700,fontSize:12}}>{u.prenom[0]}{u.nom[0]}</div>
                  <div><div style={{fontWeight:600}}>{u.prenom} {u.nom}</div><div style={{fontSize:11,color:'#94a3b8'}}>{u.email||'—'}</div></div>
                </div></td>
                <td>{u.telephone}</td><td style={{fontSize:12}}>{u.groupe||'—'}</td>
                <td><RoleBadge role={u.role}/></td>
                <td><button className="btn btn-primary btn-xs" onClick={()=>open(u)}>✏️ Modifier</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <Modal open={!!editU} onClose={()=>setEditU(null)} title={`✏️ ${editU?.prenom} ${editU?.nom}`} wide
        footer={<><button className="btn btn-secondary" onClick={()=>setEditU(null)}>Fermer</button><button className="btn btn-primary" onClick={save} disabled={saving}>{saving?'…':'💾 Enregistrer'}</button></>}>
        {editU&&(
          <>
            <Alert type={msg.type} msg={msg.text}/>
            <div className="tabs">
              {[['info','👤 Infos'],['role','🛡️ Rôle & Accès']].map(([k,l])=>(
                <div key={k} className={`tab ${tab===k?'active':''}`} onClick={()=>setTab(k)}>{l}</div>
              ))}
            </div>
            {tab==='info'&&(
              <>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                  <div className="form-group"><label>Prénom *</label><input value={form.prenom} onChange={e=>setForm({...form,prenom:e.target.value})}/></div>
                  <div className="form-group"><label>Nom *</label><input value={form.nom} onChange={e=>setForm({...form,nom:e.target.value})}/></div>
                </div>
                <div className="form-group"><label>Email</label><input type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/></div>
                <div className="form-group"><label>Téléphone *</label><input value={form.telephone} onChange={e=>setForm({...form,telephone:e.target.value})}/></div>
                <div className="form-group"><label>Adresse</label><input value={form.adresse} onChange={e=>setForm({...form,adresse:e.target.value})}/></div>
                <div className="form-group"><label>Groupe</label>
                  <select value={form.groupe} onChange={e=>setForm({...form,groupe:e.target.value})}>
                    <option value="">— Aucun —</option>
                    {GROUPES.map(g=><option key={g} value={g}>{g}</option>)}
                  </select>
                </div>
              </>
            )}
            {tab==='role'&&(
              <>
                <div className="form-group"><label>Rôle</label>
                  <select value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                    <option value="user">👤 Membre</option>
                    <option value="admin">🛡️ Administrateur</option>
                    <option value="superadmin">👑 Super Administrateur</option>
                  </select>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:10,marginTop:8}}>
                  <input type="checkbox" id="actifEdit" checked={form.actif} onChange={e=>setForm({...form,actif:e.target.checked})} style={{width:'auto'}}/>
                  <label htmlFor="actifEdit" style={{marginBottom:0,textTransform:'none',fontSize:13}}>Compte actif</label>
                </div>
                <div className="form-group" style={{marginTop:16}}><label>Formule de cotisation</label>
                  <select value={form.formule} onChange={e=>setForm({...form,formule:e.target.value})}>
                    <option value="">— Aucune —</option>
                    {FORMULES.map(f=><option key={f.id} value={f.id}>{f.label}</option>)}
                  </select>
                </div>
              </>
            )}
          </>
        )}
      </Modal>

      <Modal open={showAdd} onClose={()=>setShowAdd(false)} title="➕ Ajouter un utilisateur" wide
        footer={<><button className="btn btn-secondary" onClick={()=>setShowAdd(false)}>Annuler</button><button className="btn btn-primary" onClick={ajouterUser}>✅ Créer le compte</button></>}>
        <Alert type={addMsg.type} msg={addMsg.text}/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div className="form-group"><label>Prénom *</label><input value={addForm.prenom} onChange={e=>setAddForm({...addForm,prenom:e.target.value})}/></div>
          <div className="form-group"><label>Nom *</label><input value={addForm.nom} onChange={e=>setAddForm({...addForm,nom:e.target.value})}/></div>
        </div>
        <div className="form-group"><label>Email</label><input type="email" value={addForm.email} onChange={e=>setAddForm({...addForm,email:e.target.value})}/></div>
        <div className="form-group"><label>Téléphone *</label><input type="tel" value={addForm.telephone} onChange={e=>setAddForm({...addForm,telephone:e.target.value})}/></div>
        <div className="form-group"><label>Adresse</label><input value={addForm.adresse} onChange={e=>setAddForm({...addForm,adresse:e.target.value})}/></div>
        <div className="form-group"><label>Groupe</label>
          <select value={addForm.groupe} onChange={e=>setAddForm({...addForm,groupe:e.target.value})}>
            <option value="">— Aucun —</option>
            {GROUPES.map(g=><option key={g} value={g}>{g}</option>)}
          </select>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div className="form-group"><label>Rôle</label>
            <select value={addForm.role} onChange={e=>setAddForm({...addForm,role:e.target.value})}>
              <option value="user">👤 Membre</option><option value="admin">🛡️ Admin</option><option value="superadmin">👑 Super Admin</option>
            </select>
          </div>
          <div className="form-group"><label>Mot de passe *</label><EyeInput value={addForm.password} onChange={e=>setAddForm({...addForm,password:e.target.value})}/></div>
        </div>
        <div className="alert alert-info" style={{marginTop:4}}>📱 Le numéro de téléphone servira d'identifiant de connexion.</div>
      </Modal>
    </div>
  );
}

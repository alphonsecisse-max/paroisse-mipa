// MON PROFIL
// ─────────────────────────────────────────────
function Profil({ user, db, setDb }) {
  const [edit, setEdit] = useState(false);
  const [form, setForm] = useState({ prenom:user.prenom, nom:user.nom, telephone:user.telephone, adresse:user.adresse||"", groupe:user.groupe||"" });
  const [pw, setPw] = useState({ old:"", new1:"", new2:"" });
  const [tab, setTab] = useState("info");
  const [msg, setMsg] = useState({ type:"", text:"" });

  const formule = FORMULES.find(f => f.id === user.formule);
  const paid = Object.values(user.cotisations||{}).filter(s=>s==="validé").length;

  const saveProfile = () => {
    const updated = db.users.map(u => u.id===user.id ? {...u,...form} : u);
    setDb({...db, users:updated});
    Object.assign(user, form);
    setEdit(false);
    setMsg({ type:"success", text:"Profil mis à jour !" });
    setTimeout(() => setMsg({type:"",text:""}), 4000);
  };
  const changePw = () => {
    if (!pw.old||!pw.new1||!pw.new2) return setMsg({type:"error",text:"Remplissez tous les champs."});
    if (pw.old !== user.password) return setMsg({type:"error",text:"Ancien mot de passe incorrect."});
    if (pw.new1 !== pw.new2) return setMsg({type:"error",text:"Mots de passe différents."});
    if (pw.new1.length < 6) return setMsg({type:"error",text:"Minimum 6 caractères."});
    const updated = db.users.map(u => u.id===user.id ? {...u, password:pw.new1} : u);
    setDb({...db, users:updated}); user.password = pw.new1;
    setPw({old:"",new1:"",new2:""});
    setMsg({type:"success",text:"Mot de passe modifié !"});
    setTimeout(() => setMsg({type:"",text:""}), 4000);
  };

  return (
    <div className="page">
      <div className="profile-hero">
        <div className="profile-avatar">{user.prenom[0]}{user.nom[0]}</div>
        <div style={{ flex:1 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:4 }}>
            <div className="profile-name">{user.prenom} {user.nom}</div>
            <RoleBadge role={user.role} />
          </div>
          <div className="profile-info">📧 {user.email||"—"} · 📱 {user.telephone} · 🎵 {user.groupe||"—"}</div>
          <div style={{ color:"rgba(255,255,255,0.5)", fontSize:12, marginTop:4 }}>Membre depuis {user.createdAt}</div>
        </div>
      </div>

      <Alert type={msg.type} msg={msg.text} />

      <div className="g2">
        <div className="card">
          <div className="tabs">
            {[["info","👤 Informations"],["security","🔒 Sécurité"]].map(([k,l]) => (
              <div key={k} className={`tab ${tab===k?"active":""}`} onClick={() => setTab(k)}>{l}</div>
            ))}
          </div>

          {tab === "info" && (
            edit ? (
              <>
                <div className="g2">
                  <div className="form-group"><label>Prénom</label><input value={form.prenom} onChange={e=>setForm({...form,prenom:e.target.value})} /></div>
                  <div className="form-group"><label>Nom</label><input value={form.nom} onChange={e=>setForm({...form,nom:e.target.value})} /></div>
                </div>
                <div className="form-group"><label>Téléphone</label><input value={form.telephone} onChange={e=>setForm({...form,telephone:e.target.value})} /></div>
                <div className="form-group"><label>Adresse</label><input value={form.adresse} onChange={e=>setForm({...form,adresse:e.target.value})} /></div>
                <div className="form-group"><label>Groupe</label>
                  <select value={form.groupe} onChange={e=>setForm({...form,groupe:e.target.value})}>
                    {GROUPES.map(g=><option key={g} value={g}>{g}</option>)}
                  </select>
                </div>
                <div style={{ display:"flex", gap:10 }}>
                  <button className="btn btn-primary" onClick={saveProfile}>💾 Sauvegarder</button>
                  <button className="btn btn-secondary" onClick={() => setEdit(false)}>Annuler</button>
                </div>
              </>
            ) : (
              <>
                {[["📧","Email",user.email||"—"],["📱","Téléphone",user.telephone],["📍","Adresse",user.adresse||"—"],["🎵","Groupe",user.groupe||"—"]].map(([ic,lb,val]) => (
                  <div key={lb} style={{ display:"flex", gap:12, alignItems:"center", padding:"10px 0", borderBottom:"1px solid #f1f5f9" }}>
                    <span style={{ fontSize:20 }}>{ic}</span>
                    <div><div style={{ fontSize:11, color:"#94a3b8", textTransform:"uppercase", letterSpacing:"0.5px" }}>{lb}</div>
                    <div style={{ fontWeight:600, fontSize:14 }}>{val}</div></div>
                  </div>
                ))}
                <button className="btn btn-secondary btn-sm" style={{ marginTop:14 }} onClick={() => setEdit(true)}>✏️ Modifier mes informations</button>
              </>
            )
          )}

          {tab === "security" && (
            <div style={{paddingTop:4}}>
              <div style={{padding:"12px 16px",background:"#f8fafc",borderRadius:10,marginBottom:18,display:"flex",gap:12,alignItems:"center"}}>
                <span style={{fontSize:28}}>🔒</span>
                <div>
                  <div style={{fontWeight:700,fontSize:13,color:"#0f2850"}}>Changer mon mot de passe</div>
                  <div style={{fontSize:12,color:"#64748b",marginTop:2}}>Utilisez un mot de passe d'au moins 6 caractères.</div>
                </div>
              </div>
              <div className="form-group">
                <label>Mot de passe actuel</label>
                <EyeInput value={pw.old} onChange={e=>setPw({...pw,old:e.target.value})} placeholder="Entrez votre mot de passe actuel"/>
              </div>
              <div className="form-group">
                <label>Nouveau mot de passe</label>
                <EyeInput value={pw.new1} onChange={e=>setPw({...pw,new1:e.target.value})} placeholder="Nouveau mot de passe (min. 6 car.)"/>
                {pw.new1 && pw.new1.length < 6 && (
                  <div style={{fontSize:12,color:"#dc2626",marginTop:4}}>⚠️ Minimum 6 caractères requis.</div>
                )}
              </div>
              <div className="form-group">
                <label>Confirmer le nouveau mot de passe</label>
                <EyeInput value={pw.new2} onChange={e=>setPw({...pw,new2:e.target.value})} placeholder="Répéter le nouveau mot de passe"/>
                {pw.new2 && pw.new1 !== pw.new2 && (
                  <div style={{fontSize:12,color:"#dc2626",marginTop:4}}>⚠️ Les mots de passe ne correspondent pas.</div>
                )}
              </div>
              <button className="btn btn-primary" onClick={changePw}
                disabled={!pw.old||!pw.new1||!pw.new2||pw.new1.length<6||pw.new1!==pw.new2}
                style={{width:"100%",padding:11}}>
                🔒 Mettre à jour le mot de passe
              </button>
            </div>
          )}
        </div>

        {/* Résumé cotisations */}
        <div className="card">
          <div className="card-title"><span>📊</span> Mes cotisations</div>
          {formule ? (
            <>
              <div style={{ background:"#eff6ff", borderRadius:12, padding:16, marginBottom:16 }}>
                <div style={{ fontSize:12, color:"#64748b" }}>Formule active</div>
                <div style={{ fontWeight:800, fontSize:20, color:"#0f2850" }}>{formule.label}</div>
                <div style={{ color:"#2563eb", fontSize:13 }}>{formule.monthly ? `${fmt(formule.monthly)} / mois` : "Montant libre (VIP)"}</div>
              </div>
              <div style={{ marginBottom:12 }}>
                <div style={{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:6 }}>
                  <span style={{ color:"#64748b" }}>Progression</span>
                  <span style={{ fontWeight:700, color:"#1e40af" }}>{paid}/10 — {Math.round((paid/10)*100)}%</span>
                </div>
                <div className="prog-bar"><div className="prog-fill" style={{ width:`${(paid/10)*100}%` }} /></div>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                {MOIS.map((m,i) => {
                  const st = user.cotisations?.[i];
                  return (
                    <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
                      padding:"8px 12px", background:"#f8fafc", borderRadius:8 }}>
                      <span style={{ fontSize:13, fontWeight:500 }}>{m}</span>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <span style={{ fontSize:12, color:"#94a3b8" }}>{formule.monthly ? fmt(formule.monthly) : "Libre"}</span>
                        <StatusBadge status={st} />
                      </div>
                    </div>
                  );
                })}
              </div>
            </>
          ) : <div className="alert alert-info">Aucune formule choisie.</div>}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// ADMIN — MEMBRES (modif profil + rôle, pas paiements)
// ─────────────────────────────────────────────
function Membres({ currentUser, db, setDb }) {
  const [search, setSearch]       = useState("");
  const [filterRole, setFilterRole] = useState("tous");
  const [filterActif, setFilterActif] = useState("tous");
  const [editU, setEditU]         = useState(null);
  const [form, setForm]           = useState({});
  const [editTab, setEditTab]     = useState("info");
  const [msg, setMsg]             = useState({type:"",text:""});
  const [confirmRole, setConfirmRole] = useState(null);

  const allMembers = db.users.filter(u => u.id !== "superadmin");
  const members = allMembers.filter(u => {
    const txt = (u.prenom+" "+u.nom+" "+u.email+" "+u.groupe+" "+u.telephone).toLowerCase();
    const roleOk  = filterRole==="tous" || u.role===filterRole;
    const actifOk = filterActif==="tous" || (filterActif==="actif"?u.actif!==false:u.actif===false);
    return txt.includes(search.toLowerCase()) && roleOk && actifOk;
  });

  const openEdit = (u) => {
    setEditU(u);
    setForm({ prenom:u.prenom, nom:u.nom, email:u.email||"", telephone:u.telephone,
      adresse:u.adresse||"", groupe:u.groupe||"", role:u.role, actif:u.actif!==false });
    setMsg({type:"",text:""}); setEditTab("info");
  };

  const saveEdit = () => {
    if (!form.prenom||!form.nom||!form.telephone) return setMsg({type:"error",text:"Prénom, nom et téléphone requis."});
    if (db.users.find(u=>u.telephone===form.telephone&&u.id!==editU.id)) return setMsg({type:"error",text:"Numéro déjà utilisé."});
    setDb({...db, users:db.users.map(u=>u.id===editU.id?{...u,...form}:u)});
    setMsg({type:"success",text:`Profil de ${form.prenom} ${form.nom} mis à jour.`});
    setTimeout(()=>{setMsg({type:"",text:""});setEditU(null);},2200);
  };

  const changeRole = (u, newRole) => {
    setDb({...db, users:db.users.map(x=>x.id===u.id?{...x,role:newRole}:x)});
    setConfirmRole(null);
  };

  const toggleActif = (u) => setDb({...db, users:db.users.map(x=>x.id===u.id?{...x,actif:!x.actif}:x)});

  const counts = {
    tous: allMembers.length,
    user: allMembers.filter(u=>u.role==="user").length,
    admin: allMembers.filter(u=>u.role==="admin"||u.role==="superadmin").length,
  };

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title">👥 Gestion des Membres</div>
        <div className="page-sub">Consultez, modifiez les profils et gérez les rôles</div>
      </div>

      {/* Filtres */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="🔍 Nom, email, groupe, téléphone…"
            style={{flex:1,minWidth:200}} />
          <select value={filterRole} onChange={e=>setFilterRole(e.target.value)} style={{width:"auto",padding:"10px 14px"}}>
            <option value="tous">Tous les rôles ({counts.tous})</option>
            <option value="user">👤 Membres ({counts.user})</option>
            <option value="admin">🛡️ Admins ({counts.admin})</option>
          </select>
          <select value={filterActif} onChange={e=>setFilterActif(e.target.value)} style={{width:"auto",padding:"10px 14px"}}>
            <option value="tous">Tous statuts</option>
            <option value="actif">✅ Actifs</option>
            <option value="inactif">❌ Inactifs</option>
          </select>
          {(search||filterRole!=="tous"||filterActif!=="tous") && (
            <button className="btn btn-secondary btn-sm" onClick={()=>{setSearch("");setFilterRole("tous");setFilterActif("tous");}}>
              ✕ Réinitialiser
            </button>
          )}
        </div>
        {members.length !== allMembers.length && (
          <div style={{fontSize:12,color:"#64748b",marginTop:8}}>
            {members.length} résultat{members.length>1?"s":""} sur {allMembers.length} membres
          </div>
        )}
      </div>

      <div className="card">
        <table>
          <thead><tr><th>Membre</th><th>Tél.</th><th>Groupe</th><th>Rôle</th><th>Cotisations</th><th>Statut</th><th>Actions</th></tr></thead>
          <tbody>
            {members.map(u => {
              const f = FORMULES.find(x=>x.id===u.formule);
              const paid = Object.values(u.cotisations||{}).filter(s=>s==="validé").length;
              return (
                <tr key={u.id}>
                  <td>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:34,height:34,borderRadius:"50%",flexShrink:0,
                        background:"linear-gradient(135deg,#2563eb,#1e40af)",
                        display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:12}}>
                        {u.prenom[0]}{u.nom[0]}</div>
                      <div>
                        <div style={{fontWeight:600}}>{u.prenom} {u.nom}</div>
                        <div style={{fontSize:11,color:"#94a3b8"}}>{u.email||"—"}</div>
                      </div>
                    </div>
                  </td>
                  <td style={{fontSize:13}}>{u.telephone}</td>
                  <td style={{fontSize:12,color:"#64748b"}}>{u.groupe||"—"}</td>
                  <td><RoleBadge role={u.role}/></td>
                  <td style={{fontSize:12}}>{f?<><b>{f.label}</b><br/><span style={{color:"#94a3b8"}}>{paid}/10</span></>:"—"}</td>
                  <td><span className={`badge ${u.actif!==false?"badge-green":"badge-red"}`}>{u.actif!==false?"✅ Actif":"❌ Inactif"}</span></td>
                  <td>
                    <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                      <button className="btn btn-primary btn-xs" onClick={()=>openEdit(u)}>✏️ Modifier</button>
                      {currentUser.role==="superadmin" && u.role==="user" &&
                        <button className="btn btn-secondary btn-xs" onClick={()=>setConfirmRole({user:u,to:"admin"})}>⬆ Admin</button>}
                      {currentUser.role==="superadmin" && u.role==="admin" &&
                        <button className="btn btn-secondary btn-xs" onClick={()=>setConfirmRole({user:u,to:"user"})}>⬇ Membre</button>}
                      <button className={`btn btn-xs ${u.actif!==false?"btn-danger":"btn-secondary"}`} onClick={()=>toggleActif(u)}>
                        {u.actif!==false?"Désactiver":"Activer"}
                      </button>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {members.length===0 && (
          <div style={{textAlign:"center",padding:40,color:"#94a3b8"}}>Aucun résultat trouvé.</div>
        )}
      </div>

      {/* Modal modifier profil (admin) — info + rôle seulement, pas paiements */}
      <Modal open={!!editU} onClose={()=>setEditU(null)} title={`✏️ ${editU?.prenom} ${editU?.nom}`} wide
        footer={<>
          <button className="btn btn-secondary" onClick={()=>setEditU(null)}>Annuler</button>
          <button className="btn btn-primary" onClick={saveEdit}>💾 Enregistrer</button>
        </>}>
        {editU && (
          <>
            <Alert type={msg.type} msg={msg.text}/>
            <div className="tabs">
              {[["info","👤 Informations"],["role","🛡️ Rôle & Accès"]].map(([k,l])=>(
                <div key={k} className={`tab ${editTab===k?"active":""}`} onClick={()=>setEditTab(k)}>{l}</div>
              ))}
            </div>

            {editTab==="info" && (
              <>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <div className="form-group"><label>Prénom *</label>
                    <input value={form.prenom} onChange={e=>setForm({...form,prenom:e.target.value})} /></div>
                  <div className="form-group"><label>Nom *</label>
                    <input value={form.nom} onChange={e=>setForm({...form,nom:e.target.value})} /></div>
                </div>
                <div className="form-group"><label>Email</label>
                  <input type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} /></div>
                <div className="form-group"><label>Téléphone *</label>
                  <input type="tel" value={form.telephone} onChange={e=>setForm({...form,telephone:e.target.value})} /></div>
                <div className="form-group"><label>Adresse</label>
                  <input value={form.adresse} onChange={e=>setForm({...form,adresse:e.target.value})} /></div>
                <div className="form-group"><label>Groupe paroissial</label>
                  <select value={form.groupe} onChange={e=>setForm({...form,groupe:e.target.value})}>
                    <option value="">— Aucun —</option>
                    {GROUPES.map(g=><option key={g} value={g}>{g}</option>)}
                  </select>
                </div>
              </>
            )}

            {editTab==="role" && (
              <>
                <div className="form-group"><label>Rôle</label>
                  <select value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                    <option value="user">👤 Membre</option>
                    <option value="admin">🛡️ Administrateur</option>
                  </select>
                </div>
                <div className="alert alert-info" style={{marginBottom:12}}>
                  Les administrateurs peuvent valider des paiements, gérer les annonces et voir tous les membres. Ils n'ont pas accès aux cotisations directes ni aux mots de passe.
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <input type="checkbox" id="actifMember" checked={form.actif} onChange={e=>setForm({...form,actif:e.target.checked})} style={{width:"auto"}}/>
                  <label htmlFor="actifMember" style={{marginBottom:0,textTransform:"none",fontSize:13}}>
                    Compte actif <span style={{color:"#94a3b8"}}>(décocher pour bloquer la connexion)</span>
                  </label>
                </div>
              </>
            )}
          </>
        )}
      </Modal>

      {/* Confirm changement de rôle rapide (superadmin uniquement) */}
      <Modal open={!!confirmRole} onClose={()=>setConfirmRole(null)} title="Confirmer le changement de rôle"
        footer={<>
          <button className="btn btn-secondary" onClick={()=>setConfirmRole(null)}>Annuler</button>
          <button className="btn btn-primary" onClick={()=>changeRole(confirmRole.user,confirmRole.to)}>Confirmer</button>
        </>}>
        {confirmRole && (
          <p>Vous allez <b>{confirmRole.to==="admin"?"promouvoir en Administrateur":"rétrograder en Membre"}</b> :{" "}
          <b>{confirmRole.user.prenom} {confirmRole.user.nom}</b>.</p>
        )}
      </Modal>
    </div>
  );
}

// ─────────────────────────────────────────────
// ADMIN — PAIEMENTS (filtres + revalidation)
// ─────────────────────────────────────────────
function PaiementsAdmin({ db, setDb, currentUser }) {
  const [tab,          setTab]          = useState("pending");
  const [search,       setSearch]       = useState("");
  const [filterMethod, setFilterMethod] = useState("tous");
  const [filterType,   setFilterType]   = useState("tous");
  const [filterDate,   setFilterDate]   = useState("");
  const [confirmAnnul, setConfirmAnnul] = useState(null); // paiement à annuler/remettre

  const all = db.pendingPayments||[];
  const pending = all.filter(p=>p.status==="en_attente");
  const valides = all.filter(p=>p.status==="validé");
  const rejetes = all.filter(p=>p.status==="rejeté");
  const listByTab = tab==="pending"?pending:tab==="valides"?valides:rejetes;

  // Filtrage
  const filtered = listByTab.filter(p => {
    const txt = (p.userName+" "+p.mois+" "+(p.transaction_id||"")).toLowerCase();
    const methodOk = filterMethod==="tous" || p.methode===filterMethod;
    const typeOk   = filterType==="tous"   || (p.type||"cotisation")===filterType;
    const dateOk   = !filterDate           || p.date===filterDate.split("-").reverse().join("/");
    return txt.includes(search.toLowerCase()) && methodOk && typeOk && dateOk;
  });

  const resetFilters = () => { setSearch(""); setFilterMethod("tous"); setFilterType("tous"); setFilterDate(""); };
  const hasFilters = search||filterMethod!=="tous"||filterType!=="tous"||filterDate;

  const valider = (p) => {
    const pms = all.map(x=>x.id===p.id?{...x,status:"validé"}:x);
    let users = db.users;
    if ((p.type||"cotisation")==="cotisation" && p.moisIdx!=null) {
      users = db.users.map(u=>{
        if(u.id!==p.userId) return u;
        const c={...(u.cotisations||{})}; c[p.moisIdx]="validé";
        return {...u,cotisations:c};
      });
    }
    setDb({...db,pendingPayments:pms,users});
  };

  const rejeter = (p) => {
    const pms = all.map(x=>x.id===p.id?{...x,status:"rejeté"}:x);
    let users = db.users;
    if ((p.type||"cotisation")==="cotisation" && p.moisIdx!=null) {
      users = db.users.map(u=>{
        if(u.id!==p.userId) return u;
        const c={...(u.cotisations||{})}; delete c[p.moisIdx];
        return {...u,cotisations:c};
      });
    }
    setDb({...db,pendingPayments:pms,users});
  };

  const revalider = (p) => {
    const pms = all.map(x=>x.id===p.id?{...x,status:"en_attente"}:x);
    let users = db.users;
    if ((p.type||"cotisation")==="cotisation" && p.moisIdx!=null) {
      users = db.users.map(u=>{
        if(u.id!==p.userId) return u;
        const c={...(u.cotisations||{})}; c[p.moisIdx]="en_attente";
        return {...u,cotisations:c};
      });
    }
    setDb({...db,pendingPayments:pms,users});
    setTab("pending");
  };

  const MIcon = ({m}) => <>{m==="Wave"?"🌊":m==="Orange Money"?"🟠":"🏦"} {m}</>;

  // Superadmin : remettre un paiement validé en attente
  const remettreEnAttente = (p) => {
    const pms = all.map(x=>x.id===p.id?{...x,status:"en_attente"}:x);
    let users = db.users;
    if ((p.type||"cotisation")==="cotisation" && p.moisIdx!=null) {
      users = db.users.map(u=>{
        if(u.id!==p.userId) return u;
        const c={...(u.cotisations||{})}; c[p.moisIdx]="en_attente";
        return {...u,cotisations:c};
      });
    }
    setDb({...db,pendingPayments:pms,users});
    setConfirmAnnul(null);
    setTab("pending");
  };

  // Superadmin : annuler définitivement un paiement validé
  const annulerDefinitif = (p) => {
    const pms = all.map(x=>x.id===p.id?{...x,status:"annulé"}:x);
    let users = db.users;
    if ((p.type||"cotisation")==="cotisation" && p.moisIdx!=null) {
      users = db.users.map(u=>{
        if(u.id!==p.userId) return u;
        const c={...(u.cotisations||{})}; delete c[p.moisIdx];
        return {...u,cotisations:c};
      });
    }
    setDb({...db,pendingPayments:pms,users});
    setConfirmAnnul(null);
  };

  const TypeBadge = ({type}) => type==="supplement"
    ? <span className="badge" style={{background:"#f5f3ff",color:"#7c3aed"}}>🌟 Supplément</span>
    : <span className="badge badge-blue">💰 Cotisation</span>;

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title">💳 Gestion des paiements</div>
        <div className="page-sub">Validez, rejetez ou retraitez les paiements — cotisations et suppléments</div>
      </div>

      {/* Compteurs cliquables */}
      <div className="g3" style={{marginBottom:18}}>
        {[
          {ico:"⏳",bg:"#fef9c3",bd:"#fde047",val:pending.length,lbl:"En attente",t:"pending"},
          {ico:"✅",bg:"#dcfce7",bd:"#86efac",val:valides.length,lbl:"Validés",t:"valides"},
          {ico:"❌",bg:"#fee2e2",bd:"#fca5a5",val:rejetes.length,lbl:"Rejetés",t:"rejetes"},
        ].map(s=>(
          <div key={s.t} className="stat" style={{borderLeftColor:s.bd,cursor:"pointer"}} onClick={()=>setTab(s.t)}>
            <div className="stat-ico" style={{background:s.bg}}>{s.ico}</div>
            <div><div className="stat-val">{s.val}</div><div className="stat-lbl">{s.lbl}</div></div>
          </div>
        ))}
      </div>

      {/* Filtres */}
      <div className="card" style={{marginBottom:14}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="🔍 Nom du membre, mois, référence…"
            style={{flex:1,minWidth:180}}/>
          <select value={filterMethod} onChange={e=>setFilterMethod(e.target.value)} style={{width:"auto",padding:"10px 14px"}}>
            <option value="tous">Toutes méthodes</option>
            <option value="Wave">🌊 Wave</option>
            <option value="Orange Money">🟠 Orange Money</option>
            <option value="Virement Bancaire">🏦 Virement</option>
          </select>
          <select value={filterType} onChange={e=>setFilterType(e.target.value)} style={{width:"auto",padding:"10px 14px"}}>
            <option value="tous">Tous types</option>
            <option value="cotisation">💰 Cotisations</option>
            <option value="supplement">🌟 Suppléments</option>
          </select>
          <input type="date" value={filterDate} onChange={e=>setFilterDate(e.target.value)}
            title="Filtrer par date" style={{width:"auto",padding:"10px 14px"}}/>
          {hasFilters && (
            <button className="btn btn-secondary btn-sm" onClick={resetFilters}>✕ Réinitialiser</button>
          )}
        </div>
        {hasFilters && (
          <div style={{fontSize:12,color:"#64748b",marginTop:8}}>
            {filtered.length} résultat{filtered.length>1?"s":""} sur {listByTab.length} dans cet onglet
          </div>
        )}
      </div>

      {/* Onglets */}
      <div className="tabs">
        <div className={`tab ${tab==="pending"?"active":""}`} onClick={()=>setTab("pending")}>⏳ En attente ({pending.length})</div>
        <div className={`tab ${tab==="valides"?"active":""}`} onClick={()=>setTab("valides")}>✅ Validés ({valides.length})</div>
        <div className={`tab ${tab==="rejetes"?"active":""}`} onClick={()=>setTab("rejetes")}>❌ Rejetés ({rejetes.length})</div>
      </div>

      {tab==="rejetes" && rejetes.length>0 && (
        <div className="alert alert-warn" style={{marginBottom:12}}>
          ⚠️ Cliquez sur <b>↩️ Revalider</b> pour remettre un paiement rejeté en attente, puis validez-le.
        </div>
      )}

      {tab==="valides" && currentUser?.role==="superadmin" && valides.length>0 && (
        <div className="alert alert-warn" style={{marginBottom:12}}>
          👑 En tant que Super Admin, vous pouvez <b>remettre en attente</b> ou <b>annuler définitivement</b> un paiement déjà validé.
        </div>
      )}

      <div className="card">
        {filtered.length===0 ? (
          <div style={{textAlign:"center",padding:40,color:"#94a3b8"}}>
            {hasFilters?"Aucun résultat pour ces filtres.":
              tab==="pending"?"Aucun paiement en attente.":
              tab==="valides"?"Aucun paiement validé.":"Aucun paiement rejeté."}
          </div>
        ) : (
          <table>
            <thead>
              <tr>
                <th>Membre</th><th>Type</th><th>Mois / Objet</th><th>Montant</th>
                <th>Méthode</th><th>Réf.</th><th>Date</th><th>Statut</th><th>Actions</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(p => (
                <tr key={p.id}>
                  <td style={{fontWeight:600}}>{p.userName}</td>
                  <td><TypeBadge type={p.type}/></td>
                  <td>{p.mois}</td>
                  <td style={{fontWeight:700,color:(p.type||"cotisation")==="supplement"?"#7c3aed":"#1e40af"}}>
                    {fmt(p.montant)}
                  </td>
                  <td style={{fontSize:12}}><MIcon m={p.methode}/></td>
                  <td style={{fontSize:11,color:"#94a3b8",maxWidth:110,overflow:"hidden",textOverflow:"ellipsis"}}>{p.transaction_id||"—"}</td>
                  <td style={{fontSize:12,color:"#94a3b8"}}>{p.date}</td>
                  <td><StatusBadge status={p.status}/></td>
                  <td>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                      {tab==="pending" && <>
                        <button className="btn btn-primary btn-xs" onClick={()=>valider(p)}>✅ Valider</button>
                        <button className="btn btn-danger btn-xs"  onClick={()=>rejeter(p)}>❌ Rejeter</button>
                      </>}
                      {tab==="rejetes" && <button className="btn btn-gold btn-xs" onClick={()=>revalider(p)}>↩️ Revalider</button>}
                      {tab==="valides" && (
                        currentUser?.role==="superadmin" ? (
                          <>
                            <button className="btn btn-gold btn-xs" onClick={()=>setConfirmAnnul({p,action:"attente"})}>
                              ↩️ En attente
                            </button>
                            <button className="btn btn-danger btn-xs" onClick={()=>setConfirmAnnul({p,action:"annuler"})}>
                              🗑️ Annuler
                            </button>
                          </>
                        ) : (
                          <span style={{fontSize:12,color:"#16a34a"}}>✓ Finalisé</span>
                        )
                      )}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {/* Modal confirmation superadmin */}
      <Modal open={!!confirmAnnul} onClose={()=>setConfirmAnnul(null)}
        title={confirmAnnul?.action==="attente" ? "↩️ Remettre en attente" : "🗑️ Annuler le paiement"}
        footer={<>
          <button className="btn btn-secondary" onClick={()=>setConfirmAnnul(null)}>Annuler</button>
          <button
            className={`btn ${confirmAnnul?.action==="attente"?"btn-gold":"btn-danger"}`}
            onClick={()=>confirmAnnul?.action==="attente"
              ? remettreEnAttente(confirmAnnul.p)
              : annulerDefinitif(confirmAnnul.p)}>
            {confirmAnnul?.action==="attente" ? "↩️ Confirmer — Remettre en attente" : "🗑️ Confirmer — Annuler définitivement"}
          </button>
        </>}>
        {confirmAnnul && (
          <div>
            <div style={{marginBottom:14,padding:14,background:"#f8fafc",borderRadius:10,fontSize:13}}>
              <div style={{fontWeight:700,color:"#0f2850",marginBottom:6}}>Paiement concerné :</div>
              <div>👤 <b>{confirmAnnul.p.userName}</b></div>
              <div>📅 {confirmAnnul.p.mois} · 💰 {fmt(confirmAnnul.p.montant)} · {confirmAnnul.p.date}</div>
              <div style={{marginTop:4,color:"#64748b"}}>Réf. : {confirmAnnul.p.transaction_id||"—"}</div>
            </div>
            {confirmAnnul.action==="attente" ? (
              <div className="alert alert-warn">
                Ce paiement sera remis en statut <b>En attente</b> et devra être revalidé.
                {(confirmAnnul.p.type||"cotisation")==="cotisation" && " Le mois correspondant sera remis en attente dans le profil du membre."}
              </div>
            ) : (
              <div className="alert alert-error">
                ⚠️ Cette action est <b>définitive</b>. Le paiement sera marqué comme <b>annulé</b> et le mois correspondant sera retiré du profil du membre.
              </div>
            )}
          </div>
        )}
      </Modal>
    </div>
  );
}

// ─────────────────────────────────────────────
// ADMIN — GÉRER ANNONCES (avec médias)
// ─────────────────────────────────────────────
function ManageAnnonces({ db, setDb, currentUser }) {
  const [show, setShow] = useState(false);
  const [editAnn, setEditAnn] = useState(null);
  const [form, setForm] = useState({ titre:"", contenu:"", categorie:"événement", pinned:false, media:null, mediaType:null, mediaName:null });
  const [mediaLoading, setMediaLoading] = useState(false);

  const EMPTY = { titre:"", contenu:"", categorie:"événement", pinned:false, media:null, mediaType:null, mediaName:null };

  const openNew = () => { setEditAnn(null); setForm(EMPTY); setShow(true); };
  const openEdit = a => {
    setEditAnn(a);
    setForm({ titre:a.titre, contenu:a.contenu, categorie:a.categorie||"événement", pinned:a.pinned,
      media:a.media||null, mediaType:a.mediaType||null, mediaName:a.mediaName||null });
    setShow(true);
  };

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    // Limite 5 Mo
    if (file.size > 5*1024*1024) { alert("Fichier trop volumineux (max 5 Mo)"); return; }
    setMediaLoading(true);
    const reader = new FileReader();
    reader.onload = ev => {
      let type = "document";
      if (file.type.startsWith("image/")) type = "image";
      else if (file.type.startsWith("video/")) type = "video";
      else if (file.type === "application/pdf") type = "pdf";
      setForm(f => ({...f, media:ev.target.result, mediaType:type, mediaName:file.name}));
      setMediaLoading(false);
    };
    reader.readAsDataURL(file);
  };

  const removeMedia = () => setForm(f=>({...f,media:null,mediaType:null,mediaName:null}));

  const save = () => {
    if (!form.titre||!form.contenu) return;
    if (editAnn) setDb({...db, annonces:db.annonces.map(a=>a.id===editAnn.id?{...a,...form}:a)});
    else setDb({...db, annonces:[{...form, id:genId(), auteur:currentUser.id, date:new Date().toLocaleDateString("fr-FR")},...db.annonces]});
    setShow(false);
  };

  const mediaIcon = { image:"🖼️", video:"🎬", pdf:"📄", document:"📎" };
  const catColors = { événement:"#eff6ff", collecte:"#fef9c3", liturgie:"#dcfce7", formation:"#fdf4ff" };
  const catIcons  = { événement:"🎪", collecte:"🙏", liturgie:"⛪", formation:"📖" };

  return (
    <div className="page">
      <div className="page-header" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div className="page-title">📝 Gérer les annonces</div>
          <div className="page-sub">Créez des annonces avec texte, images, vidéos ou documents PDF</div>
        </div>
        <button className="btn btn-primary" onClick={openNew}>➕ Nouvelle annonce</button>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {db.annonces.map(ann => (
          <div key={ann.id} className="card" style={{display:"flex",gap:16,alignItems:"flex-start"}}>
            {/* Miniature média */}
            <div style={{width:72,height:72,borderRadius:10,flexShrink:0,overflow:"hidden",
              background:catColors[ann.categorie]||"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center"}}>
              {ann.mediaType==="image" && ann.media
                ? <img src={ann.media} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} />
                : ann.mediaType
                  ? <span style={{fontSize:28}}>{mediaIcon[ann.mediaType]||"📎"}</span>
                  : <span style={{fontSize:28}}>{catIcons[ann.categorie]||"📌"}</span>
              }
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",gap:6,marginBottom:6,flexWrap:"wrap"}}>
                {ann.pinned && <span className="badge badge-blue">📌 Épinglée</span>}
                <span className="badge badge-gray">{ann.date}</span>
                {ann.categorie && <span className="badge badge-gray">{catIcons[ann.categorie]} {ann.categorie}</span>}
                {ann.mediaType && <span className="badge badge-blue">{mediaIcon[ann.mediaType]} {ann.mediaType==="image"?"Image":ann.mediaType==="video"?"Vidéo":ann.mediaType==="pdf"?"PDF":"Document"}</span>}
              </div>
              <div style={{fontWeight:700,fontSize:14,color:"#0f2850",marginBottom:3}}>{ann.titre}</div>
              <div style={{fontSize:12,color:"#64748b"}}>{ann.contenu.substring(0,130)}…</div>
            </div>
            <div style={{display:"flex",gap:5,flexShrink:0,flexDirection:"column"}}>
              <button className="btn btn-secondary btn-xs" onClick={()=>setDb({...db,annonces:db.annonces.map(a=>a.id===ann.id?{...a,pinned:!a.pinned}:a)})}>
                {ann.pinned?"Désépingler":"📌 Épingler"}
              </button>
              <button className="btn btn-secondary btn-xs" onClick={()=>openEdit(ann)}>✏️ Modifier</button>
              <button className="btn btn-danger btn-xs" onClick={()=>setDb({...db,annonces:db.annonces.filter(a=>a.id!==ann.id)})}>🗑️ Supprimer</button>
            </div>
          </div>
        ))}
      </div>

      <Modal open={show} onClose={()=>setShow(false)} title={editAnn?"✏️ Modifier l'annonce":"➕ Nouvelle annonce"} wide
        footer={<>
          <button className="btn btn-secondary" onClick={()=>setShow(false)}>Annuler</button>
          <button className="btn btn-primary" onClick={save} disabled={!form.titre||!form.contenu}>💾 Sauvegarder</button>
        </>}>

        <div className="form-group"><label>Titre *</label>
          <input value={form.titre} onChange={e=>setForm({...form,titre:e.target.value})} placeholder="Titre de l'annonce" />
        </div>
        <div className="form-group"><label>Contenu *</label>
          <textarea rows={4} value={form.contenu} onChange={e=>setForm({...form,contenu:e.target.value})}
            placeholder="Rédigez le contenu de l'annonce…" style={{resize:"vertical"}} />
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div className="form-group"><label>Catégorie</label>
            <select value={form.categorie} onChange={e=>setForm({...form,categorie:e.target.value})}>
              {["événement","collecte","liturgie","formation"].map(c=><option key={c} value={c}>{catIcons[c]} {c}</option>)}
            </select>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10,paddingTop:22}}>
            <input type="checkbox" id="pin2" checked={form.pinned} onChange={e=>setForm({...form,pinned:e.target.checked})} style={{width:"auto"}} />
            <label htmlFor="pin2" style={{marginBottom:0,textTransform:"none",fontSize:13}}>📌 Épingler</label>
          </div>
        </div>

        {/* Section média */}
        <div style={{marginTop:4}}>
          <label>Média joint (image, vidéo ou PDF — max 5 Mo)</label>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,margin:"8px 0 12px"}}>
            {[
              {t:"image",icon:"🖼️",label:"Image",accept:"image/*"},
              {t:"video",icon:"🎬",label:"Vidéo",accept:"video/*"},
              {t:"pdf",  icon:"📄",label:"PDF",  accept:"application/pdf"},
            ].map(opt=>(
              <label key={opt.t} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,
                padding:"10px 8px",borderRadius:10,border:`2px solid ${form.mediaType===opt.t?"#2563eb":"#e2e8f0"}`,
                background:form.mediaType===opt.t?"#eff6ff":"#f8fafc",cursor:"pointer",transition:"all 0.15s",
                fontSize:12,fontWeight:600,color:form.mediaType===opt.t?"#1e40af":"#64748b"}}>
                <span style={{fontSize:24}}>{opt.icon}</span>
                {opt.label}
                <input type="file" accept={opt.accept} onChange={handleFile} style={{display:"none"}} />
              </label>
            ))}
          </div>

          {mediaLoading && (
            <div style={{display:"flex",alignItems:"center",gap:8,padding:12,background:"#f8fafc",borderRadius:8,fontSize:13}}>
              <div className="spinner" style={{width:20,height:20,borderWidth:3}} /> Chargement du fichier…
            </div>
          )}

          {form.media && !mediaLoading && (
            <div style={{border:"1px solid #e2e8f0",borderRadius:10,overflow:"hidden",marginTop:4}}>
              {form.mediaType==="image" && (
                <img src={form.media} alt="preview" style={{width:"100%",maxHeight:200,objectFit:"cover",display:"block"}} />
              )}
              {form.mediaType==="video" && (
                <video src={form.media} controls style={{width:"100%",maxHeight:200,display:"block",background:"#000"}} />
              )}
              {form.mediaType==="pdf" && (
                <div style={{padding:16,display:"flex",alignItems:"center",gap:12,background:"#fef2f2"}}>
                  <span style={{fontSize:32}}>📄</span>
                  <div>
                    <div style={{fontWeight:700,color:"#0f2850",fontSize:13}}>{form.mediaName}</div>
                    <div style={{fontSize:11,color:"#64748b"}}>Document PDF joint</div>
                  </div>
                </div>
              )}
              <div style={{padding:"8px 12px",background:"#f8fafc",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12,color:"#64748b"}}>{mediaIcon[form.mediaType]} {form.mediaName||form.mediaType}</span>
                <button className="btn btn-danger btn-xs" onClick={removeMedia}>✕ Retirer</button>
              </div>
            </div>
          )}
        </div>
      </Modal>
    </div>
  );
}

// ─────────────────────────────────────────────
// SUPERADMIN — COTISATIONS DIRECTES (recherche + filtres)
// ─────────────────────────────────────────────
function AdminCotisations({ db, setDb }) {
  const [search,   setSearch]   = useState("");
  const [filterRole, setFilterRole] = useState("tous");
  const [filterFormule, setFilterFormule] = useState("tous");
  const [filterStatut, setFilterStatut] = useState("tous");
  const [sel,      setSel]      = useState("");
  const [months,   setMonths]   = useState([]);
  const [formule,  setFormule]  = useState("");
  const [msg,      setMsg]      = useState({type:"",text:""});

  const allUsers = db.users.filter(u=>u.role!=="superadmin");

  // Filtrage de la liste de recherche
  const filteredUsers = allUsers.filter(u => {
    const txt = (u.prenom+" "+u.nom+" "+u.email+" "+u.telephone+" "+u.groupe).toLowerCase();
    const paid = Object.values(u.cotisations||{}).filter(s=>s==="validé").length;
    const pend = Object.values(u.cotisations||{}).filter(s=>s==="en_attente").length;
    const roleOk    = filterRole==="tous" || u.role===filterRole;
    const formOk    = filterFormule==="tous" || u.formule===filterFormule;
    const statutOk  = filterStatut==="tous"
      || (filterStatut==="complet" && paid===10)
      || (filterStatut==="en_cours" && paid>0 && paid<10)
      || (filterStatut==="aucun"    && paid===0 && pend===0)
      || (filterStatut==="attente"  && pend>0);
    return txt.includes(search.toLowerCase()) && roleOk && formOk && statutOk;
  });

  const u = allUsers.find(x=>x.id===sel);

  const apply = () => {
    if (!u) return;
    const newCot = {...(u.cotisations||{})};
    months.forEach(m => { newCot[m]="validé"; });
    setDb({...db, users:db.users.map(x=>x.id===u.id?{...x,cotisations:newCot,formule:formule||x.formule}:x)});
    setMsg({type:"success",text:`✅ ${months.length} mois validés pour ${u.prenom} ${u.nom}.`});
    setMonths([]);
    setTimeout(()=>setMsg({type:"",text:""}),5000);
  };

  const resetFilters = () => { setSearch(""); setFilterRole("tous"); setFilterFormule("tous"); setFilterStatut("tous"); };
  const hasFilters = search||filterRole!=="tous"||filterFormule!=="tous"||filterStatut!=="tous";

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title">👑 Cotisations directes</div>
        <div className="page-sub">Validez les paiements directement sans passer par la passerelle</div>
      </div>
      <Alert type={msg.type} msg={msg.text}/>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1.5fr",gap:18,alignItems:"start"}}>

        {/* ─ Panneau gauche : recherche & filtres ─ */}
        <div>
          <div className="card" style={{marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:13,color:"#0f2850",marginBottom:12}}>🔍 Rechercher un membre</div>
            <div className="form-group">
              <input value={search} onChange={e=>setSearch(e.target.value)}
                placeholder="Nom, email, téléphone, groupe…" />
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div className="form-group" style={{marginBottom:8}}>
                <label>Rôle</label>
                <select value={filterRole} onChange={e=>setFilterRole(e.target.value)}>
                  <option value="tous">Tous</option>
                  <option value="user">👤 Membres</option>
                  <option value="admin">🛡️ Admins</option>
                </select>
              </div>
              <div className="form-group" style={{marginBottom:8}}>
                <label>Formule</label>
                <select value={filterFormule} onChange={e=>setFilterFormule(e.target.value)}>
                  <option value="tous">Toutes</option>
                  {FORMULES.map(f=><option key={f.id} value={f.id}>{f.vip?"VIP — Libre":(f.total||0).toLocaleString("fr-FR")+" FCFA"}</option>)}
                  <option value="">Sans formule</option>
                </select>
              </div>
            </div>
            <div className="form-group" style={{marginBottom:hasFilters?8:0}}>
              <label>Avancement cotisations</label>
              <select value={filterStatut} onChange={e=>setFilterStatut(e.target.value)}>
                <option value="tous">Tous</option>
                <option value="complet">✅ Complet (10/10)</option>
                <option value="en_cours">🔄 En cours</option>
                <option value="attente">⏳ En attente de validation</option>
                <option value="aucun">○ Aucun paiement</option>
              </select>
            </div>
            {hasFilters && (
              <button className="btn btn-secondary btn-sm" onClick={resetFilters} style={{width:"100%"}}>
                ✕ Réinitialiser les filtres
              </button>
            )}
          </div>

          {/* Liste résultats */}
          <div className="card" style={{padding:0,overflow:"hidden"}}>
            <div style={{padding:"12px 16px",borderBottom:"1px solid #e2e8f0",fontSize:12,color:"#64748b",fontWeight:600}}>
              {filteredUsers.length} membre{filteredUsers.length>1?"s":""} trouvé{filteredUsers.length>1?"s":""}
            </div>
            <div style={{maxHeight:360,overflowY:"auto"}}>
              {filteredUsers.length===0 ? (
                <div style={{padding:20,textAlign:"center",color:"#94a3b8",fontSize:13}}>Aucun résultat.</div>
              ) : filteredUsers.map(usr => {
                const paid=Object.values(usr.cotisations||{}).filter(s=>s==="validé").length;
                const pend=Object.values(usr.cotisations||{}).filter(s=>s==="en_attente").length;
                const isSelected = sel===usr.id;
                return (
                  <div key={usr.id}
                    onClick={()=>{setSel(usr.id);setMonths([]);setFormule("");}}
                    style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",cursor:"pointer",
                      borderBottom:"1px solid #f1f5f9",
                      background:isSelected?"#eff6ff":"white",
                      borderLeft:isSelected?"3px solid #2563eb":"3px solid transparent",
                      transition:"all 0.12s"}}>
                    <div style={{width:34,height:34,borderRadius:"50%",flexShrink:0,
                      background:isSelected?"linear-gradient(135deg,#2563eb,#1e40af)":"linear-gradient(135deg,#94a3b8,#64748b)",
                      display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:12}}>
                      {usr.prenom[0]}{usr.nom[0]}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:13,color:"#0f2850"}}>{usr.prenom} {usr.nom}</div>
                      <div style={{fontSize:11,color:"#94a3b8"}}>{usr.groupe||usr.email||usr.telephone}</div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontSize:11,fontWeight:700,color:paid===10?"#16a34a":paid>0?"#2563eb":"#94a3b8"}}>{paid}/10 ✅</div>
                      {pend>0&&<div style={{fontSize:10,color:"#d97706"}}>{pend}⏳</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        {/* ─ Panneau droit : cotisations du membre sélectionné ─ */}
        <div>
          {!u ? (
            <div className="card" style={{textAlign:"center",padding:"48px 24px",color:"#94a3b8"}}>
              <div style={{fontSize:40,marginBottom:12}}>👈</div>
              <div style={{fontWeight:600,fontSize:14}}>Sélectionnez un membre</div>
              <div style={{fontSize:12,marginTop:4}}>Utilisez la recherche et les filtres à gauche pour trouver un membre et gérer ses cotisations.</div>
            </div>
          ) : (
            <div className="card">
              {/* En-tête membre */}
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18,
                padding:"14px 16px",background:"#f8fafc",borderRadius:10,border:"1px solid #e2e8f0"}}>
                <div style={{width:44,height:44,borderRadius:"50%",
                  background:"linear-gradient(135deg,#2563eb,#1e40af)",
                  display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:16}}>
                  {u.prenom[0]}{u.nom[0]}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:15,color:"#0f2850"}}>{u.prenom} {u.nom}</div>
                  <div style={{fontSize:12,color:"#64748b"}}>{u.groupe||"—"} · {u.telephone}</div>
                </div>
                <RoleBadge role={u.role}/>
              </div>

              {/* Changement de formule */}
              <div className="form-group">
                <label>Formule de cotisation</label>
                <select value={formule} onChange={e=>setFormule(e.target.value)}>
                  <option value="">— Actuelle : {FORMULES.find(f=>f.id===u.formule)?.label||"Aucune"} —</option>
                  {FORMULES.map(f=><option key={f.id} value={f.id}>{f.label}</option>)}
                </select>
              </div>

              {/* Grille des mois */}
              <label style={{display:"block",marginBottom:8}}>Sélectionner les mois à valider</label>
              <div className="month-grid" style={{marginBottom:16}}>
                {MOIS.map((m,i) => {
                  const st = u.cotisations?.[i];
                  const sel2 = months.includes(i);
                  let cls = "mc-unpaid";
                  if (st==="validé") cls="mc-paid";
                  else if (st==="en_attente") cls="mc-pending";
                  else if (sel2) cls="mc-selected";
                  return (
                    <div key={i} className={`month-cell ${cls}`}
                      onClick={()=>st!=="validé"&&setMonths(prev=>prev.includes(i)?prev.filter(x=>x!==i):[...prev,i])}>
                      <div className="mc-name">{st==="validé"?"✅":st==="en_attente"?"⏳":sel2?"●":"○"} {m}</div>
                    </div>
                  );
                })}
              </div>

              {/* Résumé */}
              <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap"}}>
                {[
                  {v:Object.values(u.cotisations||{}).filter(s=>s==="validé").length, l:"Validés",bg:"#dcfce7",c:"#16a34a"},
                  {v:Object.values(u.cotisations||{}).filter(s=>s==="en_attente").length, l:"En attente",bg:"#fef9c3",c:"#d97706"},
                  {v:months.length, l:"Sélectionnés",bg:"#eff6ff",c:"#2563eb"},
                ].map((s,i)=>(
                  <div key={i} style={{flex:1,padding:"8px 12px",background:s.bg,borderRadius:8,textAlign:"center"}}>
                    <div style={{fontWeight:800,fontSize:18,color:s.c}}>{s.v}</div>
                    <div style={{fontSize:11,color:"#64748b"}}>{s.l}</div>
                  </div>
                ))}
              </div>

              <button className="btn btn-gold" style={{width:"100%",padding:12,fontSize:14}}
                onClick={apply} disabled={months.length===0}>
                👑 Valider {months.length > 0 ? `${months.length} mois` : "les mois sélectionnés"} directement
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// SUPERADMIN — MOTS DE PASSE (recherche + filtres)
// ─────────────────────────────────────────────
function AdminPasswords({ db, setDb }) {
  const [search,      setSearch]      = useState("");
  const [filterRole,  setFilterRole]  = useState("tous");
  const [filterActif, setFilterActif] = useState("tous");
  const [sel,  setSel]  = useState("");
  const [pw,   setPw]   = useState("");
  const [pw2,  setPw2]  = useState("");
  const [msg,  setMsg]  = useState({type:"",text:""});

  const allUsers = db.users.filter(u=>u.id!=="superadmin");
  const filteredUsers = allUsers.filter(u => {
    const txt = (u.prenom+" "+u.nom+" "+u.email+" "+u.telephone).toLowerCase();
    const roleOk  = filterRole==="tous"  || u.role===filterRole;
    const actifOk = filterActif==="tous" || (filterActif==="actif"?u.actif!==false:u.actif===false);
    return txt.includes(search.toLowerCase()) && roleOk && actifOk;
  });

  const selectedUser = allUsers.find(u=>u.id===sel);

  const save = () => {
    if (!sel||!pw)  return setMsg({type:"error",text:"Sélectionnez un utilisateur et entrez un mot de passe."});
    if (pw.length<6) return setMsg({type:"error",text:"Minimum 6 caractères."});
    if (pw!==pw2)    return setMsg({type:"error",text:"Les deux mots de passe ne correspondent pas."});
    setDb({...db, users:db.users.map(u=>u.id===sel?{...u,password:pw}:u)});
    setMsg({type:"success",text:`✅ Mot de passe de ${selectedUser.prenom} ${selectedUser.nom} mis à jour.`});
    setPw(""); setPw2("");
    setTimeout(()=>setMsg({type:"",text:""}),5000);
  };

  const resetFilters = () => { setSearch(""); setFilterRole("tous"); setFilterActif("tous"); };
  const hasFilters = search||filterRole!=="tous"||filterActif!=="tous";

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title">🔒 Gestion des mots de passe</div>
        <div className="page-sub">Réinitialisez le mot de passe d'un membre ou administrateur</div>
      </div>
      <Alert type={msg.type} msg={msg.text}/>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1.4fr",gap:18,alignItems:"start"}}>

        {/* ─ Panneau gauche : recherche & liste ─ */}
        <div>
          <div className="card" style={{marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:13,color:"#0f2850",marginBottom:12}}>🔍 Rechercher un utilisateur</div>
            <div className="form-group">
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Nom, email, téléphone…"/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div className="form-group" style={{marginBottom:hasFilters?8:0}}>
                <label>Rôle</label>
                <select value={filterRole} onChange={e=>setFilterRole(e.target.value)}>
                  <option value="tous">Tous</option>
                  <option value="user">👤 Membres</option>
                  <option value="admin">🛡️ Admins</option>
                </select>
              </div>
              <div className="form-group" style={{marginBottom:hasFilters?8:0}}>
                <label>Statut</label>
                <select value={filterActif} onChange={e=>setFilterActif(e.target.value)}>
                  <option value="tous">Tous</option>
                  <option value="actif">✅ Actifs</option>
                  <option value="inactif">❌ Inactifs</option>
                </select>
              </div>
            </div>
            {hasFilters && (
              <button className="btn btn-secondary btn-sm" onClick={resetFilters} style={{width:"100%"}}>
                ✕ Réinitialiser
              </button>
            )}
          </div>

          {/* Liste scrollable */}
          <div className="card" style={{padding:0,overflow:"hidden"}}>
            <div style={{padding:"10px 16px",borderBottom:"1px solid #e2e8f0",fontSize:12,color:"#64748b",fontWeight:600}}>
              {filteredUsers.length} utilisateur{filteredUsers.length>1?"s":""}
            </div>
            <div style={{maxHeight:340,overflowY:"auto"}}>
              {filteredUsers.length===0 ? (
                <div style={{padding:20,textAlign:"center",color:"#94a3b8",fontSize:13}}>Aucun résultat.</div>
              ) : filteredUsers.map(usr => {
                const isSelected = sel===usr.id;
                return (
                  <div key={usr.id}
                    onClick={()=>{setSel(usr.id);setPw("");setPw2("");setMsg({type:"",text:""}); }}
                    style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",cursor:"pointer",
                      borderBottom:"1px solid #f1f5f9",
                      background:isSelected?"#eff6ff":"white",
                      borderLeft:isSelected?"3px solid #2563eb":"3px solid transparent",
                      transition:"all 0.12s"}}>
                    <div style={{width:34,height:34,borderRadius:"50%",flexShrink:0,
                      background:isSelected?"linear-gradient(135deg,#2563eb,#1e40af)":"linear-gradient(135deg,#94a3b8,#64748b)",
                      display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:12}}>
                      {usr.prenom[0]}{usr.nom[0]}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:13,color:"#0f2850"}}>{usr.prenom} {usr.nom}</div>
                      <div style={{display:"flex",gap:6,alignItems:"center",marginTop:2}}>
                        <RoleBadge role={usr.role}/>
                        <span style={{fontSize:11,color:"#94a3b8"}}>{usr.telephone}</span>
                      </div>
                    </div>
                    {usr.actif===false && <span className="badge badge-red" style={{fontSize:10}}>Inactif</span>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        {/* ─ Panneau droit : formulaire changement mdp ─ */}
        <div>
          {!selectedUser ? (
            <div className="card" style={{textAlign:"center",padding:"48px 24px",color:"#94a3b8"}}>
              <div style={{fontSize:40,marginBottom:12}}>🔒</div>
              <div style={{fontWeight:600,fontSize:14}}>Sélectionnez un utilisateur</div>
              <div style={{fontSize:12,marginTop:4}}>Recherchez et cliquez sur un utilisateur à gauche pour modifier son mot de passe.</div>
            </div>
          ) : (
            <div className="card">
              {/* Carte utilisateur sélectionné */}
              <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",
                background:"#f8fafc",borderRadius:10,border:"1px solid #e2e8f0",marginBottom:20}}>
                <div style={{width:44,height:44,borderRadius:"50%",
                  background:"linear-gradient(135deg,#2563eb,#1e40af)",
                  display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:16}}>
                  {selectedUser.prenom[0]}{selectedUser.nom[0]}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:15,color:"#0f2850"}}>{selectedUser.prenom} {selectedUser.nom}</div>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginTop:3}}>
                    <RoleBadge role={selectedUser.role}/>
                    <span style={{fontSize:12,color:"#94a3b8"}}>{selectedUser.telephone}</span>
                  </div>
                </div>
              </div>

              <div className="form-group">
                <label>Nouveau mot de passe *</label>
                <EyeInput value={pw} onChange={e=>setPw(e.target.value)} placeholder="Minimum 6 caractères"/>
              </div>
              <div className="form-group">
                <label>Confirmer le mot de passe *</label>
                <EyeInput value={pw2} onChange={e=>setPw2(e.target.value)} placeholder="Répéter le mot de passe"/>
              </div>

              {pw && pw.length < 6 && (
                <div style={{fontSize:12,color:"#dc2626",marginBottom:10}}>⚠️ Minimum 6 caractères requis.</div>
              )}
              {pw && pw2 && pw!==pw2 && (
                <div style={{fontSize:12,color:"#dc2626",marginBottom:10}}>⚠️ Les mots de passe ne correspondent pas.</div>
              )}

              <button className="btn btn-primary" style={{width:"100%",padding:12}} onClick={save}
                disabled={!pw||pw.length<6||pw!==pw2}>
                🔒 Mettre à jour le mot de passe
              </button>

              <div className="alert alert-warn" style={{marginTop:14}}>
                ⚠️ Communiquez le nouveau mot de passe en privé à <b>{selectedUser.prenom}</b>. Il pourra le modifier lui-même dans son profil.
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// SUPERADMIN — GESTION DES PROFILS
// (modifier profil, rôle superadmin, ajouter utilisateur, mettre à jour paiements)
// ─────────────────────────────────────────────
function GestionProfils({ db, setDb }) {
  const [search, setSearch] = useState("");
  const [editU, setEditU] = useState(null);
  const [form, setForm] = useState({});
  const [msg, setMsg] = useState({type:"",text:""});
  const [tab, setTab] = useState("info");
  const [showAdd, setShowAdd] = useState(false);
  const [addForm, setAddForm] = useState({ prenom:"", nom:"", email:"", telephone:"", adresse:"", groupe:"", password:"", role:"user" });
  const [addMsg, setAddMsg] = useState({type:"",text:""});

  const users = db.users.filter(u=>u.id!=="superadmin" &&
    (u.prenom+" "+u.nom+" "+u.email+" "+u.telephone).toLowerCase().includes(search.toLowerCase()));

  const open = (u) => {
    setEditU(u);
    setForm({ prenom:u.prenom, nom:u.nom, email:u.email||"", telephone:u.telephone,
      adresse:u.adresse||"", groupe:u.groupe||"", role:u.role, actif:u.actif!==false, formule:u.formule||"" });
    setMsg({type:"",text:""}); setTab("info");
  };

  const save = () => {
    if (!form.prenom||!form.nom||!form.telephone) return setMsg({type:"error",text:"Prénom, nom et téléphone requis."});
    if (db.users.find(u=>u.telephone===form.telephone&&u.id!==editU.id)) return setMsg({type:"error",text:"Numéro déjà utilisé."});
    setDb({...db,users:db.users.map(u=>u.id===editU.id?{...u,...form}:u)});
    setMsg({type:"success",text:`Profil de ${form.prenom} ${form.nom} mis à jour.`});
    setTimeout(()=>{setMsg({type:"",text:""});setEditU(null);},2500);
  };

  // Modification directe des paiements (valider/rejeter un mois)
  const toggleMoisPaiement = (moisIdx, currentStatus) => {
    const u = db.users.find(x=>x.id===editU.id);
    if (!u) return;
    const newCot = {...(u.cotisations||{})};
    if (currentStatus === "validé") {
      delete newCot[moisIdx]; // remettre à zéro
    } else {
      newCot[moisIdx] = "validé"; // valider directement
    }
    // Mettre à jour aussi pendingPayments si existant
    const updatedPmts = (db.pendingPayments||[]).map(p=>
      p.userId===editU.id && p.moisIdx===moisIdx ? {...p, status: currentStatus==="validé"?"rejeté":"validé"} : p
    );
    setDb({...db, users:db.users.map(x=>x.id===editU.id?{...x,cotisations:newCot}:x), pendingPayments:updatedPmts});
    setEditU(prev=>({...prev, cotisations:newCot}));
  };

  // Ajout d'un nouvel utilisateur
  const ajouterUser = () => {
    setAddMsg({type:"",text:""});
    if (!addForm.prenom||!addForm.nom||!addForm.telephone||!addForm.password)
      return setAddMsg({type:"error",text:"Prénom, nom, téléphone et mot de passe requis."});
    if (addForm.password.length < 6) return setAddMsg({type:"error",text:"Mot de passe : 6 caractères minimum."});
    if (db.users.find(u=>u.telephone===addForm.telephone)) return setAddMsg({type:"error",text:"Ce numéro est déjà utilisé."});
    const newU = {
      id:genId(), actif:true, cotisations:{}, formule:null,
      createdAt:new Date().toLocaleDateString("fr-FR"),
      ...addForm
    };
    setDb({...db, users:[...db.users, newU]});
    setAddMsg({type:"success",text:`${addForm.prenom} ${addForm.nom} ajouté avec succès.`});
    setTimeout(()=>{setAddMsg({type:"",text:""});setShowAdd(false);
      setAddForm({prenom:"",nom:"",email:"",telephone:"",adresse:"",groupe:"",password:"",role:"user"});}, 2000);
  };

  return (
    <div className="page">
      <div className="page-header" style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div className="page-title">✏️ Gestion des profils</div>
          <div className="page-sub">Modifiez les profils, rôles et paiements — Rôle Super Admin inclus</div>
        </div>
        <button className="btn btn-primary" onClick={()=>setShowAdd(true)}>➕ Ajouter un utilisateur</button>
      </div>

      <div className="card" style={{marginBottom:16}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher par nom, email, téléphone…" />
      </div>

      <div className="card">
        <table>
          <thead><tr><th>Membre</th><th>Tél.</th><th>Groupe</th><th>Rôle</th><th>Cotisations</th><th>Actions</th></tr></thead>
          <tbody>
            {users.map(u => {
              const paid=Object.values(u.cotisations||{}).filter(s=>s==="validé").length;
              const pend=Object.values(u.cotisations||{}).filter(s=>s==="en_attente").length;
              const roleColors = { superadmin:"#1a2a4a", admin:"#1e40af", user:"#2563eb" };
              return (
                <tr key={u.id}>
                  <td><div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:34,height:34,borderRadius:"50%",flexShrink:0,
                      background:`linear-gradient(135deg,${roleColors[u.role]||"#2563eb"},#0f2850)`,
                      display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:12}}>
                      {u.prenom[0]}{u.nom[0]}</div>
                    <div><div style={{fontWeight:600}}>{u.prenom} {u.nom}</div>
                    <div style={{fontSize:11,color:"#94a3b8"}}>{u.email||"—"}</div></div>
                  </div></td>
                  <td style={{fontSize:13}}>{u.telephone}</td>
                  <td style={{fontSize:12}}>{u.groupe||"—"}</td>
                  <td><RoleBadge role={u.role}/></td>
                  <td>
                    <span className="badge badge-green">{paid}✅</span>{" "}
                    {pend>0&&<span className="badge badge-yellow">{pend}⏳</span>}
                    {paid===0&&pend===0&&<span className="badge badge-gray">—</span>}
                  </td>
                  <td><button className="btn btn-primary btn-xs" onClick={()=>open(u)}>✏️ Modifier</button></td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {users.length===0 && <div style={{textAlign:"center",padding:40,color:"#94a3b8"}}>Aucun résultat.</div>}
      </div>

      {/* ─── Modal modifier profil ─── */}
      <Modal open={!!editU} onClose={()=>setEditU(null)} title={`✏️ ${editU?.prenom} ${editU?.nom}`} wide
        footer={<>
          <button className="btn btn-secondary" onClick={()=>setEditU(null)}>Fermer</button>
          {tab!=="paiements" && <button className="btn btn-primary" onClick={save}>💾 Enregistrer</button>}
        </>}>
        {editU && (
          <>
            <Alert type={msg.type} msg={msg.text}/>
            <div className="tabs">
              {[["info","👤 Infos"],["role","🛡️ Rôle & Accès"],["paiements","💰 Paiements"]].map(([k,l])=>(
                <div key={k} className={`tab ${tab===k?"active":""}`} onClick={()=>setTab(k)}>{l}</div>
              ))}
            </div>

            {tab==="info" && (
              <>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <div className="form-group"><label>Prénom *</label><input value={form.prenom} onChange={e=>setForm({...form,prenom:e.target.value})} /></div>
                  <div className="form-group"><label>Nom *</label><input value={form.nom} onChange={e=>setForm({...form,nom:e.target.value})} /></div>
                </div>
                <div className="form-group"><label>Email</label><input type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} /></div>
                <div className="form-group"><label>Téléphone *</label><input type="tel" value={form.telephone} onChange={e=>setForm({...form,telephone:e.target.value})} /></div>
                <div className="form-group"><label>Adresse</label><input value={form.adresse} onChange={e=>setForm({...form,adresse:e.target.value})} /></div>
                <div className="form-group"><label>Groupe paroissial</label>
                  <select value={form.groupe} onChange={e=>setForm({...form,groupe:e.target.value})}>
                    <option value="">— Aucun —</option>
                    {GROUPES.map(g=><option key={g} value={g}>{g}</option>)}
                  </select>
                </div>
              </>
            )}

            {tab==="role" && (
              <>
                <div className="form-group">
                  <label>Rôle de l'utilisateur</label>
                  <select value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                    <option value="user">👤 Membre</option>
                    <option value="admin">🛡️ Administrateur</option>
                    <option value="superadmin">👑 Super Administrateur</option>
                  </select>
                </div>
                {form.role==="superadmin" && (
                  <div className="alert alert-warn">
                    ⚠️ Le rôle <b>Super Admin</b> donne un accès complet à toute la plateforme, y compris la gestion des profils, mots de passe et cotisations directes.
                  </div>
                )}
                <div style={{display:"flex",alignItems:"center",gap:10,marginTop:8}}>
                  <input type="checkbox" id="actifEdit" checked={form.actif} onChange={e=>setForm({...form,actif:e.target.checked})} style={{width:"auto"}} />
                  <label htmlFor="actifEdit" style={{marginBottom:0,textTransform:"none",fontSize:13}}>
                    Compte actif <span style={{color:"#94a3b8"}}>(décocher pour bloquer la connexion)</span>
                  </label>
                </div>
                <div className="form-group" style={{marginTop:16}}>
                  <label>Formule de cotisation</label>
                  <select value={form.formule} onChange={e=>setForm({...form,formule:e.target.value})}>
                    <option value="">— Aucune —</option>
                    {FORMULES.map(f=><option key={f.id} value={f.id}>{f.label}</option>)}
                  </select>
                </div>
              </>
            )}

            {tab==="paiements" && (
              <>
                <div className="alert alert-info" style={{marginBottom:14}}>
                  Cliquez sur un mois pour <b>valider</b> ou <b>remettre à zéro</b> son paiement directement.
                  La formule actuelle : <b>{FORMULES.find(f=>f.id===editU.formule)?.label || "Aucune"}</b>
                </div>
                <div className="month-grid">
                  {MOIS.map((m,i) => {
                    const st = editU.cotisations?.[i];
                    let cls = "mc-unpaid";
                    if (st==="validé") cls="mc-paid";
                    else if (st==="en_attente") cls="mc-pending";
                    return (
                      <div key={i} className={`month-cell ${cls}`}
                        onClick={()=>toggleMoisPaiement(i,st)}
                        title={st==="validé"?"Cliquer pour remettre à zéro":st==="en_attente"?"Cliquer pour valider":"Cliquer pour valider"}
                        style={{cursor:"pointer"}}>
                        <div className="mc-name">{st==="validé"?"✅":st==="en_attente"?"⏳":"○"} {m}</div>
                        <div className="mc-amt" style={{fontSize:10,marginTop:2}}>
                          {st==="validé"?"Clic → annuler":st==="en_attente"?"Clic → valider":"Clic → valider"}
                        </div>
                      </div>
                    );
                  })}
                </div>
                <div style={{marginTop:14,padding:12,background:"#f8fafc",borderRadius:10,fontSize:12,color:"#64748b"}}>
                  ✅ <b>{Object.values(editU.cotisations||{}).filter(s=>s==="validé").length}</b> mois validés ·
                  ⏳ <b>{Object.values(editU.cotisations||{}).filter(s=>s==="en_attente").length}</b> en attente ·
                  ○ <b>{10-Object.values(editU.cotisations||{}).length}</b> non commencés
                </div>
              </>
            )}
          </>
        )}
      </Modal>

      {/* ─── Modal ajouter utilisateur ─── */}
      <Modal open={showAdd} onClose={()=>setShowAdd(false)} title="➕ Ajouter un utilisateur" wide
        footer={<>
          <button className="btn btn-secondary" onClick={()=>setShowAdd(false)}>Annuler</button>
          <button className="btn btn-primary" onClick={ajouterUser}>✅ Créer le compte</button>
        </>}>
        <Alert type={addMsg.type} msg={addMsg.text}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div className="form-group"><label>Prénom *</label><input value={addForm.prenom} onChange={e=>setAddForm({...addForm,prenom:e.target.value})} /></div>
          <div className="form-group"><label>Nom *</label><input value={addForm.nom} onChange={e=>setAddForm({...addForm,nom:e.target.value})} /></div>
        </div>
        <div className="form-group"><label>Email</label><input type="email" value={addForm.email} onChange={e=>setAddForm({...addForm,email:e.target.value})} /></div>
        <div className="form-group"><label>Téléphone * (identifiant de connexion)</label>
          <input type="tel" value={addForm.telephone} onChange={e=>setAddForm({...addForm,telephone:e.target.value})} placeholder="Ex : 771234567" />
        </div>
        <div className="form-group"><label>Adresse</label><input value={addForm.adresse} onChange={e=>setAddForm({...addForm,adresse:e.target.value})} /></div>
        <div className="form-group"><label>Groupe paroissial</label>
          <select value={addForm.groupe} onChange={e=>setAddForm({...addForm,groupe:e.target.value})}>
            <option value="">— Aucun —</option>
            {GROUPES.map(g=><option key={g} value={g}>{g}</option>)}
          </select>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div className="form-group"><label>Rôle</label>
            <select value={addForm.role} onChange={e=>setAddForm({...addForm,role:e.target.value})}>
              <option value="user">👤 Membre</option>
              <option value="admin">🛡️ Admin</option>
              <option value="superadmin">👑 Super Admin</option>
            </select>
          </div>
          <div className="form-group"><label>Mot de passe *</label>
            <EyeInput value={addForm.password} onChange={e=>setAddForm({...addForm,password:e.target.value})} />
          </div>
        </div>
        <div className="alert alert-info" style={{marginTop:4}}>
          📱 Le numéro de téléphone servira d'identifiant de connexion.
        </div>
      </Modal>
    </div>
  );
}

// ─────────────────────────────────────────────
// APP PRINCIPALE
// ─────────────────────────────────────────────
// ─────────────────────────────────────────────
// ADMIN/SUPERADMIN — TABLEAU DE BORD FINANCIER
// ─────────────────────────────────────────────
function TableauDeBord({ db, setDb, currentUser }) {
  const isSA = currentUser?.role === "superadmin";

  // ── Filtres export & stats ──
  const [dateDebut, setDateDebut] = useState("");
  const [dateFin,   setDateFin]   = useState("");
  const [filterM,   setFilterM]   = useState("tous");
  const [filterT,   setFilterT]   = useState("tous");

  // ── Gestion objectifs (superadmin) ──
  const [showObj,    setShowObj]  = useState(false);
  const [editObj,    setEditObj]  = useState(null);
  const [objForm,    setObjForm]  = useState({ label:"", montant:"", dateDebut:"", dateFin:"" });
  const [objMsg,     setObjMsg]   = useState({type:"",text:""});

  const allPmts = db.pendingPayments || [];
  const objectifs = db.objectifs || [];

  // Helper : parse DD/MM/YYYY → Date
  const parseDate = (s) => {
    if (!s) return null;
    const [d,m,y] = s.split("/");
    return new Date(`${y}-${m}-${d}`);
  };
  const fmtISO = (iso) => {
    if (!iso) return "";
    const [y,m,d] = iso.split("-");
    return `${d}/${m}/${y}`;
  };

  // Paiements filtrés pour les stats
  const pmtsFiltres = allPmts.filter(p => {
    const d = parseDate(p.date);
    const debut = dateDebut ? new Date(dateDebut) : null;
    const fin   = dateFin   ? new Date(dateFin)   : null;
    const inRange = (!debut || d >= debut) && (!fin || d <= fin);
    const mOk    = filterM === "tous" || p.methode === filterM;
    const tOk    = filterT === "tous" || (p.type||"cotisation") === filterT;
    return inRange && mOk && tOk;
  });

  const valides  = pmtsFiltres.filter(p => p.status === "validé");
  const pending  = pmtsFiltres.filter(p => p.status === "en_attente");
  const rejetes  = pmtsFiltres.filter(p => p.status === "rejeté");
  const annules  = pmtsFiltres.filter(p => p.status === "annulé");

  const totalValide  = valides.reduce((s,p)=>s+p.montant,0);
  const totalPending = pending.reduce((s,p)=>s+p.montant,0);
  const totalRejete  = rejetes.reduce((s,p)=>s+p.montant,0);

  // Stats membres
  const membres       = db.users.filter(u=>u.role!=="superadmin");
  const avecFormule   = membres.filter(u=>u.formule);
  const complets      = membres.filter(u=>Object.values(u.cotisations||{}).filter(s=>s==="validé").length===10);
  const actifs        = membres.filter(u=>u.actif!==false);

  // Par méthode
  const byMethod = ["Wave","Orange Money","Virement Bancaire"].map(m => ({
    label:m, icon:m==="Wave"?"🌊":m==="Orange Money"?"🟠":"🏦",
    montant: valides.filter(p=>p.methode===m).reduce((s,p)=>s+p.montant,0),
    count:   valides.filter(p=>p.methode===m).length,
  }));

  // Par mois (Fév–Nov)
  const byMois = MOIS.map((m,i) => ({
    label: m.substring(0,3),
    valide:  allPmts.filter(p=>p.status==="validé" && p.moisIdx===i).reduce((s,p)=>s+p.montant,0),
    pending: allPmts.filter(p=>p.status==="en_attente" && p.moisIdx===i).reduce((s,p)=>s+p.montant,0),
  }));
  const barMax = Math.max(...byMois.map(b=>b.valide+b.pending), 1);

  // ── Export CSV ──
  const exportCSV = () => {
    const rows = [
      ["Membre","Type","Mois","Montant (FCFA)","Méthode","Date","Statut","Réf. Transaction"],
      ...pmtsFiltres.map(p=>[
        p.userName,
        (p.type||"cotisation")==="supplement"?"Supplément":"Cotisation",
        p.mois, p.montant,
        p.methode, p.date, p.status,
        p.transaction_id||""
      ])
    ];
    const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8;"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url;
    const label = dateDebut&&dateFin ? `${fmtISO(dateDebut).replace(/\//g,"-")}_au_${fmtISO(dateFin).replace(/\//g,"-")}` : "complet";
    a.download = `paiements_MIPA_${label}.csv`;
    a.click(); URL.revokeObjectURL(url);
  };

  // ── Objectifs CRUD ──
  const openNewObj = () => { setEditObj(null); setObjForm({label:"",montant:"",dateDebut:"",dateFin:""}); setObjMsg({type:"",text:""}); setShowObj(true); };
  const openEditObj = o => { setEditObj(o); setObjForm({label:o.label,montant:String(o.montant),dateDebut:o.dateDebut,dateFin:o.dateFin}); setObjMsg({type:"",text:""}); setShowObj(true); };
  const saveObj = () => {
    if (!objForm.label || !objForm.montant || !objForm.dateDebut || !objForm.dateFin)
      return setObjMsg({type:"error",text:"Tous les champs sont requis."});
    const montant = parseInt(objForm.montant);
    if (!montant || montant <= 0) return setObjMsg({type:"error",text:"Montant invalide."});
    const newObj = { id:editObj?.id||genId(), label:objForm.label, montant, dateDebut:objForm.dateDebut, dateFin:objForm.dateFin };
    const updatedObjs = editObj
      ? objectifs.map(o=>o.id===editObj.id?newObj:o)
      : [...objectifs, newObj];
    setDb({...db, objectifs:updatedObjs});
    setObjMsg({type:"success",text:"Objectif enregistré."});
    setTimeout(()=>{ setObjMsg({type:"",text:""}); setShowObj(false); }, 1500);
  };
  const deleteObj = (id) => setDb({...db, objectifs:objectifs.filter(o=>o.id!==id)});

  // Calcul progression objectif
  const progressObj = (obj) => {
    const debut = parseDate(obj.dateDebut);
    const fin   = parseDate(obj.dateFin);
    const encaisse = allPmts
      .filter(p => p.status==="validé")
      .filter(p => { const d=parseDate(p.date); return d && d>=debut && d<=fin; })
      .reduce((s,p)=>s+p.montant,0);
    const pct = Math.min(100, Math.round((encaisse/obj.montant)*100));
    return { encaisse, pct };
  };

  const gaugeColor = (pct) => pct>=100?"#16a34a":pct>=60?"#2563eb":pct>=30?"#d97706":"#dc2626";
  const gaugeBg    = (pct) => pct>=100?"#dcfce7":pct>=60?"#eff6ff":pct>=30?"#fef9c3":"#fee2e2";

  return (
    <div className="page">
      <div className="page-header" style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
        <div>
          <div className="page-title">📊 Tableau de bord financier</div>
          <div className="page-sub">Vue globale des paiements, objectifs et export — Paroisse MIPA</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          {isSA && <button className="btn btn-gold" onClick={openNewObj}>🎯 Nouvel objectif</button>}
          <button className="btn btn-primary" onClick={exportCSV}>📥 Exporter CSV</button>
        </div>
      </div>

      {/* ── Jauges Objectifs ── */}
      {objectifs.length > 0 && (
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"1px",marginBottom:12}}>
            🎯 Objectifs périodiques
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
            {objectifs.map(obj => {
              const {encaisse,pct} = progressObj(obj);
              const col = gaugeColor(pct);
              const bg  = gaugeBg(pct);
              return (
                <div key={obj.id} className="card" style={{borderLeft:`4px solid ${col}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:14,color:"#0f2850"}}>{obj.label}</div>
                      <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>
                        📅 {obj.dateDebut} → {obj.dateFin}
                      </div>
                    </div>
                    <div style={{display:"flex",gap:4,flexShrink:0}}>
                      {isSA && <>
                        <button className="btn btn-secondary btn-xs" onClick={()=>openEditObj(obj)}>✏️</button>
                        <button className="btn btn-danger btn-xs"    onClick={()=>deleteObj(obj.id)}>🗑️</button>
                      </>}
                    </div>
                  </div>

                  {/* Jauge radiale simulée avec CSS */}
                  <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:10}}>
                    {/* Cercle de progression */}
                    <div style={{position:"relative",width:72,height:72,flexShrink:0}}>
                      <svg viewBox="0 0 36 36" style={{transform:"rotate(-90deg)",width:72,height:72}}>

// ─────────────────────────────────────────────
function DemandesFormule({ db, setDb, currentUser }) {
  const [tab, setTab] = useState("pending");
  const [confirmModal, setConfirmModal] = useState(null); // {demande, action}

  const all      = db.demandesFormule || [];
  const pending  = all.filter(d => d.status === "en_attente");
  const traitees = all.filter(d => d.status !== "en_attente");

  const showList = tab === "pending" ? pending : traitees;

  const approuver = (d) => {
    const updatedDemandes = all.map(x => x.id===d.id ? {...x, status:"approuvé", traitePar:`${currentUser.prenom} ${currentUser.nom}`, traiteDate:new Date().toLocaleDateString("fr-FR")} : x);
    const updatedUsers    = db.users.map(u => u.id===d.userId ? {...u, formule:d.formuleDemandee} : u);
    setDb({...db, demandesFormule:updatedDemandes, users:updatedUsers});
    setConfirmModal(null);
  };

  const refuser = (d) => {
    const updatedDemandes = all.map(x => x.id===d.id ? {...x, status:"refusé", traitePar:`${currentUser.prenom} ${currentUser.nom}`, traiteDate:new Date().toLocaleDateString("fr-FR")} : x);
    setDb({...db, demandesFormule:updatedDemandes});
    setConfirmModal(null);
  };

  const FormuleBadge = ({fid}) => {
    const f = FORMULES.find(x=>x.id===fid);
    if (!f) return <span className="badge badge-gray">Aucune</span>;
    return <span className="badge" style={{background:f.color+"20",color:f.color}}>{f.badge}</span>;
  };

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title">🔄 Demandes de formule</div>
        <div className="page-sub">Approuvez ou refusez les demandes de changement de plan des membres</div>
      </div>

      {/* Stats */}
      <div className="g3" style={{marginBottom:18}}>
        {[
          {ico:"⏳",bg:"#fef9c3",bd:"#fde047",val:pending.length,  lbl:"En attente"},
          {ico:"✅",bg:"#dcfce7",bd:"#86efac",val:all.filter(d=>d.status==="approuvé").length, lbl:"Approuvées"},
          {ico:"❌",bg:"#fee2e2",bd:"#fca5a5",val:all.filter(d=>d.status==="refusé").length,   lbl:"Refusées"},
        ].map((s,i)=>(
          <div key={i} className="stat" style={{borderLeftColor:s.bd}}>
            <div className="stat-ico" style={{background:s.bg}}>{s.ico}</div>
            <div><div className="stat-val">{s.val}</div><div className="stat-lbl">{s.lbl}</div></div>
          </div>
        ))}
      </div>

      <div className="tabs">
        <div className={`tab ${tab==="pending"?"active":""}`} onClick={()=>setTab("pending")}>
          ⏳ En attente {pending.length>0 && <span className="badge badge-red" style={{marginLeft:6,fontSize:10}}>{pending.length}</span>}
        </div>
        <div className={`tab ${tab==="traitees"?"active":""}`} onClick={()=>setTab("traitees")}>
          📋 Traitées ({traitees.length})
        </div>
      </div>

      <div className="card">
        {showList.length === 0 ? (
          <div style={{textAlign:"center",padding:48,color:"#94a3b8"}}>
            <div style={{fontSize:40,marginBottom:12}}>{tab==="pending"?"📭":"📂"}</div>
            <div style={{fontWeight:600}}>{tab==="pending"?"Aucune demande en attente.":"Aucune demande traitée."}</div>
          </div>
        ) : (
          <table>
            <thead>
              <tr>
                <th>Membre</th>
                <th>Formule actuelle</th>
                <th>Formule demandée</th>
                <th>Date</th>
                <th>Statut</th>
                {tab==="traitees" && <th>Traité par</th>}
                {tab==="pending"  && <th>Actions</th>}
              </tr>
            </thead>
            <tbody>
              {showList.map(d => (
                <tr key={d.id}>
                  <td style={{fontWeight:700}}>{d.userName}</td>
                  <td><FormuleBadge fid={d.formuleActuelle}/></td>
                  <td>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{color:"#94a3b8",fontSize:12}}>→</span>
                      <FormuleBadge fid={d.formuleDemandee}/>
                    </div>
                  </td>
                  <td style={{fontSize:12,color:"#94a3b8"}}>{d.date}</td>
                  <td>
                    {d.status==="en_attente" && <span className="badge badge-yellow">⏳ En attente</span>}
                    {d.status==="approuvé"   && <span className="badge badge-green">✅ Approuvé</span>}
                    {d.status==="refusé"     && <span className="badge badge-red">❌ Refusé</span>}
                  </td>
                  {tab==="traitees" && (
                    <td style={{fontSize:12,color:"#64748b"}}>{d.traitePar} · {d.traiteDate}</td>
                  )}
                  {tab==="pending" && (
                    <td>
                      <div style={{display:"flex",gap:6}}>
                        <button className="btn btn-primary btn-xs" onClick={()=>setConfirmModal({d,action:"approuver"})}>✅ Approuver</button>
                        <button className="btn btn-danger btn-xs"  onClick={()=>setConfirmModal({d,action:"refuser"})}>❌ Refuser</button>
                      </div>
                    </td>
                  )}
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {/* Modal confirmation */}
      <Modal open={!!confirmModal} onClose={()=>setConfirmModal(null)}
        title={confirmModal?.action==="approuver" ? "✅ Approuver la demande" : "❌ Refuser la demande"}
        footer={<>
          <button className="btn btn-secondary" onClick={()=>setConfirmModal(null)}>Annuler</button>
          <button
            className={`btn ${confirmModal?.action==="approuver"?"btn-primary":"btn-danger"}`}
            onClick={()=>confirmModal?.action==="approuver" ? approuver(confirmModal.d) : refuser(confirmModal.d)}>
            {confirmModal?.action==="approuver" ? "✅ Confirmer l'approbation" : "❌ Confirmer le refus"}
          </button>
        </>}>
        {confirmModal && (
          <div>
            <div style={{padding:14,background:"#f8fafc",borderRadius:10,marginBottom:14}}>
              <div style={{fontWeight:700,color:"#0f2850",marginBottom:10}}>👤 {confirmModal.d.userName}</div>
              <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:11,color:"#94a3b8",marginBottom:4}}>Formule actuelle</div>
                  <FormuleBadge fid={confirmModal.d.formuleActuelle}/>
                </div>
                <span style={{fontSize:20,color:"#94a3b8"}}>→</span>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:11,color:"#94a3b8",marginBottom:4}}>Demandée</div>
                  <FormuleBadge fid={confirmModal.d.formuleDemandee}/>
                </div>
              </div>
            </div>
            {confirmModal.action==="approuver" ? (
              <div className="alert alert-info">
                La formule du membre sera <b>immédiatement mise à jour</b> vers <b>{confirmModal.d.formuleDemandeeLabel}</b>.
              </div>
            ) : (
              <div className="alert alert-warn">
                La demande sera <b>refusée</b>. Le membre conservera sa formule actuelle et pourra soumettre une nouvelle demande.
              </div>
            )}
          </div>
        )}
      </Modal>
    </div>
  );
}

const API_BASE = window.API_URL || 'https://backend-mipa.onrender.com';

function getToken() { return localStorage.getItem('mipa_token'); }
function setToken(t) { localStorage.setItem('mipa_token', t); }
function clearToken() { localStorage.removeItem('mipa_token'); }

async function apiFetch(path, options = {}) {
  const token = getToken();
  const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(API_BASE + path, { ...options, headers });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `Erreur ${res.status}`);
  return data;
}

const api = {
  login:    (telephone, password) => apiFetch('/api/auth/login', { method:'POST', body: JSON.stringify({ telephone, password }) }),
  me:       ()                    => apiFetch('/api/auth/me'),
  register: (form)                => apiFetch('/api/auth/register', { method:'POST', body: JSON.stringify(form) }),

  getUsers:    ()          => apiFetch('/api/users'),
  createUser:  (data)      => apiFetch('/api/users', { method:'POST', body: JSON.stringify(data) }),
  updateUser:  (id, data)  => apiFetch(`/api/users/${id}`, { method:'PUT', body: JSON.stringify(data) }),
  changePassword: (id, data) => apiFetch(`/api/users/${id}/password`, { method:'PUT', body: JSON.stringify(data) }),

  getCotisations:  ()        => apiFetch('/api/cotisations'),
  postCotisations: (data)    => apiFetch('/api/cotisations', { method:'POST', body: JSON.stringify(data) }),
  postDirect:      (data)    => apiFetch('/api/cotisations/direct', { method:'POST', body: JSON.stringify(data) }),
  updateCotStatus: (id, status) => apiFetch(`/api/cotisations/${id}/status`, { method:'PUT', body: JSON.stringify({ status }) }),

  getAnnonces:   ()      => apiFetch('/api/annonces'),
  createAnnonce: (data)  => apiFetch('/api/annonces', { method:'POST', body: JSON.stringify(data) }),
  updateAnnonce: (id, d) => apiFetch(`/api/annonces/${id}`, { method:'PUT', body: JSON.stringify(d) }),
  deleteAnnonce: (id)    => apiFetch(`/api/annonces/${id}`, { method:'DELETE' }),

  getObjectifs:   ()      => apiFetch('/api/objectifs'),
  createObjectif: (data)  => apiFetch('/api/objectifs', { method:'POST', body: JSON.stringify(data) }),
  updateObjectif: (id, d) => apiFetch(`/api/objectifs/${id}`, { method:'PUT', body: JSON.stringify(d) }),
  deleteObjectif: (id)    => apiFetch(`/api/objectifs/${id}`, { method:'DELETE' }),

  getDemandes:    ()         => apiFetch('/api/demandes-formule'),
  postDemande:    (data)     => apiFetch('/api/demandes-formule', { method:'POST', body: JSON.stringify(data) }),
  traiteDemande:  (id, data) => apiFetch(`/api/demandes-formule/${id}`, { method:'PUT', body: JSON.stringify(data) }),
};

// ─────────────────────────────────────────────
// APP PRINCIPALE (version API)
// ─────────────────────────────────────────────
function App() {
  const [user,   setUser]   = useState(null);
  const [db,     setDb]     = useState({ users:[], annonces:[], pendingPayments:[], objectifs:[], demandesFormule:[] });
  const [page,   setPage]   = useState('dashboard');
  const [loading, setLoading] = useState(true);
  const [apiError, setApiError] = useState('');

  // ── Charger les données depuis l'API ──
  const loadDb = async (currentUser) => {
    try {
      const role = currentUser?.role;
      const [annonces, objectifs] = await Promise.all([
        api.getAnnonces(),
        api.getObjectifs().catch(() => []),
      ]);

      let users = [];
      let cotisations = [];
      let demandes = [];

      if (role === 'admin' || role === 'superadmin') {
        [users, cotisations, demandes] = await Promise.all([
          api.getUsers(),
          api.getCotisations(),
          api.getDemandes().catch(() => []),
        ]);
      } else {
        cotisations = await api.getCotisations();
      }

      // Construire pendingPayments depuis cotisations (format compatible UI)
      const pendingPayments = cotisations.map(c => ({
        id: c.id,
        userId: c.user_id,
        userName: c.user_name || `${currentUser?.prenom} ${currentUser?.nom}`,
        moisIdx: c.mois_idx,
        mois: c.mois || 'Supplément',
        formule: c.formule,
        montant: c.montant,
        type: c.type,
        methode: c.methode || '',
        date: c.created_at ? new Date(c.created_at).toLocaleDateString('fr-FR') : '',
        status: c.status,
        transaction_id: c.transaction_id || null,
      }));

      setDb({ users, annonces, pendingPayments, objectifs, demandesFormule: demandes });
    } catch (err) {
      console.error('loadDb error:', err);
    }
  };

  // ── Reload DB ──
  const reloadDb = () => loadDb(user);

  // ── Auto-login depuis token ──
  useEffect(() => {
    const token = getToken();
    if (!token) { setLoading(false); return; }
    api.me()
      .then(u => { setUser(u); return loadDb(u); })
      .catch(() => { clearToken(); })
      .finally(() => setLoading(false));
  }, []);

  const handleLogin = async (telephone, password) => {
    try {
      const { token, user: u } = await api.login(telephone, password);
      setToken(token);
      setUser(u);
      await loadDb(u);
      setPage('dashboard');
      return { ok: true };
    } catch (err) {
      return { ok: false, error: err.message };
    }
  };

  const handleRegister = async (form) => {
    try {
      await api.register(form);
      return { ok: true };
    } catch (err) {
      return { ok: false, error: err.message };
    }
  };

  const handleLogout = () => {
    clearToken();
    setUser(null);
    setDb({ users:[], annonces:[], pendingPayments:[], objectifs:[], demandesFormule:[] });
    setPage('dashboard');
  };

  // ── setDb wrapper qui recharge depuis l'API ──
  // Pour garder la compatibilité avec le code existant, on wrappe setDb
  // pour que les mutations UI déclenchent un rechargement API
  const setDbAndReload = async (updater) => {
    // Mise à jour optimiste immédiate
    if (typeof updater === 'function') {
      setDb(prev => updater(prev));
    } else {
      setDb(updater);
    }
    // Puis recharger depuis l'API
    setTimeout(() => loadDb(user), 300);
  };

  if (loading) return (
    <div className="loading-init">
      <div className="loading-init-inner">
        <div style={{fontSize:52,marginBottom:8}}>⛪</div>
        <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Paroisse Marie Immaculée</div>
        <div style={{fontSize:13,opacity:0.6}}>Connexion à la base de données…</div>
        <div className="loading-init-spinner" style={{margin:'16px auto 0'}}></div>
      </div>
    </div>
  );

  if (!user) return (
    <>
      <style>{GS}</style>
      <LoginPage onLogin={handleLogin} onRegister={handleRegister} db={db} />
    </>
  );

  const role = user.role;
  // Récupérer les cotisations du user courant depuis db
  const myPayments = db.pendingPayments.filter(p => p.userId === user.id);
  const cotisationsObj = {};
  myPayments
    .filter(p => p.type === 'cotisation' || !p.type)
    .forEach(p => { if (p.moisIdx !== null && p.moisIdx !== undefined) cotisationsObj[p.moisIdx] = p.status; });

  const userWithCots = { ...user, cotisations: cotisationsObj };
  const pendingCount = db.pendingPayments.filter(p => p.status === 'en_attente').length;

  const renderPage = () => {
    switch(page) {
      case 'dashboard':       return <Dashboard user={userWithCots} db={db} setPage={setPage} />;
      case 'cotisations':     return <CotisationsAPI user={userWithCots} db={db} setDb={setDbAndReload} api={api} reloadDb={reloadDb} />;
      case 'mes-paiements':   return <MesPaiements user={userWithCots} db={db} />;
      case 'annonces':        return <Annonces db={db} />;
      case 'profil':          return <ProfilAPI user={userWithCots} db={db} setDb={setDbAndReload} api={api} setUser={setUser} />;
      case 'membres':         return <MembresAPI currentUser={user} db={db} setDb={setDbAndReload} api={api} />;
      case 'paiements-admin': return <PaiementsAdminAPI db={db} setDb={setDbAndReload} currentUser={user} api={api} />;
      case 'annonces-admin':  return <ManageAnnoncesAPI db={db} setDb={setDbAndReload} currentUser={user} api={api} />;
      case 'tableau-bord':    return <TableauDeBordAPI db={db} setDb={setDbAndReload} currentUser={user} api={api} />;
      case 'demandes-formule':return <DemandesFormuleAPI db={db} setDb={setDbAndReload} currentUser={user} api={api} />;
      case 'cotis-directes':  return <AdminCotisationsAPI db={db} setDb={setDbAndReload} api={api} />;
      case 'passwords':       return <AdminPasswordsAPI db={db} api={api} />;
      case 'profils-admin':   return <GestionProfilsAPI db={db} setDb={setDbAndReload} api={api} />;
      default:                return <Dashboard user={userWithCots} db={db} setPage={setPage} />;
    }
  };

  const NavBtn = ({ k, icon, label, gold, dot }) => (
    <button className={`nav-btn ${page===k ? (gold?'active-gold':'active') : ''}`} onClick={() => setPage(k)}>
      {icon} {label}
      {dot && pendingCount>0 && <span className="badge-dot" />}
    </button>
  );

  return (
    <>
      <style>{GS}</style>
      <div className="app-shell">
        <header className="header">
          <div className="header-brand">
            <div className="header-brand-icon">⛪</div>
            <div className="header-brand-text">
              <h1>Paroisse MIPA</h1>
              <span>Marie Immaculée — Parcelles Assainies, Dakar</span>
            </div>
          </div>
          <div className="header-right">
            {pendingCount>0 && (role==='admin'||role==='superadmin') && (
              <span className="badge badge-red" style={{cursor:'pointer'}} onClick={() => setPage('paiements-admin')}>
                🔔 {pendingCount} en attente
              </span>
            )}
            <div className="header-avatar" onClick={() => setPage('profil')}>{user.prenom[0]}{user.nom[0]}</div>
            <div>
              <div className="header-username">{user.prenom} {user.nom}</div>
              <div className="header-role">{role==='superadmin'?'👑 Super Admin':role==='admin'?'🛡️ Admin':'👤 Membre'}</div>
            </div>
            <button className="logout-btn" onClick={handleLogout}>🚪 Sortir</button>
          </div>
        </header>

        <nav className="topnav">
          <div className="topnav-scroll">
            <div className="topnav-group">
              <NavBtn k="dashboard"     icon="🏠" label="Accueil" />
              <NavBtn k="cotisations"   icon="💰" label="Cotisations" />
              <NavBtn k="mes-paiements" icon="📊" label="Mes paiements" />
              <NavBtn k="annonces"      icon="📢" label="Annonces" />
              <NavBtn k="profil"        icon="👤" label="Mon profil" />
            </div>
            {(role==='admin'||role==='superadmin') && (
              <>
                <div className="topnav-divider" />
                <div className="topnav-section-label">Administration</div>
                <div className="topnav-group">
                  <NavBtn k="membres"          icon="👥" label="Membres" />
                  <NavBtn k="paiements-admin"  icon="⏳" label={`Paiements${pendingCount>0?` (${pendingCount})`:''}`} dot />
                  <NavBtn k="demandes-formule" icon="🔄" label={`Formules${(db.demandesFormule||[]).filter(d=>d.status==='en_attente').length>0?` (${(db.demandesFormule||[]).filter(d=>d.status==='en_attente').length})`:''}`} />
                  <NavBtn k="annonces-admin"   icon="📝" label="Annonces" />
                  <NavBtn k="tableau-bord"     icon="📊" label="Tableau de bord" />
                </div>
              </>
            )}
            {role==='superadmin' && (
              <>
                <div className="topnav-divider" />
                <div className="topnav-section-label">Super Admin</div>
                <div className="topnav-group">
                  <NavBtn k="profils-admin"  icon="✏️" label="Profils"         gold />
                  <NavBtn k="cotis-directes" icon="👑" label="Cotis. directes" gold />
                  <NavBtn k="passwords"      icon="🔒" label="Mots de passe"   gold />
                </div>
              </>
            )}
          </div>
        </nav>

        <main className="main-content">
          {renderPage()}
        </main>
      </div>
    </>
  );
}

// Cotisations avec API réelle
function CotisationsAPI({ user, db, setDb, api, reloadDb }) {
  const [selectedMonths, setSelectedMonths] = useState([]);
  const [methode,   setMethode]   = useState('');
  const [showGateway, setShowGateway] = useState(false);
  const [succ, setSucc] = useState('');
  const [err,  setErr]  = useState('');
  const [vipMontant, setVipMontant] = useState('');
  const [showSuppl,    setShowSuppl]    = useState(false);
  const [supplMontant, setSupplMontant] = useState('');
  const [supplMethode, setSupplMethode] = useState('');
  const [supplErr,     setSupplErr]     = useState('');
  const [showDemandeForm, setShowDemandeForm] = useState(false);
  const [demandeTarget,   setDemandeTarget]   = useState(null);

  const formule = FORMULES.find(f => f.id === user.formule);
  const paid  = Object.values(user.cotisations||{}).filter(s=>s==='validé').length;
  const isVip = formule?.vip === true;
  const quotaAtteint = paid >= 10;
  const monthlyVip = isVip ? (parseInt(vipMontant)||0) : (formule?.monthly||0);
  const pendingDemande = (db.demandesFormule||[]).find(d=>d.userId===user.id && d.status==='en_attente');

  const demanderFormule = (fid) => {
    if (fid === user.formule || pendingDemande) return;
    setDemandeTarget(fid); setShowDemandeForm(true);
  };

  const confirmerDemande = async () => {
    if (!demandeTarget) return;
    try {
      await api.postDemande({ formule_actuelle: user.formule, formule_demandee: demandeTarget });
      setShowDemandeForm(false); setDemandeTarget(null);
      setSucc('Demande de changement de formule envoyée. En attente de validation.');
      reloadDb(); setTimeout(()=>setSucc(''),8000);
    } catch(e) { setErr(e.message); }
  };

  const toggleMonth = (i) => {
    const st = user.cotisations?.[i];
    if (st==='validé' || st==='en_attente') return;
    setSelectedMonths(prev => prev.includes(i) ? prev.filter(m=>m!==i) : [...prev,i]);
  };

  const totalAPayer = selectedMonths.length * monthlyVip;

  const payer = () => {
    setErr('');
    if (!user.formule) return setErr('Choisissez d'abord une formule.');
    if (selectedMonths.length===0) return setErr('Sélectionnez au moins un mois.');
    if (isVip && !vipMontant) return setErr('Entrez votre montant VIP (minimum 2 501 FCFA/mois).');
    if (isVip && parseInt(vipMontant) < 2501) return setErr('Le plan VIP est réservé aux montants supérieurs à 25 000 FCFA/an.');
    if (!methode) return setErr('Choisissez un mode de paiement.');
    setShowGateway(true);
  };

  const onSuccess = async (txResult) => {
    try {
      await api.postCotisations({
        mois_indices: selectedMonths,
        methode,
        transaction_id: txResult?.transaction_id || null,
        montant: isVip ? parseInt(vipMontant) : undefined,
      });
      setShowGateway(false); setSelectedMonths([]); setMethode('');
      setSucc(`${selectedMonths.length} mois soumis via ${methode}. En attente de validation.`);
      reloadDb(); setTimeout(()=>setSucc(''),7000);
    } catch(e) {
      setShowGateway(false); setErr('Erreur enregistrement: ' + e.message);
    }
  };

  const payerSuppl = async () => {
    setSupplErr('');
    const montant = parseInt(supplMontant);
    if (!montant || montant < 100) return setSupplErr('Montant minimum : 100 FCFA.');
    if (!supplMethode) return setSupplErr('Choisissez un mode de paiement.');
    try {
      await api.postCotisations({
        type: 'supplement', montant,
        methode: supplMethode,
        transaction_id: 'SUPPL-' + Date.now(),
      });
      setSucc(`Supplément de ${fmt(montant)} soumis. En attente de validation. 🙏`);
      setSupplMontant(''); setSupplMethode(''); setShowSuppl(false);
      reloadDb(); setTimeout(()=>setSucc(''),7000);
    } catch(e) { setSupplErr(e.message); }
  };

  const PayMethods = ({selected, onSelect}) => (
    <div className="pay-methods">
      {[{id:'Orange Money',icon:'🟠',cls:'om'},{id:'Wave',icon:'🌊',cls:'wave'},{id:'Virement Bancaire',icon:'🏦',cls:'bank'}].map(m=>(
        <div key={m.id} className={`pay-method ${selected===m.id?`selected-${m.cls}`:''}`} onClick={()=>onSelect(m.id)}>
          <div className="pay-method-ico">{m.icon}</div>
          <div className="pay-method-lbl">{m.id}</div>
          {selected===m.id && <div style={{fontSize:10,color:'#2563eb',marginTop:4}}>✓ Sélectionné</div>}
        </div>
      ))}
    </div>
  );

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title">💰 Mes Cotisations</div>
        <div className="page-sub">Gérez vos cotisations annuelles — Février à Novembre (10 mois)</div>
      </div>
      <Alert type="success" msg={succ}/><Alert type="error" msg={err}/>

      <div className="card" style={{marginBottom:20}}>
        <div className="card-title"><span>🎯</span> Choisir mon plan de cotisation</div>
        {pendingDemande && (
          <div className="alert alert-warn" style={{marginBottom:14}}>
            ⏳ Demande de changement vers <b>{FORMULES.find(f=>f.id===pendingDemande.formuleDemandee)?.label}</b> en attente de validation.
          </div>
        )}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14}}>
          {FORMULES.map(f => {
            const isActive  = user.formule === f.id;
            const isPending = pendingDemande?.formuleDemandee === f.id;
            const disabled  = !!pendingDemande;
            return (
              <div key={f.id} className={`plan-card ${isActive?'selected':''}`}
                onClick={()=>!disabled && !isActive && demanderFormule(f.id)}
                style={{...(f.vip?{border:`2px solid ${isActive?'#7c3aed':'#ddd8fe'}`,background:isActive?'#f5f3ff':'white'}:{}),cursor:disabled&&!isActive?'not-allowed':'pointer',opacity:disabled&&!isActive&&!isPending?0.6:1,position:'relative'}}>
                {isPending && <div style={{position:'absolute',top:8,right:8,background:'#fef9c3',color:'#d97706',fontSize:10,fontWeight:700,padding:'2px 6px',borderRadius:99}}>⏳ En cours</div>}
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                  <div className="plan-name" style={f.vip?{color:'#7c3aed'}:{}}>{f.vip?'Libre':(f.total||0).toLocaleString('fr-FR')+' FCFA'}</div>
                  {isActive && <span className="badge" style={{background:f.color+'20',color:f.color}}>✓ Actif</span>}
                </div>
                <span className="plan-badge" style={{background:f.color+'20',color:f.color}}>{f.badge}</span>
                <div className="plan-detail" style={{marginTop:6}}>
                  {f.vip ? (<><div style={{color:'#7c3aed',fontWeight:600}}>Montant libre</div><div>Minimum : 2 501 FCFA/mois</div></>) : (<><div>{fmt(f.monthly||0)} / mois</div><div style={{marginTop:4}}>× 10 mois = <b>{fmt(f.total||0)}</b></div></>)}
                </div>
                {!isActive && !isPending && !disabled && <div style={{marginTop:8,fontSize:11,color:'#2563eb',fontWeight:600}}>Cliquer pour demander →</div>}
              </div>
            );
          })}
        </div>
        {isVip && (
          <div style={{marginTop:16,padding:16,background:'#f5f3ff',borderRadius:12,border:'2px solid #ddd8fe'}}>
            <div style={{fontWeight:700,color:'#7c3aed',marginBottom:10}}>👑 Définir votre montant mensuel VIP</div>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <input type="number" value={vipMontant} onChange={e=>setVipMontant(e.target.value)} placeholder="Ex : 3 000" min="2501" style={{flex:1,fontWeight:700,fontSize:16,color:'#7c3aed'}}/>
              <span style={{fontWeight:700,color:'#7c3aed',whiteSpace:'nowrap'}}>FCFA / mois</span>
            </div>
          </div>
        )}
      </div>

      <Modal open={showDemandeForm} onClose={()=>{setShowDemandeForm(false);setDemandeTarget(null);}}
        title="🔄 Demande de changement de formule"
        footer={<><button className="btn btn-secondary" onClick={()=>{setShowDemandeForm(false);setDemandeTarget(null);}}>Annuler</button><button className="btn btn-primary" onClick={confirmerDemande}>✅ Confirmer la demande</button></>}>
        {demandeTarget && (
          <div>
            <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:16}}>
              <div style={{flex:1,padding:14,background:'#f8fafc',borderRadius:10,textAlign:'center'}}>
                <div style={{fontSize:11,color:'#94a3b8',marginBottom:4}}>Formule actuelle</div>
                <div style={{fontWeight:700,color:'#0f2850'}}>{user.formule?FORMULES.find(f=>f.id===user.formule)?.label:'Aucune'}</div>
              </div>
              <div style={{fontSize:20}}>→</div>
              <div style={{flex:1,padding:14,background:'#eff6ff',borderRadius:10,textAlign:'center',border:'2px solid #bfdbfe'}}>
                <div style={{fontSize:11,color:'#94a3b8',marginBottom:4}}>Nouvelle formule</div>
                <div style={{fontWeight:700,color:'#1e40af'}}>{FORMULES.find(f=>f.id===demandeTarget)?.label}</div>
              </div>
            </div>
            <div className="alert alert-info">Cette demande sera transmise à l'administration pour validation.</div>
          </div>
        )}
      </Modal>

      {user.formule && (
        <div className="card" style={{marginBottom:20}}>
          <div className="card-title"><span>📅</span> Sélectionner les mois à régler</div>
          {isVip && !vipMontant ? (
            <div className="alert alert-warn">Entrez d'abord votre montant mensuel VIP ci-dessus.</div>
          ) : (
            <>
              <div style={{display:'flex',gap:12,fontSize:12,color:'#64748b',marginBottom:14,flexWrap:'wrap'}}>
                <span>✅ Vert = validé</span><span>⏳ Jaune = en attente</span><span>○ Gris = à payer</span><span style={{color:'#2563eb'}}>● Bleu = sélectionné</span>
              </div>
              <div className="month-grid">
                {MOIS.map((m,i) => {
                  const st  = user.cotisations?.[i];
                  const sel = selectedMonths.includes(i);
                  let cls = 'mc-unpaid';
                  if (st==='validé') cls='mc-paid';
                  else if (st==='en_attente') cls='mc-pending';
                  else if (sel) cls='mc-selected';
                  return (
                    <div key={i} className={`month-cell ${cls}`} onClick={()=>toggleMonth(i)}>
                      <div className="mc-name">{st==='validé'?'✅':st==='en_attente'?'⏳':sel?'●':'○'} {m}</div>
                      <div className="mc-amt">{isVip && vipMontant?fmt(parseInt(vipMontant)||0):fmt(formule?.monthly||0)}</div>
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </div>
      )}

      {user.formule && !(isVip && !vipMontant) && (
        <div className="card" style={{marginBottom:20}}>
          <div className="card-title"><span>💳</span> Mode de paiement</div>
          <PayMethods selected={methode} onSelect={setMethode}/>
          {selectedMonths.length>0 && (
            <div className="alert alert-info" style={{marginBottom:16}}>
              <b>{selectedMonths.length} mois</b> : {selectedMonths.map(i=>MOIS[i]).join(', ')}<br/>
              Total : <b style={{fontSize:15}}>{fmt(totalAPayer)}</b>
            </div>
          )}
          <button className="btn btn-primary" onClick={payer} disabled={selectedMonths.length===0||!methode} style={{width:'100%',padding:12,fontSize:14}}>
            💳 Procéder au paiement — {selectedMonths.length>0?fmt(totalAPayer):'Sélectionnez des mois'}
          </button>
        </div>
      )}

      {quotaAtteint && (
        <div className="card" style={{border:'2px solid #7c3aed',background:'linear-gradient(135deg,#faf5ff,white)'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:10}}>
            <div>

// Profil avec API
function ProfilAPI({ user, db, setDb, api, setUser }) {
  const [edit, setEdit] = useState(false);
  const [form, setForm] = useState({ prenom:user.prenom, nom:user.nom, telephone:user.telephone, adresse:user.adresse||'', groupe:user.groupe||'' });
  const [pw, setPw] = useState({ old:'', new1:'', new2:'' });
  const [tab, setTab] = useState('info');
  const [msg, setMsg] = useState({ type:'', text:'' });
  const formule = FORMULES.find(f => f.id === user.formule);
  const paid = Object.values(user.cotisations||{}).filter(s=>s==='validé').length;

  const saveProfile = async () => {
    try {
      const updated = await api.updateUser(user.id, form);
      setUser(prev => ({...prev, ...form}));
      setEdit(false);
      setMsg({ type:'success', text:'Profil mis à jour !' });
      setTimeout(() => setMsg({type:'',text:''}), 4000);
    } catch(e) { setMsg({ type:'error', text: e.message }); }
  };

  const changePw = async () => {
    if (!pw.old||!pw.new1||!pw.new2) return setMsg({type:'error',text:'Remplissez tous les champs.'});
    if (pw.new1 !== pw.new2) return setMsg({type:'error',text:'Mots de passe différents.'});
    if (pw.new1.length < 6) return setMsg({type:'error',text:'Minimum 6 caractères.'});
    try {
      await api.changePassword(user.id, { oldPassword: pw.old, newPassword: pw.new1 });
      setPw({old:'',new1:'',new2:''});
      setMsg({type:'success',text:'Mot de passe modifié !'});
      setTimeout(() => setMsg({type:'',text:''}), 4000);
    } catch(e) { setMsg({type:'error',text:e.message}); }
  };

  return (
    <div className="page">
      <div className="profile-hero">
        <div className="profile-avatar">{user.prenom[0]}{user.nom[0]}</div>
        <div style={{flex:1}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
            <div className="profile-name">{user.prenom} {user.nom}</div>
            <RoleBadge role={user.role}/>
          </div>
          <div className="profile-info">📧 {user.email||'—'} · 📱 {user.telephone} · 🎵 {user.groupe||'—'}</div>
        </div>
      </div>
      <Alert type={msg.type} msg={msg.text}/>
      <div className="g2">
        <div className="card">
          <div className="tabs">
            {[['info','👤 Informations'],['security','🔒 Sécurité']].map(([k,l])=>(
              <div key={k} className={`tab ${tab===k?'active':''}`} onClick={()=>setTab(k)}>{l}</div>
            ))}
          </div>
          {tab==='info' && (edit ? (
            <>
              <div className="g2">
                <div className="form-group"><label>Prénom</label><input value={form.prenom} onChange={e=>setForm({...form,prenom:e.target.value})}/></div>
                <div className="form-group"><label>Nom</label><input value={form.nom} onChange={e=>setForm({...form,nom:e.target.value})}/></div>
              </div>
              <div className="form-group"><label>Téléphone</label><input value={form.telephone} onChange={e=>setForm({...form,telephone:e.target.value})}/></div>
              <div className="form-group"><label>Adresse</label><input value={form.adresse} onChange={e=>setForm({...form,adresse:e.target.value})}/></div>
              <div className="form-group"><label>Groupe</label>
                <select value={form.groupe} onChange={e=>setForm({...form,groupe:e.target.value})}>
                  {GROUPES.map(g=><option key={g} value={g}>{g}</option>)}
                </select>
              </div>
              <div style={{display:'flex',gap:10}}>
                <button className="btn btn-primary" onClick={saveProfile}>💾 Sauvegarder</button>
                <button className="btn btn-secondary" onClick={()=>setEdit(false)}>Annuler</button>
              </div>
            </>
          ) : (
            <>
              {[['📧','Email',user.email||'—'],['📱','Téléphone',user.telephone],['📍','Adresse',user.adresse||'—'],['🎵','Groupe',user.groupe||'—']].map(([ic,lb,val])=>(
                <div key={lb} style={{display:'flex',gap:12,alignItems:'center',padding:'10px 0',borderBottom:'1px solid #f1f5f9'}}>
                  <span style={{fontSize:20}}>{ic}</span>
                  <div><div style={{fontSize:11,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.5px'}}>{lb}</div>
                  <div style={{fontWeight:600,fontSize:14}}>{val}</div></div>
                </div>
              ))}
              <button className="btn btn-secondary btn-sm" style={{marginTop:14}} onClick={()=>setEdit(true)}>✏️ Modifier mes informations</button>
            </>
          ))}
          {tab==='security' && (
            <div style={{paddingTop:4}}>
              <div className="form-group"><label>Mot de passe actuel</label><EyeInput value={pw.old} onChange={e=>setPw({...pw,old:e.target.value})} placeholder="Entrez votre mot de passe actuel"/></div>
              <div className="form-group"><label>Nouveau mot de passe</label><EyeInput value={pw.new1} onChange={e=>setPw({...pw,new1:e.target.value})} placeholder="Nouveau mot de passe"/></div>
              <div className="form-group"><label>Confirmer</label><EyeInput value={pw.new2} onChange={e=>setPw({...pw,new2:e.target.value})} placeholder="Répéter"/></div>
              <button className="btn btn-primary" onClick={changePw} disabled={!pw.old||!pw.new1||!pw.new2||pw.new1.length<6||pw.new1!==pw.new2} style={{width:'100%',padding:11}}>🔒 Mettre à jour</button>
            </div>
          )}
        </div>
        <div className="card">
          <div className="card-title"><span>📊</span> Mes cotisations</div>
          {formule ? (
            <>
              <div style={{background:'#eff6ff',borderRadius:12,padding:16,marginBottom:16}}>
                <div style={{fontSize:12,color:'#64748b'}}>Formule active</div>
                <div style={{fontWeight:800,fontSize:20,color:'#0f2850'}}>{formule.label}</div>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:6}}>
                  <span style={{color:'#64748b'}}>Progression</span>
                  <span style={{fontWeight:700,color:'#1e40af'}}>{paid}/10 — {Math.round((paid/10)*100)}%</span>
                </div>
                <div className="prog-bar"><div className="prog-fill" style={{width:`${(paid/10)*100}%`}}/></div>
              </div>
            </>
          ) : <div className="alert alert-info">Aucune formule choisie.</div>}
        </div>
      </div>
    </div>
  );
}

  const members = db.users.filter(u => u.id !== db.users.find(x=>x.role==='superadmin')?.id &&
    (u.prenom+' '+u.nom+' '+u.telephone+' '+u.groupe).toLowerCase().includes(search.toLowerCase())
  );

  const openEdit = (u) => { setEditU(u); setForm({prenom:u.prenom,nom:u.nom,email:u.email||'',telephone:u.telephone,adresse:u.adresse||'',groupe:u.groupe||'',role:u.role,actif:u.actif!==false}); setMsg({type:'',text:''}); };

  const saveEdit = async () => {
    setSaving(true);
    try {
      await api.updateUser(editU.id, form);
      setMsg({type:'success',text:`Profil de ${form.prenom} ${form.nom} mis à jour.`});
      setDb(prev => ({...prev, users: prev.users.map(u => u.id===editU.id ? {...u,...form} : u)}));

  const toggleActif = async (u) => {
    try { await api.updateUser(u.id, {actif: !u.actif}); setDb(prev=>({...prev,users:prev.users.map(x=>x.id===u.id?{...x,actif:!x.actif}:x)})); }

                  </div></td>
                  <td>{u.telephone}</td><td style={{fontSize:12}}>{u.groupe||'—'}</td>
                  <td><RoleBadge role={u.role}/></td>
                  <td style={{fontSize:12}}>{u.formule?<><b>{FORMULES.find(f=>f.id===u.formule)?.label}</b><br/><span style={{color:'#94a3b8'}}>{paid}/10</span></>:'—'}</td>

  );

// Paiements Admin avec API
function PaiementsAdminAPI({ db, setDb, currentUser, api }) {
  const [tab, setTab] = useState('pending');

  const all = db.pendingPayments||[];
  const pending = all.filter(p=>p.status==='en_attente');
  const valides = all.filter(p=>p.status==='validé');
  const rejetes = all.filter(p=>p.status==='rejeté');
  const listByTab = tab==='pending'?pending:tab==='valides'?valides:rejetes;

  const updateStatus = async (p, status) => {
    setLoading(p.id+status);
    try {
      await api.updateCotStatus(p.id, status);
      setDb(prev => ({...prev, pendingPayments: prev.pendingPayments.map(x=>x.id===p.id?{...x,status}:x)}));
    } catch(e) { alert(e.message); }

    <div className="page">

          {ico:'❌',bg:'#fee2e2',bd:'#fca5a5',val:rejetes.length,lbl:'Rejetés',t:'rejetes'}].map(s=>(

        <div className={`tab ${tab==='pending'?'active':''}`} onClick={()=>setTab('pending')}>⏳ En attente ({pending.length})</div>

        {listByTab.length===0 ? <div style={{textAlign:'center',padding:40,color:'#94a3b8'}}>Aucun paiement ici.</div> : (
          <table>

              {listByTab.map(p => (
                <tr key={p.id}>
                  <td style={{fontWeight:600}}>{p.userName}</td>
                  <td>{(p.type||'cotisation')==='supplement'?<span className="badge" style={{background:'#f5f3ff',color:'#7c3aed'}}>🌟 Suppl.</span>:<span className="badge badge-blue">💰 Cotis.</span>}</td>
                  <td>{p.mois}</td>
                  <td style={{fontWeight:700,color:'#1e40af'}}>{fmt(p.montant)}</td>
                  <td style={{fontSize:12}}>{p.methode==='Wave'?'🌊':p.methode==='Orange Money'?'🟠':'🏦'} {p.methode}</td>
                  <td style={{fontSize:12,color:'#94a3b8'}}>{p.date}</td>
                  <td><StatusBadge status={p.status}/></td>
                  <td><div style={{display:'flex',gap:5}}>

                      <button className="btn btn-primary btn-xs" disabled={!!loading} onClick={()=>updateStatus(p,'validé')}>✅ Valider</button>
                      <button className="btn btn-danger btn-xs" disabled={!!loading} onClick={()=>updateStatus(p,'rejeté')}>❌ Rejeter</button>

                      <button className="btn btn-gold btn-xs" disabled={!!loading} onClick={()=>updateStatus(p,'en_attente')}>↩️ En attente</button>

          </table>
        )}

    </div>

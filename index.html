@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#f4f7fb;color:#1a2a4a;min-height:100vh;}
:root{

}

/* ---- LAYOUT ---- */

/* ---- HEADER ---- */
.header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 60%,#1e5fa8 100%);

.header-brand-text h1{font-family:'Playfair Display',serif;color:white;font-size:15px;line-height:1.2;}
.header-brand-text span{color:rgba(255,255,255,0.55);font-size:11px;}
.header-right{display:flex;align-items:center;gap:10px;}

.header-username{color:white;font-weight:600;font-size:13px;}

.logout-btn:hover{background:rgba(255,255,255,0.2);color:white;}

/* ---- TOPNAV ---- */

.topnav-section-label{font-size:9px;font-weight:700;color:var(--gray);text-transform:uppercase;

.nav-btn{display:flex;align-items:center;gap:6px;padding:0 14px;height:48px;
  color:var(--gray);font-size:13px;font-weight:500;border:none;background:none;cursor:pointer;

.nav-btn:hover{color:var(--blue);background:var(--blue-pale);}
.nav-btn.active{color:var(--blue-dark);font-weight:700;border-bottom-color:var(--blue);}
.nav-btn.active-gold{color:#92400e;font-weight:700;border-bottom-color:var(--gold);}

.page-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--navy);margin-bottom:4px;}
.page-sub{color:var(--gray);font-size:14px;}

.card{background:var(--white);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:22px;}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}

.stat{background:white;border-radius:var(--r-lg);padding:18px 20px;box-shadow:var(--shadow);

.prog-bar{height:10px;background:var(--gray-light);border-radius:5px;overflow:hidden;}
.prog-fill{height:100%;border-radius:5px;transition:width 0.6s ease;

/* ---- MONTH GRID ---- */
.month-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.month-cell{border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;

.month-cell .mc-name{font-size:12px;font-weight:600;margin-bottom:4px;}

.mc-paid .mc-name{color:var(--green);}
.mc-pending{background:#fef9c3;border-color:#fde047;cursor:default;}
.mc-pending .mc-name{color:#854d0e;}
.mc-unpaid{background:var(--gray-pale);border-color:var(--gray-light);}
.mc-unpaid .mc-name{color:var(--gray);}
.mc-unpaid:hover{border-color:var(--blue-mid);background:var(--blue-pale);}
.mc-selected{background:var(--blue-pale);border-color:var(--blue-mid);}
.mc-selected .mc-name{color:var(--blue-dark);font-weight:700;}

.plan-card{border-radius:var(--r-lg);border:2px solid var(--gray-light);padding:18px;

.plan-card:hover{border-color:var(--blue-mid);box-shadow:var(--shadow-md);}
.plan-card.selected{border-color:var(--blue);background:var(--blue-pale);

.plan-name{font-weight:800;font-size:16px;color:var(--navy);margin-bottom:4px;}
.plan-badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;
  font-weight:700;margin-bottom:10px;}
.plan-detail{font-size:13px;color:var(--gray);}

/* ---- PAY METHOD ---- */
.pay-methods{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.pay-method{border-radius:var(--r-lg);border:2px solid var(--gray-light);padding:14px 10px;
  text-align:center;cursor:pointer;transition:all 0.15s;background:white;}
.pay-method:hover{border-color:#93c5fd;box-shadow:var(--shadow);}
.pay-method.selected-wave{border-color:#2563eb;background:#eff6ff;}
.pay-method.selected-om{border-color:#ea580c;background:#fff7ed;}
.pay-method.selected-bank{border-color:#1a5f8a;background:#e8f4fd;}
.pay-method-ico{font-size:24px;margin-bottom:6px;}
.pay-method-lbl{font-size:12px;font-weight:700;color:var(--navy);}

/* ---- BADGE ---- */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-green{background:var(--green-pale);color:var(--green);}
.badge-yellow{background:#fef9c3;color:#854d0e;}
.badge-red{background:var(--red-pale);color:var(--red);}
.badge-blue{background:var(--blue-pale);color:var(--blue-dark);}
.badge-gray{background:var(--gray-light);color:var(--gray);}
.badge-gold{background:var(--gold-light);color:#92400e;}
.badge-navy{background:#1a2a4a;color:#f0d08a;}

/* ---- ROLE BADGE ---- */
.role-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.rb-superadmin{background:#1a2a4a;color:#f0d08a;}
.rb-admin{background:linear-gradient(135deg,#2563eb,#1e40af);color:white;}
.rb-user{background:var(--blue-pale);color:var(--blue-dark);}

/* ---- BUTTONS ---- */
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:var(--r);
  border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;
  transition:all 0.15s;}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:white;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,0.35);}
.btn-secondary{background:var(--gray-pale);color:var(--navy);border:1px solid var(--gray-light);}
.btn-secondary:hover{background:var(--gray-light);}
.btn-danger{background:var(--red-pale);color:var(--red);}
.btn-danger:hover{background:var(--red);color:white;}
.btn-gold{background:linear-gradient(135deg,var(--gold),#92400e);color:white;}
.btn-sm{padding:6px 14px;font-size:12px;}
.btn-xs{padding:4px 10px;font-size:11px;}
.btn:disabled{opacity:0.45;cursor:not-allowed;transform:none !important;}

/* ---- FORM ---- */
.form-group{margin-bottom:16px;}
label{display:block;font-size:12px;font-weight:600;color:var(--gray);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px;}
input,select,textarea{width:100%;padding:10px 14px;border:1.5px solid var(--gray-light);
  border-radius:var(--r);font-family:'Inter',sans-serif;font-size:14px;color:var(--navy);
  background:white;transition:border 0.2s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);}
.eye-wrap{position:relative;}
.eye-wrap input{padding-right:42px;}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);

.alert{padding:12px 16px;border-radius:var(--r);font-size:13px;margin-bottom:14px;line-height:1.5;}
.alert-info{background:var(--blue-pale);color:var(--blue-dark);border:1px solid #bfdbfe;}
.alert-success{background:var(--green-pale);color:var(--green);border:1px solid #86efac;}
.alert-error{background:var(--red-pale);color:var(--red);border:1px solid #fca5a5;}
.alert-warn{background:var(--gold-light);color:#92400e;border:1px solid #fde68a;}

// ─────────────────────────────────────────────
// UTILITAIRES UI
// ─────────────────────────────────────────────
function Alert({ type="info", msg }) {
  if (!msg) return null;
  return <div className={`alert alert-${type}`}>{msg}</div>;
}

function EyeInput({ value, onChange, placeholder }) {
  const [show, setShow] = useState(false);
  return (
    <div className="eye-wrap">
      <input type={show ? "text" : "password"} value={value} onChange={onChange} placeholder={placeholder || "Mot de passe"} />
      <button type="button" className="eye-btn" onClick={() => setShow(!show)}>{show ? "🙈" : "👁"}</button>
    </div>
  );
}

function Modal({ open, onClose, title, children, footer, wide }) {
  if (!open) return null;
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={wide ? { maxWidth:700 } : {}} onClick={e => e.stopPropagation()}>
        <div className="modal-hd">
          <span className="modal-hd-title">{title}</span>
          <button className="close-btn" onClick={onClose}>✕</button>
        </div>
        <div className="modal-bd">{children}</div>
        {footer && <div className="modal-ft">{footer}</div>}
      </div>
    </div>
  );
}

function RoleBadge({ role }) {
  const m = { superadmin:["rb-superadmin","👑 Super Admin"], admin:["rb-admin","🛡️ Admin"], user:["rb-user","👤 Membre"] };
  const [cls,label] = m[role] || m.user;
  return <span className={`role-badge ${cls}`}>{label}</span>;
}

function StatusBadge({ status }) {
  if (status === "validé")     return <span className="badge badge-green">✅ Validé</span>;
  if (status === "en_attente") return <span className="badge badge-yellow">⏳ En attente</span>;
  if (status === "rejeté")     return <span className="badge badge-red">❌ Rejeté</span>;
  if (status === "annulé")     return <span className="badge" style={{background:"#f1f5f9",color:"#64748b"}}>🚫 Annulé</span>;
  return <span className="badge badge-gray">—</span>;
}

// ─────────────────────────────────────────────
// PASSERELLE DE PAIEMENT
// ─────────────────────────────────────────────
function PaymentGateway({ open, onClose, methode, montant, moisLabels, onSuccess, onError }) {
  const [step, setStep] = useState("form");
  const [tel, setTel] = useState("");
  const [result, setResult] = useState(null);
  const [err, setErr] = useState("");

  const reset = () => { setStep("form"); setTel(""); setResult(null); setErr(""); };
  const handleClose = () => { reset(); onClose(); };

  const cfg = {
    "Wave":            { bg:"#2563eb", light:"#eff6ff", icon:"🌊", label:"Wave" },
    "Orange Money":    { bg:"#ea580c", light:"#fff7ed", icon:"🟠", label:"Orange Money" },
    "Virement Bancaire":{ bg:"#0f2850", light:"#e8f4fd", icon:"🏦", label:"Virement Bancaire" },
  };
  const c = cfg[methode] || cfg["Wave"];

  const lancer = async () => {
    setErr("");
    if (methode !== "Virement Bancaire") {
      if (!tel) return setErr("Veuillez entrer votre numéro de téléphone.");
      if (tel.replace(/\s/g,"").length < 9) return setErr("Numéro invalide (9 chiffres min).");
    }
    setStep("processing");
    let res;
    try {
      if (methode === "Virement Bancaire") {
        await new Promise(r => setTimeout(r, 800));
        res = { status:"success", transaction_id:"VIR-"+Date.now(), message:"Instructions de virement enregistrées." };
      } else {
        res = await simulatePay(methode, montant, tel);
      }
    } catch { res = { status:"error", message:"Erreur réseau." }; }
    setResult(res);
    setStep("result");
    if (res.status === "success") onSuccess(res);
    else onError(res);
  };

  if (!open) return null;

  return (
    <div className="overlay" onClick={handleClose}>
      <div className="modal" style={{ maxWidth:480 }} onClick={e => e.stopPropagation()}>
        <div className="modal-hd" style={{ background:c.light, borderBottom:`3px solid ${c.bg}` }}>
          <span style={{ fontWeight:700, fontSize:16, color:c.bg }}>{c.icon} Paiement via {c.label}</span>
          <button className="close-btn" onClick={handleClose}>✕</button>
        </div>
        <div className="modal-bd">
          {/* Récap */}
          <div style={{ background:c.light, borderRadius:12, padding:16, marginBottom:20, border:`1px solid ${c.bg}25` }}>
            <div style={{ fontSize:12, color:"#64748b", marginBottom:4 }}>Mois à régler :</div>
            <div style={{ fontWeight:700, color:"#0f2850", marginBottom:8 }}>{moisLabels.join(", ")}</div>
            <div style={{ fontSize:12, color:"#64748b" }}>Montant total :</div>
            <div style={{ fontWeight:800, fontSize:24, color:c.bg }}>{fmt(montant)}</div>
          </div>

          {step === "form" && (
            <>
              {methode !== "Virement Bancaire" && (
                <div className="form-group">
                  <label>📱 Votre numéro {methode}</label>
                  <input type="tel" value={tel} onChange={e => setTel(e.target.value)}
                    placeholder="Ex : 77 XXX XX XX" style={{ fontSize:15, letterSpacing:"1px" }} />
                  {err && <div style={{ color:"#dc2626", fontSize:12, marginTop:5 }}>{err}</div>}
                  <div style={{ marginTop:12, padding:12, background:"#f8fafc", borderRadius:8, fontSize:12, lineHeight:1.7 }}>
                    <b>Marchand :</b> {methode === "Wave" ? WAVE_CONFIG.merchant_name : OM_CONFIG.merchant_name}<br/>
                    <b>Tél. marchand :</b> {methode === "Wave" ? WAVE_CONFIG.merchant_phone : OM_CONFIG.merchant_phone}<br/>
                    <b>Référence :</b> MIPA-{new Date().getFullYear()}
                  </div>
                </div>
              )}
              {methode === "Virement Bancaire" && (
                <div style={{ fontSize:13, lineHeight:1.8 }}>
                  <div style={{ fontWeight:700, color:"#0f2850", marginBottom:10 }}>🏦 Coordonnées bancaires</div>
                  {[["Banque",BANK_CONFIG.banque],["Titulaire",BANK_CONFIG.titulaire],
                    ["IBAN",BANK_CONFIG.iban],["SWIFT",BANK_CONFIG.swift],["Agence",BANK_CONFIG.agence]
                  ].map(([k,v]) => (
                    <div key={k} style={{ display:"flex", gap:10, marginBottom:6 }}>
                      <span style={{ color:"#64748b", width:80, flexShrink:0 }}>{k} :</span>
                      <span style={{ fontWeight:600, wordBreak:"break-all" }}>{v}</span>
                    </div>
                  ))}
                  <div className="alert alert-warn" style={{ marginTop:12 }}>
                    ⚠️ Référence à mentionner : <b>MIPA-{new Date().getFullYear()}-[votre nom]</b>
                  </div>
                </div>
              )}
              <div style={{ display:"flex", gap:10, marginTop:20, justifyContent:"flex-end" }}>
                <button className="btn btn-secondary" onClick={handleClose}>Annuler</button>
                <button className="btn" style={{ background:c.bg, color:"white" }} onClick={lancer}>
                  {c.icon} {methode === "Virement Bancaire" ? "Confirmer" : `Payer via ${methode}`}
                </button>
              </div>
            </>
          )}

          {step === "processing" && (
            <div style={{ textAlign:"center", padding:"32px 0" }}>
              <div style={{ fontSize:44, marginBottom:14 }}>{c.icon}</div>
              <div style={{ fontWeight:700, fontSize:15, color:c.bg, marginBottom:8 }}>Traitement en cours…</div>
              <div style={{ color:"#64748b", fontSize:13, marginBottom:20 }}>Connexion à {c.label}…</div>
              <div style={{ display:"flex", justifyContent:"center" }}>
                <div className="spinner" style={{ borderTopColor:c.bg }} />
              </div>
            </div>
          )}

          {step === "result" && result && (
            <div style={{ textAlign:"center", padding:"20px 0" }}>
              {result.status === "success" ? (
                <>
                  <div style={{ fontSize:52, marginBottom:12 }}>✅</div>
                  <div style={{ fontWeight:700, fontSize:17, color:"#16a34a", marginBottom:8 }}>
                    {methode === "Virement Bancaire" ? "Demande enregistrée !" : "Paiement initié !"}
                  </div>
                  <div style={{ color:"#64748b", fontSize:13, marginBottom:12 }}>{result.message}</div>
                  {result.transaction_id && (
                    <div style={{ background:"#dcfce7", borderRadius:8, padding:10, fontSize:12, marginBottom:14 }}>
                      Réf. : <b>{result.transaction_id}</b>
                    </div>
                  )}
                  <div className="alert alert-info">
                    Paiement <b>en attente de validation</b> par l'administration.
                  </div>
                  <button className="btn btn-primary" style={{ marginTop:14 }} onClick={handleClose}>Fermer</button>
                </>
              ) : (
                <>
                  <div style={{ fontSize:52, marginBottom:12 }}>❌</div>
                  <div style={{ fontWeight:700, fontSize:16, color:"#dc2626", marginBottom:8 }}>Paiement échoué</div>
                  <div style={{ color:"#64748b", fontSize:13, marginBottom:16 }}>{result.message}</div>
                  <button className="btn btn-secondary" onClick={reset}>↩️ Réessayer</button>
                </>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function LoginPage({ onLogin, onRegister, db }) {
  const [tab, setTab] = useState("login");
  const [form, setForm] = useState({ telephone:"", password:"" });
  const [reg, setReg] = useState({ prenom:"", nom:"", email:"", telephone:"", adresse:"", groupe:"", password:"", confirm:"" });
  const [err, setErr] = useState(""); const [succ, setSucc] = useState("");

  const doLogin = () => {
    setErr("");
    if (!form.telephone || !form.password) return setErr("Remplissez tous les champs.");
    const ok = onLogin(form.telephone, form.password);
    if (!ok) setErr("Numéro ou mot de passe incorrect.");
  };
  const doReg = () => {
    setErr(""); setSucc("");
    if (!reg.prenom||!reg.nom||!reg.telephone||!reg.adresse||!reg.groupe||!reg.password||!reg.confirm) return setErr("Tous les champs * sont requis.");
    if (reg.password !== reg.confirm) return setErr("Mots de passe différents.");
    if (reg.password.length < 6) return setErr("Mot de passe trop court (6 car. min).");
    if (db.users.find(u => u.telephone === reg.telephone)) return setErr("Ce numéro est déjà utilisé.");
    onRegister(reg);
    setSucc("Inscription réussie ! Connectez-vous avec votre numéro.");
    setTab("login"); setReg({ prenom:"", nom:"", email:"", telephone:"", adresse:"", groupe:"", password:"", confirm:"" });
  };

  return (
    <div className="login-shell">
      <div className="login-box">
        <div className="login-logo">
          <div style={{ width:64, height:64, background:"rgba(255,255,255,0.15)", borderRadius:"50%",
            display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto", fontSize:30, border:"2px solid rgba(255,255,255,0.3)" }}>⛪</div>
          <h1>Paroisse Marie Immaculée<br/>des Parcelles Assainies</h1>
          <p>Oblats de Marie Immaculée • Dakar, Sénégal</p>
        </div>
        <div className="login-tabs">
          {[["login","Se connecter"],["register","S'inscrire"]].map(([k,l]) => (
            <div key={k} className={`login-tab ${tab===k?"active":""}`} onClick={() => { setTab(k); setErr(""); setSucc(""); }}>{l}</div>
          ))}
        </div>
        <div className="login-form">
          <Alert type="success" msg={succ} />
          <Alert type="error" msg={err} />
          {tab === "login" ? (
            <>
              <div className="form-group">
                <label>📱 Numéro de téléphone</label>
                <input type="tel" value={form.telephone} onChange={e => setForm({...form, telephone:e.target.value})} placeholder="Ex: 771234567" />
              </div>
              <div className="form-group">
                <label>🔒 Mot de passe</label>
                <EyeInput value={form.password} onChange={e => setForm({...form, password:e.target.value})} />
              </div>
              <button className="btn btn-primary" style={{ width:"100%" }} onClick={doLogin}>Se connecter →</button>
              <div style={{ marginTop:16, padding:12, background:"#f8fafc", borderRadius:8, fontSize:12, color:"#64748b" }}>
                <b>Comptes de démonstration :</b><br/>
                👑 Tél: <b>770000000</b> — Admin@2024<br/>
                🛡️ Tél: <b>771234567</b> — Admin@2024<br/>
                👤 Tél: <b>776543210</b> — User@2024
              </div>
            </>
          ) : (
            <>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                <div className="form-group"><label>Prénom *</label><input value={reg.prenom} onChange={e=>setReg({...reg,prenom:e.target.value})} /></div>
                <div className="form-group"><label>Nom *</label><input value={reg.nom} onChange={e=>setReg({...reg,nom:e.target.value})} /></div>
              </div>
              <div className="form-group"><label>Email</label><input type="email" value={reg.email} onChange={e=>setReg({...reg,email:e.target.value})} /></div>
              <div className="form-group"><label>Téléphone *</label><input type="tel" value={reg.telephone} onChange={e=>setReg({...reg,telephone:e.target.value})} /></div>
              <div className="form-group"><label>Adresse *</label><input value={reg.adresse} onChange={e=>setReg({...reg,adresse:e.target.value})} /></div>
              <div className="form-group"><label>Groupe *</label>
                <select value={reg.groupe} onChange={e=>setReg({...reg,groupe:e.target.value})}>
                  <option value="">— Choisir —</option>
                  {GROUPES.map(g=><option key={g} value={g}>{g}</option>)}
                </select>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                <div className="form-group"><label>Mot de passe *</label><EyeInput value={reg.password} onChange={e=>setReg({...reg,password:e.target.value})} /></div>
                <div className="form-group"><label>Confirmer *</label><EyeInput value={reg.confirm} onChange={e=>setReg({...reg,confirm:e.target.value})} placeholder="Répéter" /></div>
              </div>
              <button className="btn btn-primary" style={{ width:"100%" }} onClick={doReg}>Créer mon compte →</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

        </div>
      </div>

      {/* Historique récent paiements */}
      {myPayments.length > 0 && (
        <div className="card" style={{ marginTop:18 }}>
          <div className="card-title"><span>🧾</span> Mes dernières transactions</div>
          <table>
            <thead><tr><th>Mois</th><th>Montant</th><th>Méthode</th><th>Date</th><th>Réf.</th><th>Statut</th></tr></thead>
            <tbody>
              {[...myPayments].reverse().slice(0,5).map(p => (
                <tr key={p.id}>
                  <td style={{ fontWeight:600 }}>{p.mois}</td>
                  <td style={{ fontWeight:700, color:"#1e40af" }}>{fmt(p.montant)}</td>
                  <td><span style={{ fontSize:13 }}>
                    {p.methode === "Wave" ? "🌊" : p.methode === "Orange Money" ? "🟠" : "🏦"} {p.methode}
                  </span></td>
                  <td style={{ color:"#64748b" }}>{p.date}</td>
                  <td style={{ fontSize:11, color:"#94a3b8" }}>{p.transaction_id || "—"}</td>
                  <td><StatusBadge status={p.status} /></td>
                </tr>
              ))}
            </tbody>
          </table>
          {myPayments.length > 5 && (
            <button className="btn btn-secondary btn-sm" style={{ marginTop:12 }} onClick={() => setPage("mes-paiements")}>
              Voir tout l'historique →
            </button>
          )}
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────
// COTISATIONS (VIP + Supplément)
// ─────────────────────────────────────────────
function Cotisations({ user, db, setDb }) {
  const [selectedMonths, setSelectedMonths] = useState([]);
  const [methode,   setMethode]   = useState("");
  const [showGateway, setShowGateway] = useState(false);
  const [succ, setSucc] = useState("");
  const [err,  setErr]  = useState("");

  // VIP : montant personnalisé par mois
  const [vipMontant, setVipMontant] = useState("");

  // Supplément (don libre après quota)
  const [showSuppl,    setShowSuppl]    = useState(false);
  const [supplMontant, setSupplMontant] = useState("");
  const [supplMethode, setSupplMethode] = useState("");
  const [supplErr,     setSupplErr]     = useState("");

  const formule = FORMULES.find(f => f.id === user.formule);
  const paid  = Object.values(user.cotisations||{}).filter(s=>s==="validé").length;
  const isVip = formule?.vip === true;

  // Pour VIP : le quota est atteint quand les 10 mois sont validés
  const quotaAtteint = paid >= 10;

  // Montant mensuel effectif (VIP = saisi, sinon formule)
  const monthlyVip = isVip ? (parseInt(vipMontant)||0) : (formule?.monthly||0);

  // Demande de changement de formule (nécessite validation admin)
  const [showDemandeForm, setShowDemandeForm] = useState(false);
  const [demandeTarget, setDemandeTarget] = useState(null); // formule choisie

  const pendingDemande = (db.demandesFormule||[]).find(d=>d.userId===user.id && d.status==="en_attente");

  const demanderFormule = (fid) => {
    if (fid === user.formule) return; // déjà actif
    if (pendingDemande) return; // demande déjà en cours
    setDemandeTarget(fid);
    setShowDemandeForm(true);
  };

  const confirmerDemande = () => {
    if (!demandeTarget) return;
    const f = FORMULES.find(x=>x.id===demandeTarget);
    const demande = {
      id: genId(),
      userId: user.id,
      userName: `${user.prenom} ${user.nom}`,
      formuleActuelle: user.formule,
      formuleDemandee: demandeTarget,
      formuleDemandeeLabel: f?.label || demandeTarget,
      date: new Date().toLocaleDateString("fr-FR"),
      status: "en_attente"
    };
    setDb({...db, demandesFormule:[...(db.demandesFormule||[]), demande]});
    setShowDemandeForm(false); setDemandeTarget(null);
    setSucc("Demande de changement de formule envoyée. En attente de validation par l'administration.");
    setTimeout(()=>setSucc(""),8000);
  };

  const toggleMonth = (i) => {
    const st = user.cotisations?.[i];
    if (st==="validé" || st==="en_attente") return;
    setSelectedMonths(prev => prev.includes(i) ? prev.filter(m=>m!==i) : [...prev,i]);
  };

  const totalAPayer = selectedMonths.length * monthlyVip;

  const payer = () => {
    setErr("");
    if (!user.formule)            return setErr("Choisissez d'abord une formule.");
    if (selectedMonths.length===0) return setErr("Sélectionnez au moins un mois.");
    if (isVip && !vipMontant)      return setErr("Entrez votre montant VIP (minimum 2 501 FCFA/mois).");
    if (isVip && parseInt(vipMontant) < 2501) return setErr("Le plan VIP est réservé aux montants supérieurs à 25 000 FCFA/an (2 501 FCFA/mois min).");
    if (!methode)                  return setErr("Choisissez un mode de paiement.");
    setShowGateway(true);
  };

  const onSuccess = (txResult) => {
    const newCot = {...(user.cotisations||{})};
    selectedMonths.forEach(m => { newCot[m] = "en_attente"; });
    const newPmts = selectedMonths.map(m => ({
      id:genId(), userId:user.id, userName:`${user.prenom} ${user.nom}`,
      moisIdx:m, mois:MOIS[m], formule:user.formule, montant:monthlyVip,
      type:"cotisation",
      methode, date:new Date().toLocaleDateString("fr-FR"),
      status:"en_attente", transaction_id:txResult?.transaction_id||null
    }));
    const updatedUsers = db.users.map(u => u.id===user.id ? {...u,cotisations:newCot} : u);
    setDb({...db, users:updatedUsers, pendingPayments:[...(db.pendingPayments||[]),...newPmts]});
    setShowGateway(false); setSelectedMonths([]); setMethode("");
    setSucc(`${newPmts.length} mois soumis via ${methode}. En attente de validation.`);
    setTimeout(()=>setSucc(""),7000);
  };

  // ── Paiement supplément
  const payerSuppl = () => {
    setSupplErr("");
    const montant = parseInt(supplMontant);
    if (!montant || montant < 100) return setSupplErr("Montant minimum : 100 FCFA.");
    if (!supplMethode)             return setSupplErr("Choisissez un mode de paiement.");
    setShowSuppl(false);
    // Crée directement un pendingPayment de type "supplement"
    const pmt = {
      id:genId(), userId:user.id, userName:`${user.prenom} ${user.nom}`,
      moisIdx:null, mois:"Supplément", formule:user.formule||"vip", montant,
      type:"supplement",
      methode:supplMethode, date:new Date().toLocaleDateString("fr-FR"),
      status:"en_attente", transaction_id:`SUPPL-${Date.now()}`
    };
    setDb({...db, pendingPayments:[...(db.pendingPayments||[]),pmt]});
    setSucc(`Supplément de ${fmt(montant)} soumis. En attente de validation. 🙏`);
    setSupplMontant(""); setSupplMethode("");
    setTimeout(()=>setSucc(""),7000);
  };

  const PayMethods = ({selected, onSelect}) => (
    <div className="pay-methods">
      {[{id:"Orange Money",icon:"🟠",cls:"om"},{id:"Wave",icon:"🌊",cls:"wave"},{id:"Virement Bancaire",icon:"🏦",cls:"bank"}].map(m=>(
        <div key={m.id} className={`pay-method ${selected===m.id?`selected-${m.cls}`:""}`} onClick={()=>onSelect(m.id)}>
          <div className="pay-method-ico">{m.icon}</div>
          <div className="pay-method-lbl">{m.id}</div>
          {selected===m.id && <div style={{fontSize:10,color:"#2563eb",marginTop:4}}>✓ Sélectionné</div>}
        </div>
      ))}
    </div>
  );

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title">💰 Mes Cotisations</div>
        <div className="page-sub">Gérez vos cotisations annuelles — Février à Novembre (10 mois)</div>
      </div>
      <Alert type="success" msg={succ}/>
      <Alert type="error"   msg={err}/>

      {/* ── Choix du plan ── */}
      <div className="card" style={{marginBottom:20}}>
        <div className="card-title"><span>🎯</span> Choisir mon plan de cotisation</div>

        {/* Bannière demande en cours */}
        {pendingDemande && (
          <div className="alert alert-warn" style={{marginBottom:14}}>
            ⏳ Demande de changement vers <b>{FORMULES.find(f=>f.id===pendingDemande.formuleDemandee)?.label}</b> en attente de validation par l'administration. (<i>{pendingDemande.date}</i>)
          </div>
        )}

        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14}}>
          {FORMULES.map(f => {
            const isActive  = user.formule === f.id;
            const isPending = pendingDemande?.formuleDemandee === f.id;
            const disabled  = !!pendingDemande;
            return (
              <div key={f.id} className={`plan-card ${isActive?"selected":""}`}
                onClick={()=>!disabled && !isActive && demanderFormule(f.id)}
                style={{
                  ...(f.vip?{border:`2px solid ${isActive?"#7c3aed":"#ddd8fe"}`,background:isActive?"#f5f3ff":"white"}:{}),
                  cursor: disabled&&!isActive?"not-allowed":"pointer",
                  opacity: disabled&&!isActive&&!isPending ? 0.6 : 1,
                  position:"relative"
                }}>
                {isPending && (
                  <div style={{position:"absolute",top:8,right:8,background:"#fef9c3",color:"#d97706",
                    fontSize:10,fontWeight:700,padding:"2px 6px",borderRadius:99}}>⏳ En cours</div>
                )}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <div className="plan-name" style={f.vip?{color:"#7c3aed"}:{}}>
                    {f.vip ? "Libre" : (f.total||0).toLocaleString("fr-FR")+" FCFA"}
                  </div>
                  {isActive && <span className="badge" style={{background:f.color+"20",color:f.color}}>✓ Actif</span>}
                </div>
                <span className="plan-badge" style={{background:f.color+"20",color:f.color}}>{f.badge}</span>
                <div className="plan-detail" style={{marginTop:6}}>
                  {f.vip ? (
                    <><div style={{color:"#7c3aed",fontWeight:600}}>Montant libre</div>
                    <div>Minimum : 2 501 FCFA/mois</div>
                    <div style={{fontSize:11,marginTop:4,color:"#94a3b8"}}>&gt; 25 000 FCFA/an</div></>
                  ) : (
                    <><div>{fmt(f.monthly||0)} / mois</div>
                    <div style={{marginTop:4}}>× 10 mois = <b>{fmt(f.total||0)}</b></div></>
                  )}
                </div>
                {!isActive && !isPending && !disabled && (
                  <div style={{marginTop:8,fontSize:11,color:"#2563eb",fontWeight:600}}>Cliquer pour demander →</div>
                )}
              </div>
            );
          })}
        </div>

        {/* Saisie montant VIP */}
        {isVip && (
          <div style={{marginTop:16,padding:16,background:"#f5f3ff",borderRadius:12,border:"2px solid #ddd8fe"}}>
            <div style={{fontWeight:700,color:"#7c3aed",marginBottom:10}}>👑 Définir votre montant mensuel VIP</div>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <input type="number" value={vipMontant} onChange={e=>setVipMontant(e.target.value)}
                placeholder="Ex : 3 000" min="2501"
                style={{flex:1,fontWeight:700,fontSize:16,color:"#7c3aed"}}/>
              <span style={{fontWeight:700,color:"#7c3aed",whiteSpace:"nowrap"}}>FCFA / mois</span>
              {vipMontant && parseInt(vipMontant)>=2501 && (
                <span style={{color:"#16a34a",fontWeight:600,whiteSpace:"nowrap"}}>
                  = {fmt(parseInt(vipMontant)*10)} / an ✓
                </span>
              )}
            </div>
            {vipMontant && parseInt(vipMontant)<2501 && (
              <div style={{fontSize:12,color:"#dc2626",marginTop:6}}>⚠️ Minimum 2 501 FCFA/mois pour le plan VIP.</div>
            )}
          </div>
        )}
      </div>

      {/* Modal confirmation changement de formule */}
      <Modal open={showDemandeForm} onClose={()=>{setShowDemandeForm(false);setDemandeTarget(null);}}
        title="🔄 Demande de changement de formule"
        footer={<>
          <button className="btn btn-secondary" onClick={()=>{setShowDemandeForm(false);setDemandeTarget(null);}}>Annuler</button>
          <button className="btn btn-primary" onClick={confirmerDemande}>✅ Confirmer la demande</button>
        </>}>
        {demandeTarget && (
          <div>
            <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:16}}>
              <div style={{flex:1,padding:14,background:"#f8fafc",borderRadius:10,textAlign:"center"}}>
                <div style={{fontSize:11,color:"#94a3b8",marginBottom:4}}>Formule actuelle</div>
                <div style={{fontWeight:700,color:"#0f2850"}}>
                  {user.formule ? FORMULES.find(f=>f.id===user.formule)?.label : "Aucune"}
                </div>
              </div>
              <div style={{fontSize:20}}>→</div>
              <div style={{flex:1,padding:14,background:"#eff6ff",borderRadius:10,textAlign:"center",border:"2px solid #bfdbfe"}}>
                <div style={{fontSize:11,color:"#94a3b8",marginBottom:4}}>Nouvelle formule</div>
                <div style={{fontWeight:700,color:"#1e40af"}}>
                  {FORMULES.find(f=>f.id===demandeTarget)?.label}
                </div>
              </div>
            </div>
            <div className="alert alert-info">
              Cette demande sera transmise à l'administration pour validation. Votre formule actuelle reste active jusqu'à l'approbation.
            </div>
          </div>
        )}
      </Modal>

      {/* ── Grille des mois ── */}
      {user.formule && (
        <div className="card" style={{marginBottom:20}}>
          <div className="card-title"><span>📅</span> Sélectionner les mois à régler</div>

          {isVip && !vipMontant ? (
            <div className="alert alert-warn">Entrez d'abord votre montant mensuel VIP ci-dessus.</div>
          ) : (
            <>
              <div style={{display:"flex",gap:12,fontSize:12,color:"#64748b",marginBottom:14,flexWrap:"wrap"}}>
                <span>✅ Vert = validé</span><span>⏳ Jaune = en attente</span>
                <span>○ Gris = à payer</span><span style={{color:"#2563eb"}}>● Bleu = sélectionné</span>
              </div>
              <div className="month-grid">
                {MOIS.map((m,i) => {
                  const st  = user.cotisations?.[i];
                  const sel = selectedMonths.includes(i);
                  let cls = "mc-unpaid";
                  if (st==="validé")    cls="mc-paid";
                  else if (st==="en_attente") cls="mc-pending";
                  else if (sel)         cls="mc-selected";
                  return (
                    <div key={i} className={`month-cell ${cls}`} onClick={()=>toggleMonth(i)}>
                      <div className="mc-name">{st==="validé"?"✅":st==="en_attente"?"⏳":sel?"●":"○"} {m}</div>
                      <div className="mc-amt">{isVip && vipMontant ? fmt(parseInt(vipMontant)||0) : fmt(formule?.monthly||0)}</div>
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </div>
      )}

      {/* ── Mode de paiement & action ── */}
      {user.formule && !(isVip && !vipMontant) && (
        <div className="card" style={{marginBottom:20}}>
          <div className="card-title"><span>💳</span> Mode de paiement</div>
          <PayMethods selected={methode} onSelect={setMethode}/>
          {selectedMonths.length>0 && (
            <div className="alert alert-info" style={{marginBottom:16}}>
              <b>{selectedMonths.length} mois</b> : {selectedMonths.map(i=>MOIS[i]).join(", ")}<br/>
              Total : <b style={{fontSize:15}}>{fmt(totalAPayer)}</b>
              {isVip && <span style={{color:"#7c3aed",marginLeft:8}}>• Plan VIP — {fmt(monthlyVip)}/mois</span>}
            </div>
          )}
          <button className="btn btn-primary" onClick={payer}
            disabled={selectedMonths.length===0||!methode}
            style={{width:"100%",padding:12,fontSize:14}}>
            💳 Procéder au paiement — {selectedMonths.length>0?fmt(totalAPayer):"Sélectionnez des mois"}
          </button>
          {formule && (
            <div style={{marginTop:18,padding:14,background:"#f8fafc",borderRadius:10}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:8}}>
                <span style={{color:"#64748b"}}>Progression annuelle</span>
                <span style={{fontWeight:700,color:"#1e40af"}}>{paid}/10 · {Math.round((paid/10)*100)}%</span>
              </div>
              <div className="prog-bar"><div className="prog-fill" style={{width:`${(paid/10)*100}%`}}/></div>
            </div>
          )}
        </div>
      )}

      {/* ── SUPPLÉMENT (après quota atteint) ── */}
      {quotaAtteint && (
        <div className="card" style={{border:"2px solid #7c3aed",background:"linear-gradient(135deg,#faf5ff,white)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:10}}>
            <div>
              <div className="card-title" style={{color:"#7c3aed",marginBottom:4}}>
                <span>🌟</span> Versement Supplément
              </div>
              <div style={{fontSize:13,color:"#64748b"}}>
                Vous avez complété vos 10 mois — merci ! Vous pouvez faire un don supplémentaire libre selon votre vouloir.
              </div>
            </div>
            <span className="badge" style={{background:"#f5f3ff",color:"#7c3aed",fontSize:12,padding:"6px 14px"}}>
              ✅ Quota atteint
            </span>
          </div>

          <div style={{display:"flex",alignItems:"flex-end",gap:12,marginBottom:14,flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:140}}>
              <label style={{fontSize:12,fontWeight:700,color:"#7c3aed",display:"block",marginBottom:5}}>
                MONTANT DU DON (min. 100 FCFA)
              </label>
              <div style={{position:"relative"}}>
                <input type="number" value={supplMontant} onChange={e=>setSupplMontant(e.target.value)}
                  placeholder="Ex : 5 000" min="100"
                  style={{paddingRight:70,fontWeight:700,fontSize:16,color:"#7c3aed",borderColor:"#ddd8fe"}}/>
                <span style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",
                  fontSize:12,color:"#7c3aed",fontWeight:600}}>FCFA</span>
              </div>
              {supplMontant && parseInt(supplMontant)<100 && (
                <div style={{fontSize:12,color:"#dc2626",marginTop:4}}>Minimum 100 FCFA par transaction.</div>
              )}
            </div>
          </div>

          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,fontWeight:700,color:"#64748b",display:"block",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.4px"}}>Mode de paiement</label>
            <PayMethods selected={supplMethode} onSelect={setSupplMethode}/>
          </div>

          {supplErr && <div className="alert alert-error">{supplErr}</div>}

          <button className="btn" style={{background:"linear-gradient(135deg,#7c3aed,#5b21b6)",color:"white",width:"100%",padding:12,fontSize:14}}
            onClick={payerSuppl}
            disabled={!supplMontant||parseInt(supplMontant)<100||!supplMethode}>
            🌟 Verser le supplément — {supplMontant&&parseInt(supplMontant)>=100?fmt(parseInt(supplMontant)):"Saisissez un montant"}
          </button>

          <div style={{marginTop:10,fontSize:12,color:"#94a3b8",textAlign:"center"}}>
            Chaque don, aussi modeste soit-il, contribue à la vie de notre communauté. ✝️
          </div>
        </div>
      )}

      <PaymentGateway
        open={showGateway}
        onClose={()=>setShowGateway(false)}
        methode={methode}
        montant={totalAPayer}
        moisLabels={selectedMonths.map(i=>MOIS[i])}
        onSuccess={onSuccess}
        onError={res=>{setShowGateway(false);setErr(`Paiement échoué : ${res.message}`);}}
      />
    </div>
  );
}

// ─────────────────────────────────────────────
// MES PAIEMENTS — Historique
// ─────────────────────────────────────────────
function MesPaiements({ user, db }) {
  const formule = FORMULES.find(f => f.id === user.formule);
  const myPayments = (db.pendingPayments||[]).filter(p => p.userId === user.id);
  const paid = Object.values(user.cotisations||{}).filter(s=>s==="validé").length;
  const pending = Object.values(user.cotisations||{}).filter(s=>s==="en_attente").length;
  const isVipMesPmt = formule?.vip === true;
  // Pour VIP : on additionne les montants réels des transactions
  const totalPaye = isVipMesPmt
    ? myPayments.filter(p=>p.status==="validé").reduce((s,p)=>s+p.montant,0)
    : paid*(formule?.monthly||0);
  const totalRestant = isVipMesPmt ? 0 : (10-paid)*(formule?.monthly||0);

  const mColors = { "Wave":"#2563eb", "Orange Money":"#ea580c", "Virement Bancaire":"#0f2850" };
  const mIcons  = { "Wave":"🌊", "Orange Money":"🟠", "Virement Bancaire":"🏦" };

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title">📊 Historique de mes paiements</div>
        <div className="page-sub">Récapitulatif complet de vos cotisations — Février à Novembre</div>
      </div>

      {/* Stats */}
      <div className="g4" style={{ marginBottom:20 }}>
        {[
          { ico:"✅", bg:"#dcfce7", bd:"#86efac", val:`${paid}/10`, lbl:"Mois validés" },
          { ico:"⏳", bg:"#fef9c3", bd:"#fde047", val:pending, lbl:"En attente" },
          { ico:"💰", bg:"#eff6ff", bd:"#bfdbfe", val:totalPaye.toLocaleString("fr-FR"), lbl:"FCFA payés" },
          { ico:"📅", bg:"#fdf4ff", bd:"#e9d5ff", val:totalRestant.toLocaleString("fr-FR"), lbl:"FCFA restants" },
        ].map((s,i) => (
          <div key={i} className="stat" style={{ borderLeftColor:s.bd }}>
            <div className="stat-ico" style={{ background:s.bg }}>{s.ico}</div>
            <div><div className="stat-val">{s.val}</div><div className="stat-lbl">{s.lbl}</div></div>
          </div>
        ))}
      </div>

      <div className="g2">
        {/* Grille mois par mois */}
        <div className="card">
          <div className="card-title"><span>📅</span> État mois par mois</div>
          {formule ? (
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {MOIS.map((m,i) => {
                const st = user.cotisations?.[i];
                const pmt = myPayments.filter(p=>p.moisIdx===i).slice(-1)[0];
                const bg = st==="validé"?"#dcfce7":st==="en_attente"?"#fef9c3":"#f8fafc";
                const border = st==="validé"?"#86efac":st==="en_attente"?"#fde047":"#e2e8f0";
                return (
                  <div key={i} style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
                    padding:"10px 14px", borderRadius:10, background:bg, border:`1px solid ${border}` }}>
                    <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                      <span style={{ fontWeight:700, fontSize:13, width:84 }}>{m}</span>
                      {pmt && <span style={{ fontSize:11, fontWeight:600, color:mColors[pmt.methode]||"#64748b" }}>
                        {mIcons[pmt.methode]} {pmt.methode}
                      </span>}
                    </div>
                    <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                      {pmt && <span style={{ fontSize:11, color:"#94a3b8" }}>{pmt.date}</span>}
                      <span style={{ fontWeight:600, fontSize:12 }}>{formule.monthly ? fmt(formule.monthly) : (pmt ? fmt(pmt.montant) : "Libre")}</span>
                      <StatusBadge status={st} />
                    </div>
                  </div>
                );
              })}
            </div>
          ) : <div className="alert alert-info">Aucune formule choisie.</div>}
        </div>

        {/* Historique transactions */}
        <div className="card">
          <div className="card-title"><span>🧾</span> Historique des transactions</div>
          {myPayments.length === 0 ? (
            <div className="alert alert-info">Aucune transaction enregistrée.</div>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {[...myPayments].reverse().map(p => (
                <div key={p.id} style={{ padding:"12px 14px", borderRadius:10, border:"1px solid #e2e8f0",
                  background:p.status==="validé"?"#f0fdf4":p.status==="rejeté"?"#fef2f2":"#fffbeb" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                    <div>
                      <span style={{ fontWeight:700, fontSize:14 }}>{p.mois}</span>
                      <span style={{ fontSize:11, color:"#94a3b8", marginLeft:8 }}>{p.date}</span>
                    </div>
                    <StatusBadge status={p.status} />
                  </div>
                  <div style={{ display:"flex", gap:12, flexWrap:"wrap", fontSize:13 }}>
                    <span style={{ fontWeight:600, color:mColors[p.methode]||"#333" }}>
                      {mIcons[p.methode]} {p.methode}
                    </span>
                    <span style={{ fontWeight:700, color:"#1e40af" }}>{fmt(p.montant)}</span>
                    {p.transaction_id && (
                      <span style={{ fontSize:10, background:"#eff6ff", padding:"2px 8px",
                        borderRadius:20, color:"#1e40af", fontWeight:600 }}>
                        {p.transaction_id}
                      </span>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}

          {formule && (
            <div style={{ marginTop:20, padding:16, background:"#f8fafc", borderRadius:12 }}>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:8 }}>
                <span style={{ color:"#64748b" }}>Progression • {formule.label}</span>
                <span style={{ fontWeight:700, color:"#1e40af" }}>{paid}/10 — {Math.round((paid/10)*100)}%</span>
              </div>
              <div className="prog-bar">
                <div className="prog-fill" style={{ width:`${(paid/10)*100}%` }} />
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function Annonces({ db }) {
  const [sel, setSel] = useState(null);
  const catColors = { événement:"#eff6ff", collecte:"#fef9c3", liturgie:"#dcfce7", formation:"#fdf4ff" };
  const catIcons  = { événement:"🎪", collecte:"🙏", liturgie:"⛪", formation:"📖" };

  const AnnCard = ({ ann }) => (
    <div className="ann-card" onClick={() => setSel(ann)}>
      {/* Miniature */}
      {ann.mediaType==="image" && ann.media
        ? <img src={ann.media} alt={ann.titre} className="ann-thumb" style={{objectFit:"cover",display:"block"}} />
        : ann.mediaType==="video" && ann.media
          ? <div className="ann-thumb" style={{background:"#0f2850",position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontSize:44}}>🎬</span>
              <span style={{position:"absolute",bottom:6,right:8,background:"rgba(0,0,0,0.55)",color:"white",fontSize:10,padding:"2px 6px",borderRadius:20}}>Vidéo</span>
            </div>
          : ann.mediaType==="pdf"
            ? <div className="ann-thumb" style={{background:"#fef2f2",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:4}}>
                <span style={{fontSize:36}}>📄</span>
                <span style={{fontSize:10,color:"#ef4444",fontWeight:700}}>PDF</span>
              </div>
            : <div className="ann-thumb" style={{background:catColors[ann.categorie]||"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:40}}>
                {catIcons[ann.categorie]||"📌"}
              </div>
      }
      <div className="ann-body">
        <div className="ann-meta">
          {ann.pinned && <span className="badge badge-blue">📌 Épinglée</span>}
          {ann.categorie && <span className="badge badge-gray">{catIcons[ann.categorie]} {ann.categorie}</span>}
          {ann.mediaType && <span className="badge badge-blue">{ann.mediaType==="image"?"🖼️":ann.mediaType==="video"?"🎬":"📄"} {ann.mediaType==="image"?"Image":ann.mediaType==="video"?"Vidéo":"PDF"}</span>}
          <span className="badge badge-gray">{ann.date}</span>
        </div>
        <div className="ann-title">{ann.titre}</div>
        <div className="ann-excerpt">{ann.contenu.substring(0,100)}…</div>
        <button className="btn btn-secondary btn-sm" style={{marginTop:10}}>Lire →</button>
      </div>
    </div>
  );

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title">📢 Annonces de la Paroisse</div>
        <div className="page-sub">Actualités et informations de la communauté Marie Immaculée</div>
      </div>

      {db.annonces.filter(a=>a.pinned).length > 0 && (
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"1px",marginBottom:12}}>📌 Épinglées</div>
          <div className="g2">{db.annonces.filter(a=>a.pinned).map(ann=><AnnCard key={ann.id} ann={ann}/>)}</div>
        </div>
      )}

      <div style={{fontSize:12,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"1px",marginBottom:12}}>Toutes les annonces</div>
      <div className="g2">{db.annonces.filter(a=>!a.pinned).map(ann=><AnnCard key={ann.id} ann={ann}/>)}</div>

      <Modal open={!!sel} onClose={()=>setSel(null)} title={sel?.titre} wide>
        {sel && (
          <>
            <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
              {sel.pinned && <span className="badge badge-blue">📌 Épinglée</span>}
              {sel.categorie && <span className="badge badge-gray">{catIcons[sel.categorie]} {sel.categorie}</span>}
              <span className="badge badge-gray">📅 {sel.date}</span>
              {sel.mediaType && <span className="badge badge-blue">{sel.mediaType==="image"?"🖼️ Image":sel.mediaType==="video"?"🎬 Vidéo":"📄 PDF"}</span>}
            </div>

            {/* Média */}
            {sel.media && (
              <div style={{marginBottom:16,borderRadius:10,overflow:"hidden",border:"1px solid #e2e8f0"}}>
                {sel.mediaType==="image" && <img src={sel.media} alt={sel.titre} style={{width:"100%",maxHeight:320,objectFit:"cover",display:"block"}} />}
                {sel.mediaType==="video" && <video src={sel.media} controls style={{width:"100%",maxHeight:280,display:"block",background:"#000"}} />}
                {sel.mediaType==="pdf" && (
                  <div style={{padding:16,display:"flex",alignItems:"center",justifyContent:"space-between",background:"#fef2f2"}}>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <span style={{fontSize:32}}>📄</span>
                      <div>
                        <div style={{fontWeight:700,color:"#0f2850",fontSize:13}}>{sel.mediaName||"Document PDF"}</div>
                        <div style={{fontSize:11,color:"#64748b"}}>Cliquez pour ouvrir dans un nouvel onglet</div>
                      </div>
                    </div>
                    <a href={sel.media} target="_blank" rel="noreferrer" className="btn btn-primary btn-sm">📥 Ouvrir le PDF</a>
                  </div>
                )}
              </div>
            )}

            <p style={{lineHeight:1.8,color:"#1a2a4a",fontSize:14}}>{sel.contenu}</p>
          </>
        )}
      </Modal>
    </div>
  );
}
